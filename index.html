<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn Tập — Tin Học Đại Cương</title>
<style>
/* ── FONTS ── */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Fraunces:wght@700;900&display=swap');

/* ── PALETTE: Academic Navy ── */
:root {
  --bg: #f4f6fb;
  --surface: #ffffff;
  --border: #dde2ee;
  --text: #1a2035;
  --text-muted: #6b7594;
  --header-bg: #1a2035;
  --header-text: #f4f6fb;
  --accent: #2557b0;
  --correct: #1a6e3c;
  --correct-bg: #e8f5ee;
  --correct-border: #1a6e3c;
  --wrong: #a32020;
  --wrong-bg: #fceaea;
  --wrong-border: #a32020;
  --hint-border: #1a6e3c55;
  --uncertain: #b85c00;
  --uncertain-bg: #fff3e5;
  --m1: #e8ecf6;
  --m1-text: #3d4f8a;
  --m2: #e5f3ff;
  --m2-text: #1a5a8a;
  --m3: #fff0e5;
  --m3-text: #8a4000;
  --tab-active: #2557b0;
  --tab-active-text: #fff;
  --code-bg: #f0f2fa;
  --progress-done: #2557b0;
  --progress-wrong: #c0392b;
  --shadow: 0 2px 8px rgba(26,32,53,0.08);
  --radius: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f1117;
    --surface: #1a1f2e;
    --border: #2a3050;
    --text: #e8ecf6;
    --text-muted: #8a9bbf;
    --header-bg: #0a0d16;
    --header-text: #e8ecf6;
    --accent: #6b9fff;
    --correct: #4caf80;
    --correct-bg: #0d2a1a;
    --correct-border: #4caf80;
    --wrong: #e06060;
    --wrong-bg: #2a0d0d;
    --wrong-border: #e06060;
    --hint-border: #4caf8055;
    --uncertain: #ffaa55;
    --uncertain-bg: #2a1800;
    --m1: #1e2540;
    --m1-text: #8aadff;
    --m2: #152030;
    --m2-text: #5aaeff;
    --m3: #2a1800;
    --m3-text: #ffaa55;
    --tab-active: #4477dd;
    --code-bg: #111827;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Lora', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── HEADER ── */
#header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg); color: var(--header-text);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
#header h1 {
  font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 900;
  letter-spacing: -0.02em;
}
#score-display {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem;
  background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px;
  white-space: nowrap;
}

/* ── TOOLBAR ── */
#toolbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.tool-btn {
  font-family: 'Lora', serif; font-size: 0.78rem;
  padding: 5px 12px; border-radius: 20px; cursor: pointer;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text);
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.tool-btn:hover { border-color: var(--accent); }
.tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#reset-btn { border-color: var(--wrong-border); color: var(--wrong); }
#reset-btn.warn { background: var(--wrong); color: #fff; }

/* ── TABS ── */
#tabs-wrap {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 16px; overflow-x: auto;
  display: flex; gap: 8px; align-items: flex-start;
}
#tabs-wrap::-webkit-scrollbar { height: 3px; }
#tabs-wrap::-webkit-scrollbar-track { background: transparent; }
#tabs-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.tab-chip {
  cursor: pointer; flex-shrink: 0;
  padding: 6px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  font-size: 0.75rem; color: var(--text-muted);
  transition: all 0.15s;
  min-width: 80px;
  display: flex; flex-direction: column; gap: 4px;
}
.tab-chip.active {
  background: var(--tab-active); color: var(--tab-active-text);
  border-color: var(--tab-active);
}
.tab-chip .tab-name { font-weight: 600; font-size: 0.72rem; }
.tab-chip .tab-mini-bar {
  height: 3px; border-radius: 3px; background: var(--border);
  overflow: hidden; width: 100%;
}
.tab-mini-bar-fill { height: 100%; border-radius: 3px; background: var(--progress-done); transition: width 0.3s; }
.tab-chip .tab-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; }
.tab-chip.active .tab-mini-bar { background: rgba(255,255,255,0.3); }
.tab-chip.active .tab-mini-bar-fill { background: rgba(255,255,255,0.9); }
.tab-chip.active .tab-count { color: rgba(255,255,255,0.8); }

/* ── TYPE FILTER ── */
#type-filter {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap;
}
.type-btn {
  font-size: 0.72rem; padding: 3px 10px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
  font-family: 'IBM Plex Mono', monospace;
}
.type-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── CARDS ── */
#cards-area { max-width: 740px; margin: 0 auto; padding: 20px 16px; }

.card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 18px; box-shadow: var(--shadow);
  position: relative; transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 4px 16px rgba(26,32,53,0.12); }

.card-meta {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 14px;
  font-size: 0.72rem; color: var(--text-muted);
  font-family: 'IBM Plex Mono', monospace;
}
.badge {
  padding: 2px 8px; border-radius: 10px; font-size: 0.68rem;
  font-weight: 600; letter-spacing: 0.03em;
}
.badge-chapter { background: var(--border); color: var(--text-muted); }
.badge-m1 { background: var(--m1); color: var(--m1-text); }
.badge-m2 { background: var(--m2); color: var(--m2-text); }
.badge-m3 { background: var(--m3); color: var(--m3-text); }
.badge-code { background: #1a1f2e; color: #7dd3fc; font-size: 0.65rem; }
.badge-short { background: #e8f0ff; color: #2557b0; font-size: 0.65rem; }

/* Uncertain marker */
.uncertain-btn {
  position: absolute; top: 14px; right: 14px;
  width: 26px; height: 26px; border-radius: 6px;
  border: 2px solid var(--uncertain); background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; color: var(--uncertain); transition: all 0.15s;
  font-family: 'IBM Plex Mono', monospace;
}
.uncertain-btn.marked { background: var(--uncertain); color: #fff; }

/* Question text */
.card-q {
  font-size: 0.95rem; line-height: 1.65;
  margin-bottom: 16px; margin-right: 32px;
}

/* Code snippet in question */
.card-q pre, .card-q code {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem;
  background: var(--code-bg); padding: 2px 6px; border-radius: 4px;
  display: inline;
}
.card-q pre {
  display: block; padding: 10px 14px; border-radius: 8px;
  margin: 10px 0; overflow-x: auto; line-height: 1.5;
  border-left: 3px solid var(--accent);
}

/* MCQ Options */
.options { display: flex; flex-direction: column; gap: 8px; }
.option-btn {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--bg);
  cursor: pointer; font-family: 'Lora', serif; font-size: 0.88rem;
  text-align: left; transition: all 0.15s; line-height: 1.5;
  color: var(--text);
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--m2); }
.option-btn:disabled { cursor: default; }
.option-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
  font-weight: 700; min-width: 20px; color: var(--accent); flex-shrink: 0;
  margin-top: 2px;
}
.option-btn.correct { border-color: var(--correct-border); background: var(--correct-bg); }
.option-btn.correct .option-label { color: var(--correct); }
.option-btn.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); }
.option-btn.wrong .option-label { color: var(--wrong); }
.option-btn.hint-correct { border: 2px dashed var(--correct-border); background: transparent; }
.option-btn.dim { opacity: 0.45; }

/* Feedback */
.feedback {
  margin-top: 12px; padding: 8px 12px; border-radius: 8px;
  font-size: 0.82rem; font-weight: 600; display: none;
}
.feedback.show { display: block; }
.feedback.correct { background: var(--correct-bg); color: var(--correct); }
.feedback.wrong { background: var(--wrong-bg); color: var(--wrong); }

/* Code card */
.code-placeholder {
  background: var(--code-bg); border: 1.5px dashed var(--border);
  border-radius: 8px; padding: 14px; margin-bottom: 14px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem;
  color: var(--text-muted); min-height: 60px; line-height: 1.5;
}
.code-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.code-btn {
  padding: 7px 14px; border-radius: 8px; font-size: 0.8rem; cursor: pointer;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text);
  font-family: 'Lora', serif; transition: all 0.15s;
}
.code-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.code-btn:hover:not(:disabled) { opacity: 0.85; }
.code-hint-box {
  background: var(--m3); color: var(--m3-text);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 12px;
  font-size: 0.82rem; display: none;
}
.code-hint-box.show { display: block; }
.code-answer-box { display: none; margin-bottom: 12px; }
.code-answer-box.show { display: block; }
.code-answer-box pre {
  background: var(--code-bg); border-radius: 8px; padding: 14px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem;
  overflow-x: auto; line-height: 1.6; border-left: 3px solid var(--accent);
}

/* Syntax highlight (CSS only) */
.kw { color: #2557b0; font-weight: 700; }
.cm { color: #888; font-style: italic; }
.str { color: #1a6e3c; }
.num { color: #c0392b; }

.self-eval { display: none; gap: 10px; flex-wrap: wrap; }
.self-eval.show { display: flex; }
.eval-btn {
  flex: 1; padding: 8px; border-radius: 8px; font-size: 0.82rem; cursor: pointer;
  border: 1.5px solid var(--border); background: var(--bg); color: var(--text);
  font-family: 'Lora', serif; text-align: center; transition: all 0.15s; min-width: 120px;
}
.eval-btn.good { border-color: var(--correct-border); color: var(--correct); }
.eval-btn.good:hover { background: var(--correct-bg); }
.eval-btn.bad { border-color: var(--wrong-border); color: var(--wrong); }
.eval-btn.bad:hover { background: var(--wrong-bg); }
.eval-btn.selected-good { background: var(--correct-bg); border-color: var(--correct-border); }
.eval-btn.selected-bad { background: var(--wrong-bg); border-color: var(--wrong-border); }

/* Short answer card */
.short-answer-reveal { display: none; }
.short-answer-reveal.show {
  display: block; background: var(--correct-bg); color: var(--correct);
  border-radius: 8px; padding: 10px 14px; margin-bottom: 12px;
  font-size: 0.9rem; font-weight: 600;
}

/* ── STATS BAR ── */
#stats-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 8px 20px;
  display: flex; align-items: center; gap: 12px;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
}
#stats-text { color: var(--text-muted); flex-shrink: 0; }
#stats-progress-wrap {
  flex: 1; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden;
}
#stats-progress-bar { height: 100%; border-radius: 3px; background: var(--progress-done); transition: width 0.3s; }
#stats-pct { color: var(--text); font-weight: 600; flex-shrink: 0; }
#top-btn {
  padding: 4px 10px; border-radius: 12px; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--text-muted); cursor: pointer;
  font-size: 0.72rem; font-family: 'Lora', serif; flex-shrink: 0;
}

/* ── EMPTY STATE ── */
#empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
  display: none;
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  .card { padding: 15px; }
  .card-q { font-size: 0.88rem; }
  .option-btn { font-size: 0.83rem; padding: 8px 10px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>Tin Học Đại Cương · IT1110</h1>
  <div id="score-display">Điểm: 0/0 · 0% đúng</div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tool-btn" id="reset-btn" onclick="handleReset()">↺ Đặt lại</button>
  <button class="tool-btn" id="shuffle-q-btn" onclick="toggleShuffleQ()">⇄ Trộn câu</button>
  <button class="tool-btn" id="shuffle-o-btn" onclick="toggleShuffleO()">⇅ Trộn đáp án</button>
  <button class="tool-btn" id="filter-wrong-btn" onclick="toggleFilterWrong()">✗ Câu sai</button>
  <button class="tool-btn" id="filter-uncertain-btn" onclick="toggleFilterUncertain()">? Chưa chắc <span id="uncertain-count">(0)</span></button>
</div>

<!-- CHAPTER TABS -->
<div id="tabs-wrap"></div>

<!-- TYPE FILTER -->
<div id="type-filter"></div>

<!-- CARDS -->
<div id="cards-area">
  <div id="empty-state">Không có câu hỏi nào phù hợp với bộ lọc hiện tại.</div>
</div>

<!-- STATS BAR -->
<div id="stats-bar">
  <span id="stats-text">Hiện: 0/0</span>
  <div id="stats-progress-wrap"><div id="stats-progress-bar" style="width:0%"></div></div>
  <span id="stats-pct">0%</span>
  <button id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Đầu</button>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DATA — Q[]
   b: chapter (1-8)
   t: "mcq" | "code" | "short"
   lv: 1=M1, 2=M2, 3=M3
   o: options, index 0 = CORRECT (will be shuffled for display)
═══════════════════════════════════════════════════ */
const CHAPTERS = [
  { id:1, name:"Thông tin & Dữ liệu" },
  { id:2, name:"Hệ thống máy tính" },
  { id:3, name:"Internet & An toàn TT" },
  { id:4, name:"Xu hướng công nghệ" },
  { id:5, name:"Thuật toán" },
  { id:6, name:"Tổng quan C & Kiểu DL" },
  { id:7, name:"Cấu trúc điều khiển" },
  { id:8, name:"Mảng, Hàm & File" },
];

const Q = [

// ══ NGUỒN — Ch.1 (Thông tin & Dữ liệu) ══════════════════════
{b:1,t:"mcq",lv:1,q:"Đơn vị biểu diễn thông tin cơ bản trên máy tính là bit. Vậy 1 byte có giá trị bằng bao nhiêu bit?",
 o:["8","4","16","32"]},

{b:1,t:"mcq",lv:2,q:"Cho 2 giá trị A = +95, B = −43 được biểu diễn dưới dạng số nguyên có dấu 8 bit. Kết quả phép toán A − B mà máy tính hiển thị là bao nhiêu?",
 o:["−118","+138","−1","+127"]},

{b:1,t:"mcq",lv:2,q:"Phát biểu nào sau đây là đúng khi thực hiện phép nhân 2 số nguyên có dấu trong máy tính?",
 o:["Trước khi thực hiện phép nhân cần chuyển 2 thừa số thành số dương","Trước khi nhân cần chuyển 2 thừa số thành đối số","Nếu tràn số xảy ra thì dấu của tích ngược dấu 2 thừa số","Nếu 2 thừa số khác dấu thì không cần hiệu chỉnh lại dấu của tích"]},

{b:1,t:"mcq",lv:2,q:"Trong các trường hợp sau, trường hợp nào CÓ THỂ xảy ra hiện tượng tràn số (overflow) khi cộng hai số nguyên có dấu 8 bit?",
 o:["Cộng hai số nguyên âm","Cộng hai số khác dấu ra kết quả là số dương","Cộng hai số khác dấu ra kết quả là số âm","Cộng hai số nguyên dương và âm luôn an toàn"]},

{b:1,t:"mcq",lv:2,q:"Cho 4 số nguyên 16 bit có dấu mã hexa là: 5931, AC43, B571, E755. Số lớn nhất là?",
 o:["5931","B571","AC43","E755"]},

{b:1,t:"mcq",lv:2,q:"Cho A = 49, B = −102 được biểu diễn dạng nhị phân có dấu 8 bit. Kết quả phép toán (NOT A) OR B là?",
 o:["11011110","00110001","01010101","00110110"]},

{b:1,t:"mcq",lv:2,q:"Cộng 2 số nguyên không dấu 8 bit A = 123 và B = 159, kết quả máy tính hiển thị là bao nhiêu?",
 o:["26","282","0","36"]},

{b:1,t:"mcq",lv:2,q:"Giá trị của số thực X = C1140000 (hệ 16) biểu diễn theo chuẩn IEEE 754 độ chính xác đơn (32 bit) là?",
 o:["−9.25","9.25","4.75","−4.75"]},

{b:1,t:"mcq",lv:3,q:"Biểu diễn số thực X = 0.46875 dưới dạng số dấu chấm động chuẩn IEEE 754 với 32 bit thì phần mã lệch (e) có giá trị là?",
 o:["0111 1101","1000 0001","1000 0010","1000 0011"]},

{b:1,t:"mcq",lv:2,q:"Phát biểu nào sau đây là SAI về bộ mã ASCII?",
 o:["Bộ mã ASCII không phân biệt chữ hoa, chữ thường","Là bộ mã biểu diễn ký tự","Dùng 8 bit để biểu diễn ký tự","Bộ mã ASCII có 128 ký tự chuẩn"]},

// ══ BỔ SUNG — Ch.1 ═══════════════════════════════════════════
{b:1,t:"mcq",lv:1,q:"Hệ đếm cơ số b (b ≥ 2) có bao nhiêu chữ số?",
 o:["Có b chữ số","Có b−1 chữ số","Có 2 chữ số là 0 và b−1","Có 10 chữ số"]},

{b:1,t:"mcq",lv:2,q:"Đẳng thức 213 − 121 = 72 đúng trong hệ cơ số nào?",
 o:["8","6","10","16"]},

{b:1,t:"mcq",lv:2,q:"Khi cộng hai số nguyên có dấu trong máy tính, trường hợp nào chắc chắn KHÔNG bị tràn?",
 o:["Cộng hai số khác dấu","Cộng hai số nguyên dương","Cộng hai số nguyên âm","Tất cả đều có thể tràn"]},

{b:1,t:"mcq",lv:2,q:"Số nguyên −86 được biểu diễn dưới dạng số nhị phân 8 bit có dấu (bù 2) là?",
 o:["1010 1010","0101 0101","0011 0011","1010 1001"]},

{b:1,t:"mcq",lv:2,q:"Cho số nhị phân 110011101.1001101. Biểu diễn trong hệ cơ số 8 là?",
 o:["635.464","427.644","563.644","444.44"]},

{b:1,t:"mcq",lv:3,q:"Sử dụng 11 bit để biểu diễn một số nguyên có dấu, dải biểu diễn sẽ là?",
 o:["−1024 tới +1023","−2048 tới +2047","−2048 tới +2048","−1024 tới +1024"]},

{b:1,t:"mcq",lv:2,q:"Xác định giá trị thập phân của số thực X có biểu diễn IEEE 754 (32 bit): 0011 1111 1000 0000 0000 0000 0000 0000",
 o:["1","2","−1","0"]},

{b:7,t:"code",lv:2,
 q:"Viết hàm C tính tổng 1 + 2 + 3 + ... + n (n > 0). Ví dụ: sum(5) = 15.",

{b:7,t:"code",lv:2,
 q:"Viết hàm C kiểm tra số nguyên n (n > 2) có phải số nguyên tố không. Trả về 1 nếu là số nguyên tố, 0 nếu không.",
 hint:"Kiểm tra xem n có chia hết cho i (2 ≤ i ≤ √n) không. Nếu không chia hết cho bất kỳ i nào thì là số nguyên tố.",
 ans:`int la_nguyen_to(int n) {

        if (n % i == 0) return 0;
    }

}`},

const LS = 'thdc_v1';
let state = {
  answers: {},       // qIdx -> {chosen, correct}
  uncertain: {},     // qIdx -> bool
  shuffleQ: false,
  shuffleO: false,

  filterUncertain: false,

  typeFilter: 'all', // all|mcq|code|short
  sessionSeed: Math.random(),
};

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS));
    if (s) {
      state.answers = s.answers || {};
      state.uncertain = s.uncertain || {};
      state.shuffleQ = s.shuffleQ || false;
      state.shuffleO = s.shuffleO || false;
    }
  } catch(e){}
}
function saveState() {
  localStorage.setItem(LS, JSON.stringify({
    answers: state.answers,
    uncertain: state.uncertain,
    shuffleQ: state.shuffleQ,
    shuffleO: state.shuffleO,
  }));
}

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}
function shuffle(arr, rng) {
  let a = arr.slice();
  for (let i=a.length-1;i>0;i--) {
    const j = Math.floor(rng() * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Deterministic option shuffle per question (seed based on question index)
function getOptionOrder(qIdx, options, shuffleO) {
  if (!shuffleO) return options.map((_,i)=>i);
  const rng = seededRand(qIdx * 2654435761 + state.sessionSeed * 1e9);
  const idxs = options.map((_,i)=>i);
  return shuffle(idxs, rng);
}
function getQuestionOrder(questions, shuffleQ) {
  if (!shuffleQ) return questions.map((_,i)=>i);
  const rng = seededRand(state.sessionSeed * 1e9 + 7);
  const idxs = questions.map((_,i)=>i);
  return shuffle(idxs, rng);
}

═══════════════════════════════════════════════════ */
function getFilteredQIdxs() {
  let idxs = Q.map((_,i)=>i);
  if (state.chapter !== 0) idxs = idxs.filter(i => Q[i].b === state.chapter);
  if (state.typeFilter !== 'all') idxs = idxs.filter(i => Q[i].t === state.typeFilter);
  if (state.filterWrong) idxs = idxs.filter(i => state.answers[i] && !state.answers[i].correct);
  if (state.filterUncertain) idxs = idxs.filter(i => state.uncertain[i]);
  return idxs;
}

/* ═══════════════════════════════════════════════════
   SCORE
═══════════════════════════════════════════════════ */
function getScore() {
  let total=0, correct=0;
  Object.values(state.answers).forEach(a => {
    total++;
    if (a.correct) correct++;
  });
  return {total, correct};
}
function updateScoreDisplay() {
  const {total, correct} = getScore();
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  document.getElementById('score-display').textContent =
    `Điểm: ${correct}/${total} · ${pct}% đúng`;
}

/* ═══════════════════════════════════════════════════
   SYNTAX HIGHLIGHT (C keywords only, CSS)
═══════════════════════════════════════════════════ */
function highlightC(code) {
  const keywords = ['int','float','double','char','void','long','short','unsigned','signed',
                    'if','else','while','for','do','switch','case','break','continue','return',
                    'struct','typedef','const','static','register','sizeof','include','define',
                    'printf','scanf','gets','puts','strlen','strcpy','strcmp','strcat',
                    'malloc','free','FILE','fopen','fclose','fprintf','fscanf','fgets','NULL'];
  let h = code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // strings
  h = h.replace(/"([^"\\]|\\.)*"/g, m => `<span class="str">${m}</span>`);
  h = h.replace(/'([^'\\]|\\.)*'/g, m => `<span class="str">${m}</span>`);
  // comments
  h = h.replace(/\/\/[^\n]*/g, m => `<span class="cm">${m}</span>`);
  // keywords
  keywords.forEach(kw => {
    h = h.replace(new RegExp(`\\b(${kw})\\b`, 'g'), `<span class="kw">$1</span>`);
  });
  // numbers
  h = h.replace(/\b(\d+)\b/g, '<span class="num">$1</span>');
  return h;
}

/* ═══════════════════════════════════════════════════
   RENDER CARD
═══════════════════════════════════════════════════ */
function renderCard(qIdx, displayNum, totalDisplay) {
  const q = Q[qIdx];
  const ans = state.answers[qIdx];
  const isUncertain = !!state.uncertain[qIdx];
  const lvBadge = `<span class="badge badge-m${q.lv}">M${q.lv}</span>`;
  const ch = CHAPTERS.find(c=>c.id===q.b);
  const chBadge = `<span class="badge badge-chapter">Ch.${q.b}</span>`;
  const uncertainBtn = `<button class="uncertain-btn ${isUncertain?'marked':''}"
    onclick="toggleUncertain(${qIdx})" title="Đánh dấu chưa chắc">?</button>`;

  let content = '';
  const qText = formatQuestion(q.q);

  if (q.t === 'mcq') {
    const optOrder = getOptionOrder(qIdx, q.o, state.shuffleO);
    const correctDisplayIdx = optOrder.indexOf(0); // index 0 is correct

    let opts = optOrder.map((origIdx, dispIdx) => {
      const letter = String.fromCharCode(65+dispIdx);
      let cls = '';
      if (ans) {
        if (origIdx === 0) cls = 'correct'; // correct answer
        else if (origIdx === ans.chosen && !ans.correct) cls = 'wrong';
        else cls = 'dim';
        if (origIdx === 0 && !ans.correct) cls = 'hint-correct';
      }
      return `<button class="option-btn ${cls}"
        ${ans?'disabled':''}
        onclick="chooseOption(${qIdx},${origIdx},${correctDisplayIdx},'${letter}')">
        <span class="option-label">${letter}.</span>
        <span>${q.o[origIdx]}</span>
      </button>`;
    }).join('');

    const fb = ans ? `<div class="feedback ${ans.correct?'correct':'wrong'} show">
      ${ans.correct ? '✓ Chính xác!' : `✗ Sai. Đáp án đúng: ${String.fromCharCode(65+correctDisplayIdx)}. ${q.o[0]}`}
    </div>` : '';

    content = `<div class="options">${opts}</div>${fb}`;

  } else if (q.t === 'code') {
    const typeBadge = '<span class="badge badge-code">CODE C</span>';
    const hintId = `hint-${qIdx}`, ansId = `ans-${qIdx}`, evalId = `eval-${qIdx}`;
    const shown = ans ? 'show' : '';
    const evalCls = ans ? (ans.correct ? 'selected-good' : 'selected-bad') : '';

    content = `
      <div class="code-placeholder">// Viết code C của bạn trên giấy hoặc IDE trước khi xem đáp án...</div>
      <div class="code-actions">
        ${q.hint ? `<button class="code-btn" onclick="toggleHint('${hintId}')">💡 Gợi ý</button>` : ''}
        <button class="code-btn primary" onclick="revealCode('${ansId}','${evalId}')">✓ Xem đáp án mẫu</button>
      </div>
      ${q.hint ? `<div class="code-hint-box" id="${hintId}"><b>Gợi ý:</b> ${q.hint}</div>` : ''}
      <div class="code-answer-box ${shown}" id="${ansId}">
        <pre>${highlightC(q.ans)}</pre>
      </div>
      <div class="self-eval ${shown}" id="${evalId}">
        <button class="eval-btn good ${ans&&ans.correct?'selected-good':''}" onclick="selfEval(${qIdx},true,'${evalId}')">✓ Tôi làm đúng</button>
        <button class="eval-btn bad ${ans&&!ans.correct?'selected-bad':''}" onclick="selfEval(${qIdx},false,'${evalId}')">✗ Tôi chưa làm được</button>
      </div>`;
    return buildCardHTML(qIdx, displayNum, totalDisplay, chBadge, lvBadge, typeBadge, uncertainBtn, qText, content);

  } else if (q.t === 'short') {
    const typeBadge = '<span class="badge badge-short">SHORT</span>';
    const ansId = `ans-${qIdx}`, evalId = `eval-${qIdx}`;
    const shown = ans ? 'show' : '';

    content = `
      <div class="code-actions">
        ${q.hint ? `<button class="code-btn" onclick="toggleHint('hint-${qIdx}')">💡 Gợi ý</button>` : ''}
        <button class="code-btn primary" onclick="revealShort('${ansId}','${evalId}')">✓ Xem đáp án</button>
      </div>
      ${q.hint ? `<div class="code-hint-box" id="hint-${qIdx}"></div>` : ''}
      <div class="short-answer-reveal ${shown}" id="${ansId}">Đáp án: ${q.ans}</div>
      <div class="self-eval ${shown}" id="${evalId}">
        <button class="eval-btn good ${ans&&ans.correct?'selected-good':''}" onclick="selfEval(${qIdx},true,'${evalId}')">✓ Tôi trả lời đúng</button>
        <button class="eval-btn bad ${ans&&!ans.correct?'selected-bad':''}" onclick="selfEval(${qIdx},false,'${evalId}')">✗ Tôi trả lời sai</button>
      </div>`;
    return buildCardHTML(qIdx, displayNum, totalDisplay, chBadge, lvBadge, typeBadge, uncertainBtn, qText, content);
  }

  return buildCardHTML(qIdx, displayNum, totalDisplay, chBadge, lvBadge, '', uncertainBtn, qText, content);
}

function formatQuestion(text) {
  // Detect code blocks (lines with { or ; or for/if/while) and wrap in <pre>
  if (text.includes('\n')) {
    const lines = text.split('\n');
    const firstLine = lines[0];
    const rest = lines.slice(1).join('\n');
    if (rest.trim()) {
      return `<p style="margin-bottom:8px">${escHtml(firstLine)}</p><pre>${highlightC(rest.trim())}</pre>`;
    }
  }
  return escHtml(text);
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildCardHTML(qIdx, displayNum, totalDisplay, chBadge, lvBadge, typeBadge, uncertainBtn, qText, content) {
  return `<div class="card" id="card-${qIdx}">
    ${uncertainBtn}
    <div class="card-meta">
      <span>Câu ${displayNum}/${totalDisplay}</span>
      ${chBadge}${lvBadge}${typeBadge}
    </div>
    <div class="card-q">${qText}</div>
    ${content}
  </div>`;
}

/* ═══════════════════════════════════════════════════
   RENDER PAGE
═══════════════════════════════════════════════════ */
function renderAll() {
  renderTabs();
  renderTypeFilter();
  renderCards();
  renderStats();
  updateScoreDisplay();
  updateUncertainCount();
  updateToolbarState();
}

function renderTabs() {
  const wrap = document.getElementById('tabs-wrap');
  let html = '';
  const allCls = state.chapter===0 ? 'active' : '';
  html += `<div class="tab-chip ${allCls}" onclick="setChapter(0)">
    <span class="tab-name">Tất cả</span>
    <div class="tab-mini-bar"><div class="tab-mini-bar-fill" style="width:${getChapterProgress(0)}%"></div></div>
    <span class="tab-count">${getChapterStats(0)}</span>
  </div>`;
  CHAPTERS.forEach(ch => {
    const cls = state.chapter===ch.id ? 'active' : '';
    html += `<div class="tab-chip ${cls}" onclick="setChapter(${ch.id})">
      <span class="tab-name">Ch.${ch.id} ${ch.name}</span>
      <div class="tab-mini-bar"><div class="tab-mini-bar-fill" style="width:${getChapterProgress(ch.id)}%"></div></div>
      <span class="tab-count">${getChapterStats(ch.id)}</span>
    </div>`;
  });
  wrap.innerHTML = html;
}

function getChapterProgress(chId) {
  const qs = chId===0 ? Q.map((_,i)=>i) : Q.map((_,i)=>i).filter(i=>Q[i].b===chId);
  const answered = qs.filter(i=>state.answers[i]).length;
  return qs.length > 0 ? Math.round(answered/qs.length*100) : 0;
}
function getChapterStats(chId) {
  const qs = chId===0 ? Q.map((_,i)=>i) : Q.map((_,i)=>i).filter(i=>Q[i].b===chId);
  const answered = qs.filter(i=>state.answers[i]).length;
  return `${answered}/${qs.length}`;
}

function renderTypeFilter() {
  const wrap = document.getElementById('type-filter');
  const types = [...new Set(Q.filter((_,i)=>state.chapter===0||Q[i].b===state.chapter).map(q=>q.t))];
  if (types.length <= 1) { wrap.style.display='none'; return; }
  wrap.style.display='flex';
  const allCls = state.typeFilter==='all'?'active':'';
  let html = `<button class="type-btn ${allCls}" onclick="setType('all')">Tất cả</button>`;
  const labels = {mcq:'MCQ',code:'Code C',short:'Short'};
  types.forEach(t => {
    const cls = state.typeFilter===t?'active':'';
    html += `<button class="type-btn ${cls}" onclick="setType('${t}')">${labels[t]||t}</button>`;
  });
  wrap.innerHTML = html;
}

function renderCards() {
  const area = document.getElementById('cards-area');
  const idxs = getFilteredQIdxs();
  const ordered = getQuestionOrder(idxs, state.shuffleQ);

  if (ordered.length === 0) {
    area.innerHTML = '<div id="empty-state" style="display:block;text-align:center;padding:60px 20px;color:var(--text-muted)">Không có câu hỏi nào phù hợp với bộ lọc hiện tại.</div>';
    return;
  }
  area.innerHTML = ordered.map((qIdx,i) => renderCard(qIdx, i+1, ordered.length)).join('');
}

function renderStats() {
  const idxs = getFilteredQIdxs();
  const total = idxs.length;
  const answered = idxs.filter(i=>state.answers[i]).length;
  const pct = total>0 ? Math.round(answered/total*100) : 0;
  document.getElementById('stats-text').textContent = `Hiện: ${answered}/${total}`;
  document.getElementById('stats-progress-bar').style.width = pct+'%';
  document.getElementById('stats-pct').textContent = pct+'%';
}

function updateUncertainCount() {
  const n = Object.values(state.uncertain).filter(Boolean).length;
  document.getElementById('uncertain-count').textContent = `(${n})`;
}
function updateToolbarState() {
  document.getElementById('shuffle-q-btn').classList.toggle('active', state.shuffleQ);
  document.getElementById('shuffle-o-btn').classList.toggle('active', state.shuffleO);
  document.getElementById('filter-wrong-btn').classList.toggle('active', state.filterWrong);
  document.getElementById('filter-uncertain-btn').classList.toggle('active', state.filterUncertain);
}

/* ═══════════════════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════════════════ */
function chooseOption(qIdx, chosenOrigIdx, correctDispIdx, _letter) {
  if (state.answers[qIdx]) return;
  const correct = chosenOrigIdx === 0;
  state.answers[qIdx] = { chosen: chosenOrigIdx, correct };
  saveState();
  // Re-render just this card
  const idxs = getFilteredQIdxs();
  const ordered = getQuestionOrder(idxs, state.shuffleQ);
  const dispNum = ordered.indexOf(qIdx) + 1;
  const card = document.getElementById(`card-${qIdx}`);
  if (card) card.outerHTML = renderCard(qIdx, dispNum, ordered.length);
  updateScoreDisplay();
  renderTabs(); // update progress
  renderStats();
}

function selfEval(qIdx, isCorrect, evalId) {
  state.answers[qIdx] = { chosen: null, correct: isCorrect };
  saveState();
  const el = document.getElementById(evalId);
  if (el) {
    el.querySelectorAll('.eval-btn').forEach(b => {
      b.classList.remove('selected-good','selected-bad');
    });
    if (isCorrect) el.querySelector('.good').classList.add('selected-good');
    else el.querySelector('.bad').classList.add('selected-bad');
  }
  updateScoreDisplay();
  renderTabs();
  renderStats();
}

function toggleHint(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('show');
}

function revealCode(ansId, evalId) {
  const a = document.getElementById(ansId);
  const e = document.getElementById(evalId);
  if (a) a.classList.add('show');
  if (e) e.classList.add('show');
}

function revealShort(ansId, evalId) {
  const a = document.getElementById(ansId);
  const e = document.getElementById(evalId);
  if (a) a.classList.add('show');
  if (e) e.classList.add('show');
}

function toggleUncertain(qIdx) {
  state.uncertain[qIdx] = !state.uncertain[qIdx];
  saveState();
  const btn = document.querySelector(`#card-${qIdx} .uncertain-btn`);
  if (btn) btn.classList.toggle('marked', state.uncertain[qIdx]);
  updateUncertainCount();
  if (state.filterUncertain) renderCards();
}

/* Toolbar actions */
function toggleShuffleQ() {
  state.shuffleQ = !state.shuffleQ;
  saveState();
  state.sessionSeed = Math.random();
  renderAll();
}
function toggleShuffleO() {
  state.shuffleO = !state.shuffleO;
  saveState();
  state.sessionSeed = Math.random();
  renderAll();
}
function toggleFilterWrong() {
  state.filterWrong = !state.filterWrong;
  if (state.filterWrong) state.filterUncertain = false;
  renderAll();
}
function toggleFilterUncertain() {
  state.filterUncertain = !state.filterUncertain;
  if (state.filterUncertain) state.filterWrong = false;
  renderAll();
}
function setChapter(id) {
  state.chapter = id;
  state.typeFilter = 'all';
  renderAll();
}
function setType(t) {
  state.typeFilter = t;
  renderAll();
}

/* Reset */
let resetTimer = null;
function handleReset() {
  const btn = document.getElementById('reset-btn');
  if (!btn.classList.contains('warn')) {
    btn.classList.add('warn');
    btn.textContent = '↺ Xác nhận xóa?';
    resetTimer = setTimeout(() => {
      btn.classList.remove('warn');
      btn.textContent = '↺ Đặt lại';
    }, 3000);
  } else {
    clearTimeout(resetTimer);
    btn.classList.remove('warn');
    btn.textContent = '↺ Đặt lại';
    state.answers = {};
    state.uncertain = {};
    state.filterWrong = false;
    state.filterUncertain = false;
    state.sessionSeed = Math.random();
    saveState();
    renderAll();
  }
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
loadState();
renderAll();
</script>
