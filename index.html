<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập Tin học Đại cương — HUST</title>
<style>
:root{
  --bg:#faf8f1;--text:#1a1814;--card:#fff;--card-border:#e2ddd0;
  --accent:#5a6abf;--accent-light:#eef0fa;--correct:#2d8a56;--correct-bg:#e8f5ee;
  --wrong:#c0392b;--wrong-bg:#fbeaea;--muted:#8a8477;--code-bg:#f4f1e8;
  --tab-bg:#eee8d5;--tab-active:#5a6abf;--tab-text:#6b6458;
  --hover:#f0ece0;--shadow:0 1px 3px rgba(0,0,0,.08);
  --progress-bg:#e2ddd0;--progress-fill:#5a6abf;
  --uncertain:#e6a817;--uncertain-bg:#fdf6e3;
  --filter-bg:#f0ece0;--badge:#5a6abf;
  }
@media(prefers-color-scheme:dark){:root{
  --bg:#11100d;--text:#ebe6d9;--card:#1c1a16;--card-border:#2e2b25;
  --accent:#8b9cf7;--accent-light:#1e2040;--correct:#4eca7a;--correct-bg:#162a1e;
  --wrong:#e74c3c;--wrong-bg:#2a1515;--muted:#8a8477;--code-bg:#1a1814;
  --tab-bg:#1c1a16;--tab-active:#8b9cf7;--tab-text:#8a8477;
  --hover:#252219;--shadow:0 1px 3px rgba(0,0,0,.3);
  --progress-bg:#2e2b25;--progress-fill:#8b9cf7;
  --uncertain:#f0c040;--uncertain-bg:#2a2510;
  --filter-bg:#1c1a16;--badge:#8b9cf7;
  }}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:80px}
.container{max-width:760px;margin:0 auto;padding:0 16px}
header{text-align:center;padding:24px 0 8px}
header h1{font-size:1.4rem;font-weight:700}
header p{color:var(--muted);font-size:.85rem;margin-top:4px}
.overall-progress{margin:12px auto;max-width:400px;text-align:center}
.overall-progress .bar{height:6px;background:var(--progress-bg);border-radius:3px;overflow:hidden;margin-top:4px}
.overall-progress .fill{height:100%;background:var(--progress-fill);transition:width .3s}
.overall-progress .label{font-size:.8rem;color:var(--muted)}
.tabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:16px 0;padding-bottom:4px}
.tabs{display:flex;gap:4px;min-width:max-content}
.tab{padding:6px 12px;border-radius:8px 8px 0 0;cursor:pointer;font-size:.78rem;
  background:var(--tab-bg);color:var(--tab-text);border:none;white-space:nowrap;
  position:relative;transition:all .15s;font-weight:500}
.tab:hover{background:var(--hover)}
.tab.active{background:var(--tab-active);color:#fff;font-weight:600}
.tab .mini-bar{position:absolute;bottom:0;left:4px;right:4px;height:2px;background:var(--progress-bg);border-radius:1px;overflow:hidden}
.tab .mini-fill{height:100%;background:var(--correct);transition:width .3s}
.tab.active .mini-bar{background:rgba(255,255,255,.3)}
.tab.active .mini-fill{background:#fff}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 16px;align-items:center}
.filter-btn{padding:4px 10px;border-radius:16px;font-size:.75rem;cursor:pointer;
  border:1px solid var(--card-border);background:var(--filter-bg);color:var(--text);transition:all .15s}
.filter-btn:hover{border-color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-btn .count{display:inline-block;min-width:16px;text-align:center;background:var(--badge);color:#fff;border-radius:8px;padding:0 4px;font-size:.65rem;margin-left:4px;font-weight:600}
.filter-btn.active .count{background:rgba(255,255,255,.3)}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;
  padding:20px;margin-bottom:12px;box-shadow:var(--shadow);position:relative}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase}
.badge-mcq{background:var(--accent-light);color:var(--accent)}
.badge-code{background:#fdf6e3;color:#b58900}
.badge-short{background:#e8f5ee;color:#2d8a56}
.card-level{font-size:.7rem;color:var(--muted)}
.card-q{font-size:.95rem;margin-bottom:14px;white-space:pre-wrap}
.card-q code{background:var(--code-bg);padding:1px 5px;border-radius:3px;font-family:'Consolas','Courier New',monospace;font-size:.88em}
.options{display:flex;flex-direction:column;gap:6px}
.opt{padding:10px 14px;border:1.5px solid var(--card-border);border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .15s}
.opt:hover:not(.disabled){background:var(--hover);border-color:var(--accent)}
.opt.correct-show{border-color:var(--correct);background:var(--correct-bg)}
.opt.wrong-show{border-color:var(--wrong);background:var(--wrong-bg)}
.opt.disabled{cursor:default;opacity:.85}
.opt .mark{float:right;font-weight:700}
.opt .mark.ok{color:var(--correct)}
.opt .mark.no{color:var(--wrong)}
.code-block{background:var(--code-bg);border:1px solid var(--card-border);border-radius:8px;padding:14px;font-family:'Consolas','Courier New',monospace;font-size:.85rem;line-height:1.5;overflow-x:auto;white-space:pre;margin-bottom:10px;tab-size:4}
.code-block .kw{color:#8959a8;font-weight:600}.code-block .type{color:#4271ae}.code-block .str{color:#718c00}.code-block .num{color:#f5871f}.code-block .cmt{color:#8e908c;font-style:italic}.code-block .pp{color:#c82829}
.self-assess{display:flex;gap:8px;margin-top:10px}
.sa-btn{padding:6px 16px;border-radius:8px;border:1.5px solid var(--card-border);cursor:pointer;font-size:.85rem;font-weight:500;transition:all .15s;background:var(--card)}
.sa-btn:hover{border-color:var(--accent)}
.sa-btn.sa-correct{border-color:var(--correct);color:var(--correct)}
.sa-btn.sa-correct:hover,.sa-btn.sa-correct.chosen{background:var(--correct-bg)}
.sa-btn.sa-wrong{border-color:var(--wrong);color:var(--wrong)}
.sa-btn.sa-wrong:hover,.sa-btn.sa-wrong.chosen{background:var(--wrong-bg)}
.toggle-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--card-border);cursor:pointer;font-size:.8rem;background:var(--card);color:var(--muted);margin-right:6px;margin-top:6px;transition:all .15s;display:inline-block}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.hidden-content{display:none;margin-top:8px;padding:10px;background:var(--code-bg);border-radius:8px;font-size:.88rem;white-space:pre-wrap}
.hidden-content.visible{display:block}
.uncertain-btn{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--card-border);cursor:pointer;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;color:var(--muted)}
.uncertain-btn:hover{border-color:var(--uncertain)}
.uncertain-btn.marked{background:var(--uncertain-bg);border-color:var(--uncertain);color:var(--uncertain)}

.stats{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;justify-content:center}
.stat-box{text-align:center;padding:8px 14px;background:var(--card);border-radius:8px;border:1px solid var(--card-border);min-width:70px}
.stat-box .val{font-size:1.3rem;font-weight:700;color:var(--accent)}
.stat-box .lbl{font-size:.7rem;color:var(--muted)}
.reset-area{text-align:center;margin:24px 0;padding:16px}
.reset-btn{padding:8px 24px;border-radius:8px;border:1.5px solid var(--wrong);color:var(--wrong);background:var(--card);cursor:pointer;font-size:.85rem;font-weight:500;transition:all .2s}
.reset-btn:hover{background:var(--wrong-bg)}
.reset-btn.confirm{background:var(--wrong);color:#fff}
@media(max-width:480px){.card{padding:14px}header h1{font-size:1.2rem}.tab{padding:5px 8px;font-size:.72rem}}
</style>
</head>
<body>
<div class="container">
  <header><h1>Ôn tập Tin học Đại cương</h1><p>IT1110 / IT1140 — HUST</p></header>
  <div class="overall-progress"><div class="label" id="overallLabel">0 / 0</div><div class="bar"><div class="fill" id="overallFill" style="width:0%"></div></div></div>
  <div class="stats" id="statsArea"></div>
  <div class="tabs-wrap"><div class="tabs" id="tabsBar"></div></div>
  <div class="filters" id="filtersBar"></div>
  <div id="cardsArea"></div>
  <div class="reset-area"><button class="reset-btn" id="resetBtn">Xóa toàn bộ tiến trình</button></div>
</div>
<script>
const Q = [

// ============================================================
// CHAPTER 1: Thông tin và Dữ liệu (number systems, binary, IEEE 754, ASCII)
// ============================================================

// --- Source questions (from quiz file) ---

// Phần I.1 Q1
{b:1, t:"mcq", lv:1, q:"Đơn vị biểu diễn thông tin cơ bản trên máy tính là bit. Vậy 1 byte có giá trị bằng bao nhiêu bit?", o:["8","4","16","32"]},

// Phần I.1 Q2
{b:1, t:"mcq", lv:2, q:"Cho 2 giá trị A= +95, B=-43 được biểu diễn dưới dạng số nguyên có dấu 8 bit trong máy tính. Kết quả phép toán A-B mà máy tính hiển thị là bao nhiêu?", o:["-118","+138","-1","+127"]},

// Phần I.1 Q3
{b:1, t:"mcq", lv:2, q:"Phát biểu nào sau đây là đúng khi thực hiện phép nhân 2 số nguyên có dấu trong máy tính?", o:["Trước khi thực hiện phép nhân cần chuyển 2 thừa số thành số dương","Trước khi thực hiện phép nhân cần chuyển 2 thừa số thành đối số","Nếu hiện tượng tràn số xảy ra thì dấu của tích ngược dấu 2 thừa số","Nếu 2 thừa số khác dấu thì không cần hiệu chỉnh lại dấu của tích"]},

// Phần I.1 Q4
{b:1, t:"mcq", lv:2, q:"Trong các trường hợp sau đây, trường hợp nào có thể xảy ra hiện tượng tràn số?", o:["Cộng hai số nguyên âm","Cộng hai số khác dấu ra kết quả là số dương","Cộng hai số khác dấu ra kết quả là số âm","Tất cả các phương án trên đều sai."]},

// Phần I.1 Q5
{b:1, t:"mcq", lv:2, q:"Cho số nguyên 16 bit có dấu có mã hexa là: 5931, AC43, B571, E755. Số lớn nhất là?", o:["5931","B571","AC43","E755"]},

// Phần I.1 Q6
{b:1, t:"mcq", lv:3, q:"Cho các số nguyên không dấu có mã hexa là: X=6A16, Y=1538, Z=10510. Thứ tự sắp xếp giảm dần sẽ là?", o:["X, Y, Z","Y, X, Z","Z, X, Y","Y, Z, X"]},

// Phần I.1 Q7
{b:1, t:"mcq", lv:1, q:"Sử dụng n bit nhị phân để biểu diễn số nguyên có dấu. Hỏi giá trị nguyên lớn nhất có thể biểu diễn là bao nhiêu?", o:["2^(n-1) - 1","2^n - 1","2^(n-1)","2^n"]},

// Phần I.1 Q8
{b:1, t:"mcq", lv:2, q:"Khi thực hiện phép chia hai số nguyên có dấu trong máy tính, sau khi chuyển số bị chia và số chia thành số dương thì thực hiện phép chia. Trường hợp nào phải đảo lại dấu của cả thương và số dư?", o:["Số bị chia âm, số chia dương","Số bị chia dương, số chia dương","Số bị chia dương, số chia âm","Số bị chia âm, số chia âm"]},

// Phần I.1 Q9
{b:1, t:"mcq", lv:2, q:"Cho biết kết quả của biểu thức khi biểu diễn ở dạng số nguyên có dấu 8 bit? NOT 106(10)", o:["10010101","00010110","00010101","10010110"]},

// Phần I.1 Q10
{b:1, t:"mcq", lv:3, q:"Biểu diễn số thực X = 0.46875 dưới dạng số dấu chấm động theo chuẩn IEEE 754 với 32 bit thì phần mã lệch (e) có giá trị là bao nhiêu?", o:["0111 1101","1000 0001","1000 0010","1000 0011"]},

// Đề 3 Q3
{b:1, t:"mcq", lv:2, q:"Cho số nhị phân 110011101.1001101 có biểu diễn trong hệ cơ số 8 là?", o:["635.464","427.644","563.644","444.44"]},

// Đề 3 Q4
{b:1, t:"mcq", lv:2, q:"Cho 4 số nguyên 16 bit có dấu có mã hexa là: 2A31, A102, B502, 3C01. Số lớn nhất là?", o:["3C01","2A31","A102","B502"]},

// Đề 3 Q5
{b:1, t:"mcq", lv:3, q:"Cho A = 49, B = -102 biểu diễn dạng nhị phân có dấu 8 bit. Kết quả phép toán trên bit (NOT A) OR B là:", o:["11011110","00110001","01010101","00110110"]},

// Đề 3 Q7
{b:1, t:"mcq", lv:2, q:"Cộng 2 số nguyên không dấu 8 bit A = 123 và B=159 được kết quả bằng bao nhiêu?", o:["26","282","0","36"]},

// Đề 3 Q8
{b:1, t:"mcq", lv:3, q:"Giá trị của số thực X = C1140000 (hệ 16) biểu diễn theo chuẩn IEEE754/85 độ chính xác đơn (dùng 32 bit) là:", o:["-9.25","9.25","4.75","-4.75"]},

// Đề 3 Q19
{b:1, t:"mcq", lv:1, q:"Số thực nào trong hệ cơ số 10 là vô hạn trong hệ cơ số 2?", o:["0.1","0.125","0.0625","0.75"]},

// Đề 3 Q21
{b:1, t:"mcq", lv:2, q:"Trong các giá trị thể hiện kích thước file như sau, giá trị nào lớn nhất?", o:["2^11 MB","1000 MB","2^20 KB","1 GB"]},

// Đề 3 Q22
{b:1, t:"mcq", lv:2, q:"Đẳng thức 213 – 121 = 72 đúng trong hệ cơ số nào?", o:["8","6","10","16"]},

// Đề 3 Q23
{b:1, t:"mcq", lv:1, q:"Hệ đếm cơ số b (b ≥ 2) và nguyên dương có bao nhiêu chữ số?", o:["Có b chữ số","Có b-1 chữ số","Có 2 chữ số là 0 và b-1","Có 10 chữ số"]},

// Đề 3 Q35
{b:1, t:"mcq", lv:1, q:"Sử dụng 11 bit để biểu diễn một số nguyên có dấu, dải biểu diễn sẽ là? (Đề 3)", o:["-1024 tới +1023","-2048 tới +2047","-2048 tới +2048","-1024 tới +1024"]},

// Đề 2 Q8
{b:1, t:"mcq", lv:2, q:"Cho A B C là các số nguyên không dấu 8 bit. A = 10001010(2), B = 11111010(2). C=A+B. Giá trị nhị phân của C là:", o:["10000100","10110100","10000110","11100010"]},

// Đề 2 Q10
{b:1, t:"mcq", lv:2, q:"Kết quả biểu thức sau bằng bao nhiêu:\n01010110(2) AND 01001011(2)", o:["01000010","11100010","10100000","01100010"]},

// Đề 2 Q11
{b:1, t:"mcq", lv:1, q:"Theo chuẩn IEEE 754/85, với cách biểu diễn số thực độ chính xác đơn (dùng 32 bit) thì số bit dùng biểu diễn phần mã lệch (e) sẽ là?", o:["8","9","7","6"]},

// Đề 2 Q12
{b:1, t:"mcq", lv:2, q:"Xác định giá trị thập phân của số thực X có dạng biểu diễn theo chuẩn IEEE 754 với 32 bit như sau:\n0011 1111 1000 0000 0000 0000 0000 0000", o:["1","2","-1","0"]},

// Đề 2 Q13
{b:1, t:"mcq", lv:1, q:"Cách biểu diễn số âm trong máy tính là?", o:["Sử dụng mã bù 2.","Đảo các bit của giá trị nhị phân tương ứng.","Sử dụng mã bù 1.","Thêm dấu trừ vào trước giá trị nhị phân tương ứng."]},

// Đề 2 Q15
{b:1, t:"mcq", lv:2, q:"Cho 2 giá trị A= 195, B=143 được biểu diễn dưới dạng số nguyên không dấu 8 bit trong máy tính. Kết quả phép toán A+B mà máy tính hiển thị là bao nhiêu?", o:["82","256","338","0"]},

// Đề 2 Q16
{b:1, t:"mcq", lv:1, q:"Một số nguyên có dấu biểu diễn dưới dạng số nguyên 8 bit là 01010101. Giá trị của số đó trong hệ thập phân là?", o:["+85","-85","-43","+43"]},

// Đề 2 Q21
{b:1, t:"mcq", lv:2, q:"Kết quả biểu thức 10101001 OR 11001010", o:["11101011","11001010","10001000","01100011"]},

// Đề 2 Q25
{b:1, t:"mcq", lv:3, q:"Cho số thực 121.75 biểu diễn theo chuẩn IEEE 754/85 độ chính xác đơn. Mã lệch e trong hệ nhị phân là:", o:["10000101","01111001","00000110","01111111"]},

// Đề 2 Q27
{b:1, t:"mcq", lv:2, q:"Cho 2 giá trị A= +95, B=+43 được biểu diễn dưới dạng số nguyên có dấu 8 bit trong máy tính. Kết quả phép toán A+B mà máy tính hiển thị là bao nhiêu?", o:["-118","+138","-137","+10"]},

// Đề 1 Q1
{b:1, t:"mcq", lv:2, q:"Khi cộng hai số nguyên có dấu trong máy tính, trường hợp nào chắc chắn không tràn?", o:["Cộng hai số khác dấu.","Cộng hai số nguyên dương.","Cộng hai số nguyên âm","Tất cả các phương án trên đều sai."]},

// Đề 1 Q7
{b:1, t:"mcq", lv:2, q:"Xác định giá trị thập phân của số thực X có dạng biểu diễn theo chuẩn IEEE 754 với 32 bit:\n0011 1111 1000 0000 0000 0000 0000 0000 (Đề 1)", o:["1","0","2","-1"]},

// Đề 1 Q8
{b:1, t:"mcq", lv:1, q:"Để biểu diễn cùng một giá trị, trong các hệ đếm sau, hệ đếm cơ số nào sử dụng ít chữ số nhất?", o:["Cơ số 16","Cơ số 2","Cơ số 8","Cơ số 10"]},

// Đề 1 Q9
{b:1, t:"mcq", lv:1, q:"Phát biểu nào sau đây là sai về bộ mã ASCII?", o:["Bộ mã ASCII không phân biệt chữ hoa, chữ thường","Là bộ mã biểu diễn ký tự","Dùng 8 bit để biểu diễn ký tự","Bộ mã ASCII có 128 ký tự chuẩn"]},

// Đề 1 Q20
{b:1, t:"mcq", lv:2, q:"Số nguyên -86 được biểu diễn dưới dạng số nhị phân 8 bit là?", o:["1010 1010","0101 0101","0011 0011","1010 1001"]},

// Đề 1 Q35
{b:1, t:"mcq", lv:1, q:"Sử dụng 11 bit để biểu diễn một số nguyên có dấu, dải biểu diễn sẽ là? (Đề 1)", o:["-1024 tới +1023","-2048 tới +2047","-2048 tới +2048","-1024 tới +1024"]},

// --- Supplementary questions ---

{b:1, t:"mcq", lv:1, q:"1 KB bằng bao nhiêu byte?", o:["1024","1000","512","2048"]},

{b:1, t:"mcq", lv:1, q:"1 MB bằng bao nhiêu KB?", o:["1024","1000","512","2048"]},

{b:1, t:"mcq", lv:2, q:"Số nhị phân 11011010 biểu diễn số nguyên không dấu có giá trị thập phân là bao nhiêu?", o:["218","214","216","220"]},

{b:1, t:"mcq", lv:2, q:"Chuyển đổi số thập phân 156 sang hệ nhị phân (8 bit không dấu)?", o:["10011100","10011010","10011110","10011000"]},

// ============================================================
// CHAPTER 2: Hệ thống máy tính (CPU, memory, bus, hardware)
// ============================================================

// --- Source questions (from quiz file) ---

// Phần I.2 Q1

const CH_NAMES = {1:"Thông tin & Dữ liệu",2:"Hệ thống máy tính",3:"Internet & ATTT",4:"Xu hướng CN mới",5:"Thuật toán",6:"Tổng quan C",7:"Kiểu DL & Biểu thức",8:"Vào ra dữ liệu",9:"Cấu trúc điều khiển",10:"Mảng, Con trỏ, Xâu",11:"Cấu trúc (struct)",12:"Hàm",13:"Tệp dữ liệu"};

var LS_KEY="thdc_v5";
var state=loadState();
var currentCh=0,filterType="all",filterWrong=false,filterUncertain=false,shuffleSeed=state.shuffleSeed||0;

function loadState(){try{var s=localStorage.getItem(LS_KEY);if(s)return JSON.parse(s)}catch(e){}return{answers:{},uncertain:{},selected:{},code:{},shuffleSeed:0}}
function saveState(){try{localStorage.setItem(LS_KEY,JSON.stringify(state))}catch(e){}}
function seedHash(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return (h+shuffleSeed)|0}
function shuffle(a,seed){a=a.slice();var s=Math.abs(seed);for(var i=a.length-1;i>0;i--){s=(s*1103515245+12345)&0x7fffffff;var j=s%(i+1);var t=a[i];a[i]=a[j];a[j]=t}return a}
function qid(q,i){return"q"+q.b+"_"+q.t+"_"+i}
var QI=Q.map(function(q,i){var r={};for(var k in q)r[k]=q[k];r._id=qid(q,i);r._idx=i;return r});
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function highlightC(code){var s=escHtml(code);s=s.replace(/(\/\/.*)/g,'<span class="cmt">$1</span>');s=s.replace(/(#\s*(?:include|define|ifdef|ifndef|endif|if|else|elif|undef|pragma)\b[^\n]*)/g,'<span class="pp">$1</span>');s=s.replace(/("(?:[^"\\]|\\.)*")/g,'<span class="str">$1</span>');s=s.replace(/('(?:[^'\\]|\\.)*')/g,'<span class="str">$1</span>');s=s.replace(/\b(\d+\.?\d*[fFlL]?)\b/g,'<span class="num">$1</span>');var kws="int|long|short|char|float|double|void|unsigned|signed|const|static|extern|auto|register|return|if|else|for|while|do|switch|case|default|break|continue|goto|sizeof|typedef|struct|union|enum|volatile|inline";s=s.replace(new RegExp("\\b("+kws+")\\b","g"),'<span class="kw">$1</span>');s=s.replace(/\b(FILE|NULL|EOF|size_t|stdin|stdout|stderr)\b/g,'<span class="type">$1</span>');return s}
function formatQ(t){var s=escHtml(t);return s.replace(/`([^`]+)`/g,'<code>$1</code>')}
function getFiltered(){var qs=QI;if(currentCh>0)qs=qs.filter(function(q){return q.b===currentCh});if(filterType!=="all"){if(filterType==="code")qs=qs.filter(function(q){return q.t==="code"});else qs=qs.filter(function(q){return q.t===filterType})}if(filterWrong)qs=qs.filter(function(q){return state.answers[q._id]==="wrong"});if(filterUncertain)qs=qs.filter(function(q){return state.uncertain[q._id]});return qs}

// ==== Render Cards ====
function renderCards(){
  var area=document.getElementById("cardsArea");
  var qs=getFiltered();
  if(!qs.length){area.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px">Không có câu hỏi nào.</p>';return}
  var html='';
  qs.forEach(function(q){
    var id=q._id,answered=state.answers[id],isU=state.uncertain[id];
    var lv=["","M1","M2","M3"][q.lv];
    var bc,bt;
    if(q.t==="mcq"){bc="badge-mcq";bt="MCQ"}else if(q.t==="code"){bc="badge-code";bt="CODE"}else{bc="badge-short";bt="TỰ LUẬN"}
    html+='<div class="card" id="card_'+id+'">';
    html+='<button class="uncertain-btn'+(isU?' marked':'')+'" onclick="toggleMark(\''+id+'\')" title="Chưa chắc">?</button>';
    html+='<div class="card-header"><span class="card-badge '+bc+'">'+bt+'</span><span class="card-level">'+lv+' · Ch.'+q.b+'</span></div>';
    html+='<div class="card-q">'+formatQ(q.q)+'</div>';
    
    if(q.t==="mcq"){
      var opts=q.o.map(function(t,oi){return{text:t,isCorrect:oi===0}});
      var sh=shuffle(opts,seedHash(id));
      html+='<div class="options">';
      sh.forEach(function(opt,si){
        var cls="opt";
        if(answered){cls+=" disabled";if(opt.isCorrect)cls+=" correct-show";if(answered==="wrong"&&state.selected[id]===si&&!opt.isCorrect)cls+=" wrong-show"}
        var mk=answered?(opt.isCorrect?'<span class="mark ok">✓</span>':(state.selected[id]===si?'<span class="mark no">✗</span>':'')):'';
        html+='<div class="'+cls+'" '+(answered?'':'onclick="answer(\''+id+'\','+si+','+(opt.isCorrect?'true':'false')+')"')+'>'+escHtml(opt.text)+mk+'</div>';
      });
      html+='</div>';
    } else {
      if(q.hint){html+='<button class="toggle-btn" onclick="toggleHint(\''+id+'_hint\')">Gợi ý</button><div class="hidden-content" id="'+id+'_hint">'+escHtml(q.hint)+'</div>'}
      if(q.ans){html+='<button class="toggle-btn" onclick="toggleHint(\''+id+'_ans\')">Xem đáp án</button>';html+=q.t==="code"?'<div class="hidden-content" id="'+id+'_ans"><div class="code-block">'+highlightC(q.ans)+'</div></div>':'<div class="hidden-content" id="'+id+'_ans">'+escHtml(q.ans)+'</div>'}
      if(!answered) html+='<div class="self-assess"><button class="sa-btn sa-correct" onclick="selfAssess(\''+id+'\',\'correct\')">Đúng ✓</button><button class="sa-btn sa-wrong" onclick="selfAssess(\''+id+'\',\'wrong\')">Sai ✗</button></div>';
      else html+='<div class="self-assess"><button class="sa-btn '+(answered==='correct'?'sa-correct chosen':'sa-wrong chosen')+'" disabled>'+(answered==='correct'?'Đúng ✓':'Sai ✗')+'</button></div>';
    }
    html+='</div>';
  });
  area.innerHTML=html;
}

function renderTabs(){var bar=document.getElementById("tabsBar");var h='';var ad=0;QI.forEach(function(q){if(state.answers[q._id])ad++});var ap=QI.length?Math.round(ad/QI.length*100):0;h+='<button class="tab'+(currentCh===0?' active':'')+'" onclick="setCh(0)">Tất cả<span class="mini-bar"><span class="mini-fill" style="width:'+ap+'%"></span></span></button>';for(var c=1;c<=13;c++){var cq=QI.filter(function(q){return q.b===c});var d=cq.filter(function(q){return state.answers[q._id]}).length;var p=cq.length?Math.round(d/cq.length*100):0;h+='<button class="tab'+(currentCh===c?' active':'')+'" onclick="setCh('+c+')">Ch.'+c+'<span class="mini-bar"><span class="mini-fill" style="width:'+p+'%"></span></span></button>'}bar.innerHTML=h}
function renderFilters(){var bar=document.getElementById("filtersBar");var qs=currentCh===0?QI:QI.filter(function(q){return q.b===currentCh});var mc=0,cc=0,sc=0,wc=0,uc=0;qs.forEach(function(q){if(q.t==="mcq")mc++;else if(q.t==="code")cc++;else sc++;if(state.answers[q._id]==="wrong")wc++;if(state.uncertain[q._id])uc++});bar.innerHTML='<button class="filter-btn'+(filterType==="all"?" active":"")+'" onclick="setFilter(\'all\')">Tất cả<span class="count">'+qs.length+'</span></button><button class="filter-btn'+(filterType==="mcq"?" active":"")+'" onclick="setFilter(\'mcq\')">MCQ<span class="count">'+mc+'</span></button><button class="filter-btn'+(filterType==="code"?" active":"")+'" onclick="setFilter(\'code\')">Code<span class="count">'+cc+'</span></button><button class="filter-btn'+(filterType==="short"?" active":"")+'" onclick="setFilter(\'short\')">Tự luận<span class="count">'+sc+'</span></button><button class="filter-btn'+(filterWrong?" active":"")+'" onclick="toggleWrong()">Sai<span class="count">'+wc+'</span></button><button class="filter-btn'+(filterUncertain?" active":"")+'" onclick="toggleUncertain()">Chưa chắc<span class="count">'+uc+'</span></button><button class="filter-btn" onclick="reshuffleABCD()" title="Xáo lại vị trí A/B/C/D">Trộn ABCD</button>'}
function renderStats(){var qs=currentCh===0?QI:QI.filter(function(q){return q.b===currentCh});var t=qs.length,d=0,c=0,w=0;qs.forEach(function(q){var a=state.answers[q._id];if(a){d++;if(a==="correct")c++;else w++}});var p=d?Math.round(c/d*100):0;document.getElementById("statsArea").innerHTML='<div class="stat-box"><div class="val">'+t+'</div><div class="lbl">Tổng</div></div><div class="stat-box"><div class="val">'+d+'</div><div class="lbl">Đã làm</div></div><div class="stat-box"><div class="val" style="color:var(--correct)">'+c+'</div><div class="lbl">Đúng</div></div><div class="stat-box"><div class="val" style="color:var(--wrong)">'+w+'</div><div class="lbl">Sai</div></div><div class="stat-box"><div class="val">'+p+'%</div><div class="lbl">Tỷ lệ</div></div>';var ad=0;QI.forEach(function(q){if(state.answers[q._id])ad++});document.getElementById("overallLabel").textContent=ad+' / '+QI.length+' câu đã làm';document.getElementById("overallFill").style.width=(QI.length?Math.round(ad/QI.length*100):0)+"%"}

function setCh(c){currentCh=c;filterWrong=false;filterUncertain=false;render()}
function setFilter(t){filterType=(filterType===t?'all':t);render()}
function toggleWrong(){filterWrong=!filterWrong;if(filterWrong)filterUncertain=false;render()}
function toggleUncertain(){filterUncertain=!filterUncertain;if(filterUncertain)filterWrong=false;render()}
function answer(id,si,ok){state.selected[id]=si;state.answers[id]=ok?"correct":"wrong";saveState();render();setTimeout(function(){var el=document.getElementById("card_"+id);if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"})},50)}
function selfAssess(id,r){state.answers[id]=r;saveState();render()}
function toggleMark(id){if(state.uncertain[id])delete state.uncertain[id];else state.uncertain[id]=true;saveState();renderFilters();var b=document.querySelector('#card_'+id+' .uncertain-btn');if(b)b.classList.toggle("marked")}
function toggleHint(elId){var el=document.getElementById(elId);if(el)el.classList.toggle("visible")}
function reshuffleABCD(){shuffleSeed=(shuffleSeed+Math.floor(Math.random()*9000)+1000)|0;state.shuffleSeed=shuffleSeed;saveState();render()}
var resetTap=0;document.getElementById("resetBtn").addEventListener("click",function(){var s=this;if(resetTap===0){s.textContent="Chắc chắn xóa? Nhấn lần nữa";s.classList.add("confirm");resetTap=1;setTimeout(function(){s.textContent="Xóa toàn bộ tiến trình";s.classList.remove("confirm");resetTap=0},3000)}else{state={answers:{},uncertain:{},selected:{},code:{},shuffleSeed:0};saveState();s.textContent="Đã xóa ✓";s.classList.remove("confirm");resetTap=0;shuffleSeed=0;setTimeout(function(){s.textContent="Xóa toàn bộ tiến trình";render()},1000)}});
function render(){renderTabs();renderFilters();renderStats();renderCards()}
render();
</script>
