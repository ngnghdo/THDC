{b:9,t:"code",lv:1,q:"Nhập 2 số thực X, Y. Tính F = Y⁶ + XY⁵ + X²Y⁴ + X³Y³ + X⁴Y² + X⁵Y + X⁶",cat:"if-else",io:[{i:"1\n2",o:"127.000000"}],exp:"Thay vì cày chay gõ tay cả cụm công thức siêu dài, lập trình viên thông minh sẽ khai báo biến tích lũy `F = 0` và mở một vòng lặp `for (int i = 0; i <= 6; i++)`. Bên trong khối lặp, ép máy cộng dồn biểu thức dạng tổng quát: `F += pow(X, i) * pow(Y, 6 - i);`. Hệ thống sẽ tự cuốn dồn 7 số hạng lại cho ra đáp án hoàn hảo."},
{b:9,t:"code",lv:1,q:"Nhập điểm 3 môn Toán, Lý, Hóa. Tính tổng điểm và điểm trung bình.",cat:"if-else",io:[{i:"1\n2\n3",o:"6.000000\n2.000000"}],exp:"Nhập liệu 3 biến `float a, b, c`. Tạo biến `sum = a + b + c;`. Điểm trung bình được lấy chia cho số thực `avg = sum / 3.0;`. Bước cuối in cả hai biến ra màn hình với định dạng `%f`."},
{b:9,t:"code",lv:1,q:"Nhập 2 số thực X, Y. Tính A = X² + Y², B = (X+Y)², C = (X-Y)²",cat:"if-else",io:[{i:"1\n2",o:"5.000000\n9.000000\n1.000000"}],exp:"Trực tiếp chuyển các hằng đẳng thức đáng nhớ thành mã lệnh. `A = XX + YY;`, `B = (X+Y)(X+Y);`, và `C = (X-Y)(X-Y);`. Output sẽ in lần lượt A, B, C xuống 3 dòng."},
{b:9,t:"code",lv:1,q:"Nhập số nguyên n<8. Tính giai thừa n! sử dụng vòng lặp for.",cat:"loop",io:[{i:"1",o:"1"},{i:"5",o:"120"}],exp:"Giai thừa là tích các số tự nhiên liên tiếp. Cấu hình biến lưu trữ `long fact = 1;` (Tuyệt đối không khởi tạo bằng 0 vì nhân với 0 sẽ hỏng). Vòng lặp `for (int i = 1; i <= n; i++) { fact = fact * i; }`. Trả về `fact`."},
{b:9,t:"code",lv:2,q:"Nhập số nguyên n. Kiểm tra n có là số nguyên tố không. In 'La so nguyen to' hoặc 'Khong phai so nguyen to'.",cat:"loop",io:[{i:"1",o:"Khong phai so nguyen to"},{i:"7",o:"La so nguyen to"}],exp:"Nếu `n < 2` văng ngay kết quả \"Không phải\". Dùng biến cờ `int isPrime = 1;`. Ép một vòng `for` chạy `i` từ 2 đến căn bậc hai của `n` (`sqrt(n)`). Nếu tồn tại bất kỳ một số `i` nào làm cho `n % i == 0` (tức là n có thêm ước khác 1 và chính nó), giật cờ `isPrime = 0` và lệnh `break` nhảy khỏi vòng. Căn cứ vào cờ để in kết luận."},
{b:9,t:"code",lv:1,q:"Nhập số nguyên dương n<1000. Tính tổng các chữ số của n.",cat:"loop",io:[{i:"123",o:"6"},{i:"999",o:"27"}],exp:"Khởi tạo `sum = 0`. Mở vòng `while (n > 0)`. Bước 1: lấy phần đơn vị bằng cách cắt đuôi `% 10` và cộng vào sum (`sum += n % 10;`). Bước 2: chém bỏ vĩnh viễn phần đuôi đó đi bằng cách chia lấy nguyên cho 10 (`n = n / 10;`). Cứ thế vòng lặp gọt dần số n cho đến khi n bằng 0."},
{b:9,t:"code",lv:2,q:"Nhập 2 số nguyên dương a, b. Tìm ƯCLN và BCNN.",cat:"loop",io:[{i:"1\n2",o:"1\n2"},{i:"12\n8",o:"4\n24"}],exp:"Lưu giữ một bản copy `a_temp = a` và `b_temp = b`. Dùng vòng lặp `while (a != b) { if(a > b) a = a - b; else b = b - a; }` để ép tìm Ước chung lớn nhất (UCLN = a). Khi đã có UCLN, tính nhanh Bội chung nhỏ nhất theo công thức đại số vĩ đại: BCNN = (a\\_temp · b\\_temp/UCLN)."},
{b:9,t:"code",lv:2,q:"Nhập a, b, c. Giải phương trình bậc 2: ax² + bx+c=0. Xét cả a=0 và nghiệm phức. In nghiệm lớn trước.",cat:"if-else",io:[{i:"2\n-3\n1",o:"1.000000\n0.500000"},{i:"0\n0\n0",o:"Phuong trinh vo so nghiem"}],exp:"Nếu a=0, phương trình bị giáng cấp thành bậc nhất bx+c=0. Nếu a ≠q 0, tính = b · b - 4 · a · c. > 0: 2 nghiệm thực phân biệt (dùng hàm `sqrt(delta)`). Phải hoán đổi để đưa nghiệm lớn in trước. = 0: Nghiệm kép x = (-b/2a). < 0: Vô nghiệm (nghiệm phức), ở đề này yêu cầu báo vô nghiệm hoặc theo format phức nếu đề mở rộng."},
{b:9,t:"code",lv:2,q:"Nhập n (nguyên dương) và x (thực). Tính S1 = 1+x+x²+...+xⁿ, S2 = 1-x+x²-...+(-1)ⁿxⁿ, S3 = 1+x/1!+x²/2!+...+xⁿ/n!",cat:"loop",io:[{i:"1\n1.5",o:"2.500000\n-0.500000\n2.500000"}],exp:"Khởi tạo S_1, S_2, S_3 đều bằng 1.0. Chạy vòng lặp duy nhất `i` từ 1 tới `n`. Cần 2 biến tính nháp: `pow_x` nhân thêm `x` vào sau mỗi vòng, `fact_i` nhân thêm `i` vào sau mỗi vòng. S_1 += pow\\_x S_2 += pow(-1, i) · pow\\_x S_3 += (pow\\_x/fact\\_i)."},
{b:10,t:"code",lv:2,q:"Nhập mảng n số nguyên (n<10000). Sắp xếp tăng dần.",cat:"array",io:[{i:"11\n360 438 -491 274 -277 359 112 -219 199 -233 -56",o:"-491 -277 -233 -219 -56 112 199 274 359 360 438"}],exp:"Sử dụng hai vòng `for` lồng nhau kinh điển kiểu Sắp xếp nổi bọt (Bubble Sort) hoặc Sắp xếp chọn (Selection Sort). So sánh `a[i]` và `a[j]`, nếu `a[i] > a[j]` thì đẩy biến qua lại nhờ biến trung gian `temp` để kéo các số nhỏ trượt về đầu mảng."},
{b:10,t:"code",lv:2,q:"Nhập câu tiêu đề. Chuẩn hóa: xóa cách thừa, viết hoa. In <nội dung>:<độ dài>.",cat:"string",io:[{i:" Quan an bi xu phat ",o:"QUAN AN BI XU PHAT:18"}],exp:"Dùng `gets()` để hút toàn bộ xâu. Bước 1: Dùng vòng lặp tìm và băm nát các dấu khoảng trắng dư thừa ở đầu, cuối và ở giữa các từ. Bước 2: Chạy vòng lặp quét đè hàm `toupper()` lên từng ký tự để kích biến chúng thành in hoa hết. Bước 3: Đếm số khối còn lại bằng `strlen()` và ráp khuôn in `printf(\"%s:%d\", str, len)`."},
{b:10,t:"code",lv:3,q:"Nhập n tên học sinh. Chuẩn hóa: xóa cách thừa, viết hoa. In mỗi tên dạng <họ tên>:<độ dài>.",cat:"string",io:[{i:"3\nlo \n lo ho dao \n giang thanh vu ",o:"LO:2\nLO HO DAO:9\nGIANG THANH VU:14"}],exp:"Nhập số lượng `n`. Gọi một vòng lặp lớn chạy `n` lần. Trong mỗi lần vòng lặp, chạy chức năng nhúng xóa khoảng cách, ép UpperCase và đo chiều dài cho mảng `char name[100]` giống hệt thuật toán của Câu 333."},
{b:9,t:"code",lv:2,q:"Nhập 3 số a, b, c. Kiểm tra có phải 3 cạnh tam giác không. Nếu đúng xác định loại. In 'LA 3 CANH TAM GIAC <loại>' hoặc 'KHONG PHAI LA 3 CANH TAM GIAC'.",cat:"if-else",io:[{i:"3\n4\n5",o:"LA 3 CANH TAM GIAC VUONG"}],exp:"Mệnh đề sống còn: `(a+b>c) && (a+c>b) && (b+c>a)`. Nếu đúng, bắt đầu lọc rẽ nhánh: Đều: `a==b && b==c` Cân: `a==b || a==c || b==c` Vuông: Ứng dụng Pytago a^2 = b^2 + c^2 (kiểm tra xoay vòng cả 3 cạnh). Chú ý nếu biến là `float`, phải dùng sai số ép kiểu. Thường: Các trường hợp rớt lại."},
{b:9,t:"code",lv:1,q:"Nhập số nguyên 0 - 9. In chữ tương ứng (KHONG, MOT,...CHIN). Nếu ngoài phạm vi in 'SO KHONG HOP LE'.",cat:"if-else",io:[{i:"5",o:"NAM"},{i:"10",o:"SO KHONG HOP LE"}],exp:"Xây dựng khung `switch(n)`. Đổ 10 ngách từ `case 0:` in \"KHONG\" đến `case 9:` in \"CHIN\". Tuyệt đối không quên chốt `break;` ở mỗi tầng. Ở phần đáy, bố trí bộ lọc `default: printf(\"SO KHONG HOP LE\");` để bắt các ca lạc loài."},
{b:9,t:"code",lv:2,q:"Nhập epsilon<1. Tính số e = 1 + 1/1!+1/2!+1/3!+... Dừng khi 1/n! < epsilon.",cat:"loop",io:[{i:"0.001",o:"2.718282"}],exp:"Cho `e = 1.0`, `fact = 1.0`, `i = 1`. Lắp một vòng `while ( (1.0 / fact) >= epsilon )`. Trong dạ dày vòng lặp, liên tục nâng cấp biến `e += 1.0 / fact`, sau đó nhảy nấc `i++` và cuộn dồn `fact *= i`. Khi chuỗi tụt sâu bé hơn sai số , vòng lặp tự vỡ và tung ra đáp án e ≈ 2.718."},
{b:9,t:"code",lv:2,q:"Dùng while/do-while tính PI theo: PI/4 = 1 - 1/3 + 1/5 - 1/7+... Dừng khi sai số < epsilon (0<epsilon<1).",cat:"loop",io:[{i:"0.0001",o:"3.141593"}],exp:"Cho `sum = 0.0`, mẫu số lẻ `n = 1`, và công tắc dấu `sign = 1`. Cài vòng lặp `while ( (1.0 / n) >= epsilon )`. Bên trong, `sum += sign * (1.0 / n)`. Đảo chiều công tắc `sign = -sign;` và đẩy bước nhảy nhảy cóc số lẻ `n += 2`. Hết vòng lặp lấy sum × 4 để ra độ dài số ."},
{b:9,t:"code",lv:2,q:"Nhập dãy số thực (nhập 0 để kết thúc). Tính trung bình cộng, tìm max và min của dãy.",cat:"loop",io:[{i:"3\n1\n5\n2\n0",o:"2.750000\n5.000000\n1.000000"}],exp:"Bơm một vòng `while(1)` vô hạn. Dùng `scanf` hút số `x`. Nếu `x == 0`, văng `break`. Tại con số đầu tiên, ép mốc cài đặt cả `max` và `min` bằng chính số đó. Ở các số sau, cuộn `sum += x`, đếm `count++`. Liên tục check ép ranh giới: nếu `x > max` đè max, nếu `x < min` đè min. Chót cùng chia `sum / count`."},
{b:9,t:"code",lv:1,q:"Nhập số thực dương. Làm tròn đến hàng đơn vị, in 6 chữ số thập phân.",cat:"if-else",io:[{i:"10.5",o:"11.000000"},{i:"10.2",o:"10.000000"}],exp:"Thuật toán kinh điển để ép làm tròn thủ công trong C: `n = (int)(x + 0.5);` (Nếu phần thập phân ≥ 0.5, việc cộng dồn sẽ đẩy số nhảy lên nấc phần nguyên tiếp theo, còn nhỏ hơn thì bị ép kiểu loại bỏ). Sau đó ép kiểu trả lại `(float)n` và in ra bằng cờ `%.6f`."},
{b:12,t:"code",lv:2,q:"Tìm các số hoàn hảo (perfect number) nhỏ hơn n. Số hoàn hảo = tổng các ước thực sự.",cat:"function",io:[{i:"10",o:"6"},{i:"500",o:"6 28 496"}],exp:"Gọi vòng lặp duyệt từng số `i` từ 1 tới `n-1`. Với mỗi số `i`, triệu hồi một biến `sum = 0`. Quét lại vòng lặp con từ `j = 1` đến `i/2` để check nghiệm ước số (nếu `i % j == 0` thì `sum += j`). Ráp kết quả: Nếu sau vòng con mà `sum == i` (VD: số 6 = 1+2+3), đó là Perfect Number, lệnh máy in số `i` ra.",skip:"ham"},
{b:10,t:"code",lv:2,q:"Cho mảng N số nguyên (N<100). In các số chẵn hoàn toàn (mọi chữ số đều chia hết cho 2).",cat:"array",io:[{i:"5\n11 22 33 44 55",o:"22 44"},{i:"5\n10 20 30 40 50",o:"20 40"}],exp:"Rải vòng `for` duyệt mảng. Viết một hàm Boolean `Check(int x)`: móc từng chữ số của x thông qua phép `% 10` và `/ 10`. Nếu vấp phải bất kỳ chữ số nào `% 2 != 0`, hàm lập tức phất cờ False. Nếu hàm lướt sạch sành sanh con số mà không vấp, in chốt số x đó ra màn hình."},
{b:10,t:"code",lv:2,q:"Cho mảng N số nguyên. In các số 'cân bằng' (số lượng chữ số lẻ = số lượng chữ số chẵn).",cat:"array",io:[{i:"5\n12 23 34 45 56",o:"12 23 34 45 56"}],exp:"Tương tự câu trên, lập hàm đếm độc lập cho mỗi số x. Cắt vòng `while(x)`. Lấy x \\% 10, nếu chẵn thì biến `countEven++`, nếu lẻ thì `countOdd++`. Xử lý xong, ném lên bàn cân, nếu `countEven == countOdd`, số đó được xác nhận \"cân bằng\" và ném ra Output."},
{b:9,t:"code",lv:2,q:"Nhập lãi suất r(%), vốn p, thời hạn n năm (cách bởi dấu phẩy). In vốn tích lũy từng năm: 'Von tich luy nam thu X: Y'.",cat:"loop",io:[{i:"50,100,3",o:"Von tich luy nam thu 1: 150\nVon tich luy nam thu 2: 225\nVon tich luy nam thu 3: 338"}],exp:"Phân tách hàm `scanf(\"%f,%f,%d\", &r, &p, &n)`. Kéo một vòng `for` chạy `i` từ 1 tới `n`. Mỗi chu kỳ, vốn đẻ ra một cục tiền mới: `p = p + (p * r / 100.0);`. Báo cáo sổ sách ngay lập tức: `printf(\"Von tich luy nam thu %d: %d\", i, (int)p);`."},
{b:9,t:"code",lv:3,q:"Nhập n nghìn đồng (n>5). Đổi ra 1000/2000/5000 VNĐ sao cho 2000 chiếm hơn nửa, tổng tờ ít nhất. In '<a> to 1000, <b> to 2000, <c> to 5000'.",cat:"if-else",io:[{i:"10",o:"0 to 1000, 5 to 2000, 0 to 5000"}],exp:"Bài toán tìm tối ưu tổ hợp tiền mệnh giá 1x + 2y + 5z = n. Vì số tờ 2000 (y) phải chiếm hơn một nửa tổng số tờ, và đòi hỏi tổng tờ ít nhất, lập trình viên phải cho vòng lặp chạy vét cạn các trường hợp có thể của z (tờ 5k) từ cao xuống thấp để ưu tiên ít tờ, sau đó dò bù y và x, lấy bộ nào vượt biên kiểm soát điều kiện sớm nhất."},
{b:9,t:"code",lv:1,q:"Nhập 2 ký tự, in khoảng cách trên bảng ASCII (có thể âm/dương).",cat:"if-else",io:[{i:"ye",o:"20"},{i:"gg",o:"0"}],exp:"Cực kỳ đơn giản. Chỉ việc khai báo 2 biến `char c1, c2`. Do C tự động ép biến `char` về các con số mã hóa chuẩn sau lưng, ta chỉ việc thực thi phép trừ đại số thô bạo: `printf(\"%d\", c1 - c2);`."},
{b:10,t:"code",lv:2,q:"Nhập mảng tối đa 10 số nguyên. In phần tử bé nhất và tổng số chẵn (0 nếu không có).",cat:"array",io:[{i:"5\n1 2 3 4 5",o:"1 6"},{i:"5\n1 1 1 1 1",o:"1 0"}],exp:"Nhét số liệu vào array. Trói mốc `min = a[0]` và `sum_even = 0`. Khua vòng lặp dọc mảng, rẽ nhánh kép: Nhánh 1 nếu `a[i] < min` thì soán ngôi `min = a[i]`. Nhánh 2 nếu `a[i] % 2 == 0` thì gom tiền `sum_even += a[i]`. Ép in 2 con số lên 1 hàng."},
{b:10,t:"code",lv:2,q:"Nhập dãy bit nhị phân (tối đa 16 bit, dạng xâu). In số thập phân tương ứng: 'Decimal: <giá trị>'.",cat:"string",io:[{i:"1111",o:"Decimal: 15"},{i:"11111111",o:"Decimal: 255"}],exp:"Hút dãy nhị phân bằng xâu `char str[17]`. Cài một biến `decimal = 0`. Quét vòng lặp từ đầu xâu tới đuôi. Mỗi bước, đẩy thanh nhớ lên 1 nấc nhị phân bằng cách dịch bit hoặc nhân đôi (`decimal = decimal * 2`), rồi cộng với giá trị của bit hiện tại (`str[i] - '0'`). Đáp số bung ra dạng int chuẩn."},
{b:9,t:"code",lv:2,q:"Tính số bộ ba Pytago (a,b,c) thỏa a² + b²=c² với mọi cạnh ≤ 100.",cat:"loop",io:[{i:"",o:"So bo ba Pytago la: 50"}],exp:"Nhồi ba vòng lặp `for` lồng nhau sâu hoắm: `a` từ 1 tới 100, `b` từ `a` tới 100 (tránh tính trùng lặp), `c` từ `b` tới 100. Điểm huyệt tại trung tâm: `if (aa + bb == c*c) count++;`. Hệ thống cày bừa vài chục ngàn phép tính và ói ra đáp số đếm được là 50."},
{b:10,t:"code",lv:1,q:"Tính tổng bình phương các số âm trong mảng số nguyên.",cat:"array",io:[{i:"5\n3 1 -2 -2 5",o:"8"},{i:"3\n1 2 3",o:"0"}],exp:"Kích hoạt biến kho `sum = 0`. Di càn qua mảng, bắn tín hiệu lọc `if (a[i] < 0)`. Khi tìm trúng tội phạm số âm, lôi nó ra nạp bình phương và xung công quỹ `sum += a[i] * a[i];`."},
{b:10,t:"code",lv:2,q:"Cho xâu s và ký tự k. Xóa tất cả k trong s nếu k xuất hiện, ngược lại in s ban đầu.",cat:"string",io:[{i:"clbhtht\nh",o:"clbtt"}],exp:"Cầm con trỏ ghi `j = 0` và trỏ đọc `i = 0` đi dọc theo xâu `s`. Nếu ký tự `s[i]` KHÔNG PHẢI là ký tự cấm `k`, ta mới cho phép chép nó vào kho an toàn `s[j] = s[i]` và nhích con trỏ ghi `j++`. Ký tự cấm sẽ bị ngó lơ. Cuối cùng đóng rào xâu bằng `s[j] = '\\0'`."},
{b:9,t:"code",lv:1,q:"Nhập tọa độ (x,y). Xác định điểm nằm ở góc phần tư nào, trên trục, hay trùng gốc O.",cat:"if-else",io:[{i:"0\n0",o:"A trung O"},{i:"1\n2",o:"Goc phan tu thu nhat"}],exp:"Xây lưới `If-else`: Trùng tâm: `x==0 && y==0` Nằm bám trục: `x==0` (trục tung Oy), `y==0` (trục hoành Ox). Góc 1: `x>0 && y>0`. Góc 2: `x<0 && y>0`. Góc 3: `x<0 && y<0`. Góc 4: `x>0 && y<0`."},
{b:9,t:"code",lv:2,q:"Nhập tâm (xC,yC), bán kính R, điểm M(xM,yM). Xác định M nằm trong/trên/ngoài đường tròn.",cat:"if-else",io:[{i:"0 0\n5\n0 5",o:"Diem M nam tren duong tron tam C"}],exp:"Đo bình phương khoảng cách để tránh sai số rút căn: d^2 = (xM - xC)^2 + (yM - yC)^2. Đặt lên bàn cân đọ sức với R^2: Nếu d^2 == R^2: Bám trên vành. Nếu d^2 < R^2: Nằm lọt thỏm bên trong. Nếu d^2 > R^2: Văng xa ra ngoài."},
{b:9,t:"code",lv:2,q:"Nhập 3 cạnh tam giác (số thực). Kiểm tra hợp lệ, xác định loại (vuông/nhọn/tù), tính diện tích.",cat:"if-else",io:[{i:"3 4 5",o:"Ba canh 3.00, 4.00, 5.00 tao thanh mot tam giac vuong.\nDien tich tam giac la S = 6.00"}],exp:"Chặn cổng bằng bất đẳng thức tam giác. Tính góc tù/nhọn bằng Hệ quả định lý Cosin (a^2 > b^2 + c^2 là Tù, nhỏ hơn là Nhọn). Để bào ra diện tích nhanh nhất, lập trình viên móc công thức Heron: Nửa chu vi p = (a+b+c)/2, S = √(p(p-a)(p-b)(p-c))."},
{b:10,t:"code",lv:2,q:"Cho mảng N số nguyên. In vị trí các số nguyên tố và đếm số nguyên tố < 2022.",cat:"array",io:[{i:"8\n5 12 7 23 8 11 2020 3000",o:"Cac so nguyen to trong mang co vi tri: 0 2 3 5\nSo luong so nguyen to nho hon 2022: 4"}],exp:"Lập cái sàng lọc chuẩn (Hàm check Prime). Rải đinh vòng `for`. Vừa đi vừa bắt: Trúng số nguyên tố thì chộp ngay MÃ CHỈ SỐ `i` để in ra. Đoạn đếm phụ phải cài lồng lệnh `if (a[i] < 2022) count++;`."},
{b:10,t:"code",lv:2,q:"Cho mảng N số nguyên. In số lớn thứ 2. Nếu không có in 'Khong co so lon thu hai trong mang.'",cat:"array",io:[{i:"8\n5 12 7 23 8 11 2020 3000",o:"So lon thu hai trong mang la: 2020"},{i:"2\n1 1",o:"Khong co so lon thu hai trong mang."}],exp:"Tuyệt chiêu càn quét mảng 2 đợt. Pass 1: Tìm ông Vua bảng `max1`. Pass 2: Setup một phó tướng `max2` mang giá trị cực nhỏ. Duyệt lại mảng, nếu `a[i] < max1` VÀ `a[i] > max2`, thì phó tướng soán ngôi đổi chỗ liên tục. Nếu càn xong phó tướng vẫn vô hình (ví dụ mảng toàn số 1), báo lỗi bảng."},
{b:12,t:"code",lv:2,q:"Cho mảng N số nguyên. Đếm và in số lượng số nguyên tố: 'So luong so nguyen to co trong day la: <n>'.",cat:"function",io:[{i:"8\n5 12 7 23 8 11 2020 3000",o:"So luong so nguyen to co trong day la: 4"}],exp:"Code tương tự câu 355, giật rọi cái túi `count = 0`, luồn sâu vào mảng ném từng số vào cối xay hàm Prime. Đúng thì +1, trật thì kệ. In ra túi `count`.",skip:"ham"},
{b:12,t:"code",lv:2,q:"Nhập n (n<10^7). Kiểm tra nguyên tố. Nếu không, tìm số nguyên tố gần nhất bé hơn n.",cat:"function",io:[{i:"91",o:"91 khong la so nguyen to.\nSo nguyen to gan nhat va be hon 91 la 89."},{i:"101",o:"101 la so nguyen to."}],exp:"Đút `n` vào kiểm tra. Bị văng False thì làm gì? Kéo một vòng `while (n > 1)` theo chiều nghịch, cứ mỗi nhịp trừ đi 1 (`n--`). Đâm đầu nạp số mới vào check Prime liên tục. Con số đầu tiên nào nổ pháo hoa True, khóa lệnh bung mốc kết quả.",skip:"ham"},
{b:10,t:"code",lv:3,q:"Cho mảng N số nguyên (N<1000). Xóa các phần tử trùng giá trị max, giữ phần tử đầu tiên. In mảng mới.",cat:"array",io:[{i:"5\n-2 0 0 -5 -1",o:"-2 0 -5 -1"},{i:"9\n2 2 2 2 2 2 2 2 2",o:"2"}],exp:"Phải chơi 2 bước. Bước 1 bóc ra giá trị `max`. Bước 2, dùng cờ vây `int first_seen = 0`. Quét lại mảng, trúng `max` lần đầu thì thả cờ `first_seen = 1` cho sống. Từ lần thứ 2 đụng `max`, bật dao mổ: lôi nguyên toàn khối mảng phía tay phải đè dội ngược lên 1 ô để chôn sống tảng max đó, và rút chiều dài n đi 1 nấc `n--`."},
{b:10,t:"code",lv:2,q:"Cho mảng N số nguyên (N<1000). In các phần tử có giá trị phân biệt theo thứ tự xuất hiện.",cat:"array",io:[{i:"5\n1 2 3 4 5",o:"1 2 3 4 5"},{i:"7\n-2 3 4 1 3 -2 1",o:"-2 3 4 1"}],exp:"Với mỗi ô `a[i]` đang nhìn chằm chằm, ném một vòng lặp con quét lùi về phía sau lưng nó từ `j = 0` tới `i-1`. Nếu nó soi thấy có con clone `a[j] == a[i]` đã xuất hiện trong quá khứ, vứt bỏ ngay lệnh in. Chỉ cho in nếu đoạn mã lưng sạch sẽ không trùng lặp."},
{b:1,t:"mcq",lv:2,q:"Xác định số thực X có dạng biểu diễn theo chuẩn IEEE754 32 bit:\n0011 1111 0110 0000 0000 0000 0000 0000",o:["0.875","0.125","1.875","-1.875"],exp:"Bit dấu rớt cờ 0 (số dương). Bóc 8 bit theo sau làm Mũ: `01111110` rã thành số thập phân là 126. Số lệch E = 126 - 127 = -1. Cụm 23 bit Phần định trị chỉ có đúng rễ đầu là 11, tức phần mantissa là 1.11_2. Ốp công thức: X = 1.11_2 × 2^-1 = 0.111_2 = 0.5 + 0.25 + 0.125 = 0.875."},
{b:10,t:"mcq",lv:2,q:"Trong ngôn ngữ lập trình C, để kiểm tra xâu Str là xâu rỗng, biểu thức nào sau đây là sai?",o:["strcmp(Str,\"\") <> 0","Str[0]=='\\0'","strlen(Str)==0","strcmp(Str,\"\")==0"],exp:"Trong luật rừng của C, dấu \"khác nhau\" được khắc bằng tổ hợp `!=`. Dấu `<>` là tàn dư ngôn ngữ của phe phái Pascal hoặc SQL, xách qua gõ trong C sẽ bị trình biên dịch nhổ toẹt (Syntax Error) tức khắc."},
{b:12,t:"mcq",lv:3,q:"Chỉ ra kết quả hiển thị khi thực hiện:\nint f(int a,int b){while(a!=b) if(a>b)a=a-b;else b=b-a;return a;}\nprintf(\"%d\",f(25,f(30,45)));",o:["5","30","3","15"],exp:"Câu này tái sinh y chang hai câu đệ quy UCLN phía trên, chỉ thay số. Phá kén kẹp trong: Gọi giải thuật đẽo cọc tìm UCLN của cặp (30, 45) văng ra 15. Phá kén ngoài: Cầm số 15 lùa vô UCLN với 25, băm nhát cuối lòi ra số 5.",skip:"ham"},
{b:12,t:"mcq",lv:2,q:"Cho hàm fun:\nint fun(int k){return k==0?1:2*fun(k-1);}\nTính fun(5)?",o:["32","64","24","16"],exp:"Đệ quy hàm mũ gốc 2 tiếp tục giáng lâm. Kéo lồng từ fun(5) nhả sấp ngửa dần xuống fun(0) = 1. Tổng đoạn dội lại là 2 × 2 × 2 × 2 × 2 × 1. Móc theo bảng lũy thừa 2, đáp án nổ mốc 32.",skip:"ham"},
{b:7,t:"mcq",lv:3,q:"Cho biết giá trị biến a:\nint a=15;\nif(a=15^(a>8)) a+=5;\nelse a-=5;",o:["19","10","6","-5"],exp:"Bài tập gài bẫy chết người ở hai toán tử. Trong ngoặc vuông `(a>8)` đúng, trả ra 1. Khối `15 ^ 1` áp phép XOR bitwise: 15 (1111) XOR 1 (0001) làm bit đuôi nổ ngược thành 0, rớt xuống 14 (1110). Điểm chốt lừa bịp: `a = 14` là lệnh GÁN, băm nát số 15 thành 14. Lệnh gán này phang ra giá trị khác 0 nên nó được định nghĩa là True, chui lọt cổng `if`, vớt cú chót `a += 5`, kéo a leo lại 19."},
{b:11,t:"mcq",lv:2,q:"Chọn cách khai báo struct đúng trong C:",o:["struct{char Ten[20];unsigned NS; }SV;","struct{char Ten[20];unsigned NS;}SinhVien;struct SinhVien SV;","typedef SinhVien{char Ten[20];unsigned NS;}SinhVien SV;","typedef struct{char Ten[20];unsigned NS;}SV;"],exp:"Ngữ pháp C cho phép khai báo cực đoan một cấu trúc \"vô danh\" (anonymous struct) bằng cách không thèm đặt mác tên struct, mà chỉ xây khung đóng ngoặc nhọn, rồi gắn chết khai sinh thẳng ra biến cấu trúc tên `SV` ở ngay cuối dòng.",skip:"struct"},
{b:1,t:"mcq",lv:2,q:"Số nhị phân 1110101001.1011 có biểu diễn trong hệ 16 là:",o:["3A9.B","528.F","1B7.D","Sai hết"],exp:"Phanh thây mảng bit từ giữa dấu chấm tách ra 2 phía, chẻ nhóm 4. Bên trái: `1001` ra 9; `1010` ra A; phần xót `11` đắp bù `00` thành `0011` ra 3. Ráp vế trái: 3A9. Chuyển vế phải thập phân, nhóm 4 bit tóm dính `1011` vác sang hệ Hex nặn thành B. Kết dính: 3A9.B."},
{b:2,t:"mcq",lv:2,q:"Phát biểu nào SAI về bộ nhớ?",o:["Dung lượng cache lớn hơn RAM","Tốc độ bộ nhớ trong nhanh hơn ngoài","Nội dung ngăn nhớ thay đổi nhưng địa chỉ cố định","RAM mất khi mất điện"],exp:"Đi ngược định lý vàng của tháp bộ nhớ. Cache là mảnh linh kiện gắn tịt trên main vi mạch của CPU được độ từ các bóng bán dẫn siêu dẫn Static-Ram, đắt lòi mắt. Dung lượng của nó chỉ đo bằng li nhỏ xíu vài chục MB, mỏng hơn hàng nghìn lần so với các tảng RAM DDR 16GB, 32GB hiện tại."},
{b:14,t:"mcq",lv:1,q:"Phần mở rộng mặc định của tệp Microsoft Word từ phiên bản 2007 trở đi là gì?",o:[".docx",".doc",".dotx",".docm"],exp:"Từ phiên bản 2007, Microsoft Word chuyển sang định dạng mặc định .docx dựa trên chuẩn Office Open XML, thay thế định dạng .doc cũ. Định dạng .dotx là tệp mẫu (template), còn .docm là tệp Word có chứa macro. Việc sử dụng .docx giúp giảm dung lượng tệp và tăng khả năng tương thích."},
{b:14,t:"mcq",lv:1,q:"Theo quy chuẩn văn bản hành chính Việt Nam thường áp dụng tại HUST, lề trái của trang văn bản A4 được đặt bằng bao nhiêu?",o:["35mm","25mm","20mm","30mm"],exp:"Theo Nghị định 30/2020/NĐ-CP về công tác văn thư và quy chuẩn thường áp dụng tại HUST, lề trái trang A4 được đặt 35mm. Kích thước này lớn hơn các lề còn lại nhằm đảm bảo phần gáy văn bản không bị mất chữ khi đóng bìa hoặc đóng gáy lò xo. Các lề còn lại thường là: lề trên 20-25mm, lề dưới 20-25mm, lề phải 15-20mm."},
{b:14,t:"mcq",lv:2,q:"Khi soạn thảo văn bản trong Word, phím Enter được sử dụng đúng cách khi nào?",o:["Khi kết thúc một đoạn văn bản (paragraph)","Khi muốn xuống dòng bất kỳ vị trí nào trong câu","Khi kết thúc mỗi dòng văn bản hiển thị trên màn hình","Khi muốn tạo khoảng cách giữa hai từ trong cùng một dòng văn bản"],exp:"Trong Word, phím Enter chỉ nên sử dụng khi kết thúc một đoạn văn bản (paragraph), tức là khi muốn bắt đầu một đoạn mới. Word tự động xuống dòng khi văn bản chạm lề phải, nên không cần nhấn Enter cuối mỗi dòng. Nếu cần xuống dòng mà không tạo đoạn mới, dùng Shift+Enter để tạo ngắt dòng mềm (line break)."},
{b:14,t:"mcq",lv:1,q:"Tổ hợp phím Ctrl+B trong Microsoft Word có chức năng gì?",o:["In đậm văn bản đang chọn","In nghiêng văn bản đang chọn","Gạch chân văn bản","Thay đổi phông chữ và cỡ chữ của văn bản đang được chọn"],exp:"Ctrl+B là phím tắt cho chức năng Bold (in đậm) trong Microsoft Word. Ctrl+I dùng để in nghiêng (Italic), còn Ctrl+U dùng để gạch chân (Underline). Đây là ba phím tắt định dạng ký tự cơ bản nhất mà người dùng Word cần ghi nhớ."},
{b:14,t:"mcq",lv:2,q:"Để tạo Mục lục tự động (Table of Contents) trong Word, người dùng cần áp dụng gì cho các tiêu đề?",o:["Các kiểu Heading (Heading 1, Heading 2,...)","Định dạng Bold và tăng cỡ chữ","Bullet and Numbering cho từng tiêu đề","Chèn Bookmark tại mỗi vị trí tiêu đề rồi liên kết thủ công với mục lục"],exp:"Word tạo mục lục tự động (Table of Contents) bằng cách quét toàn bộ tài liệu và thu thập các đoạn văn được gán kiểu Heading 1, Heading 2, Heading 3. Việc chỉ in đậm hoặc tăng cỡ chữ không giúp Word nhận diện tiêu đề, vì đó chỉ là định dạng trực tiếp chứ không phải style. Người dùng cần áp dụng đúng các style Heading trước khi chèn mục lục từ thẻ References."},
{b:14,t:"mcq",lv:1,q:"Tổ hợp phím Ctrl+Z trong Word có tác dụng gì?",o:["Hoàn tác thao tác vừa thực hiện","Lưu tài liệu hiện tại","Chọn toàn bộ văn bản","Đóng cửa sổ tài liệu và thoát khỏi chương trình Word"],exp:"Ctrl+Z là phím tắt cho lệnh Undo (hoàn tác), cho phép quay lại trạng thái trước khi thực hiện thao tác gần nhất. Có thể nhấn Ctrl+Z nhiều lần liên tiếp để hoàn tác nhiều thao tác. Ngược lại, Ctrl+Y hoặc Ctrl+Shift+Z dùng để làm lại thao tác đã hoàn tác (Redo). Ctrl+S mới là phím tắt để lưu tài liệu."},
{b:14,t:"mcq",lv:2,q:"Chức năng Mail Merge trong Word được sử dụng để làm gì?",o:["Trộn thư hàng loạt từ một mẫu và nguồn dữ liệu","Gửi email trực tiếp từ Word","Hợp nhất nhiều tệp Word thành một","Tạo bản sao lưu tự động của tài liệu rồi gửi qua thư điện tử"],exp:"Mail Merge (trộn thư) cho phép tạo hàng loạt văn bản cùng một mẫu nhưng khác nhau về dữ liệu cá nhân như tên, địa chỉ, số điện thoại. Tính năng này kết hợp một tệp mẫu (main document) với một nguồn dữ liệu (data source) như tệp Excel hoặc Access. Mail Merge không phải là chức năng gửi email hay hợp nhất nhiều tệp Word."},
{b:14,t:"mcq",lv:1,q:"Quy tắc gõ dấu câu (chấm, phẩy, chấm hỏi) đúng trong soạn thảo văn bản là gì?",o:["Đặt sát từ đứng trước, cách một khoảng trắng với từ đứng sau","Cách một khoảng trắng cả trước và sau dấu câu","Đặt sát cả từ trước và từ sau","Cách hai khoảng trắng phía trước và một khoảng trắng phía sau dấu câu"],exp:"Quy tắc chuẩn khi gõ dấu câu (dấu chấm, phẩy, chấm hỏi, chấm than) là đặt sát ký tự cuối cùng của từ đứng trước và cách một khoảng trắng với từ đứng sau. Việc thêm khoảng trắng trước dấu câu là lỗi phổ biến khiến văn bản thiếu chuyên nghiệp. Quy tắc này áp dụng cho hầu hết các ngôn ngữ, bao gồm tiếng Việt và tiếng Anh."},
{b:14,t:"mcq",lv:2,q:"Tổ hợp phím Ctrl+H trong Microsoft Word dùng để thực hiện thao tác gì?",o:["Mở hộp thoại Find and Replace","Mở hộp thoại định dạng Header","Chèn Hyperlink vào văn bản","Mở hộp thoại Page Setup để thiết lập thông số trang in"],exp:"Ctrl+H mở hộp thoại Find and Replace (Tìm và Thay thế), cho phép tìm kiếm một chuỗi ký tự và thay thế bằng chuỗi khác trong toàn bộ tài liệu. Đây là công cụ rất hữu ích khi cần sửa lỗi hàng loạt hoặc thay đổi thuật ngữ thống nhất. Phím tắt Ctrl+F chỉ mở chức năng Tìm kiếm (Find), không có phần Thay thế."},
{b:14,t:"mcq",lv:3,q:"Khi muốn đặt số trang bắt đầu khác nhau cho từng phần trong cùng một tài liệu Word, cần sử dụng tính năng nào?",o:["Section Break để chia tài liệu thành các section riêng biệt","Page Break để ngắt trang tại vị trí mong muốn","Column Break để tạo ngắt cột","Chèn Header khác nhau cho mỗi trang bằng cách bỏ liên kết tất cả các trang"],exp:"Section Break chia tài liệu thành các phần (section) độc lập, mỗi phần có thể thiết lập định dạng trang riêng như số trang, hướng giấy, lề và header/footer khác nhau. Page Break chỉ đơn giản ngắt sang trang mới mà không tạo phần mới, nên không cho phép đặt số trang khác nhau. Đây là tính năng quan trọng khi soạn luận văn, báo cáo có trang bìa không đánh số trang."},
{b:14,t:"mcq",lv:1,q:"Định dạng tệp .dotx trong Microsoft Word là gì?",o:["Tệp mẫu (Template) của Word","Tệp văn bản thông thường của Word","Tệp Word có chứa macro","Tệp sao lưu tự động được tạo khi Word bị đóng đột ngột"],exp:"Định dạng .dotx là tệp mẫu (template) của Word, chứa các thiết lập sẵn về bố cục, kiểu chữ, màu sắc và nội dung mẫu để tạo nhanh các văn bản có cấu trúc thống nhất. Khi mở tệp .dotx, Word sẽ tạo một tài liệu mới dựa trên mẫu đó thay vì mở chính tệp mẫu để chỉnh sửa. Định dạng .docx là tệp văn bản thông thường, còn .docm là tệp có chứa macro."},
{b:14,t:"mcq",lv:2,q:"Khổ giấy A4 có kích thước chuẩn là bao nhiêu?",o:["210mm × 297mm","216mm × 279mm","200mm × 300mm","215mm × 280mm"],exp:"Khổ giấy A4 theo tiêu chuẩn quốc tế ISO 216 có kích thước chính xác là 210mm x 297mm. Kích thước 216mm x 279mm là khổ giấy Letter phổ biến tại Mỹ, không phải A4. Tỷ lệ các khổ giấy trong hệ A được thiết kế sao cho khi gấp đôi tờ giấy theo chiều dài sẽ được khổ tiếp theo (A3 gấp đôi thành A4)."},
{b:14,t:"mcq",lv:1,q:"Tổ hợp phím Ctrl+A trong Word có tác dụng gì?",o:["Chọn toàn bộ nội dung văn bản","Căn lề trái cho đoạn văn","Mở hộp thoại lưu tệp","Chèn một ký tự đặc biệt vào vị trí con trỏ hiện tại"],exp:"Ctrl+A là phím tắt cho lệnh Select All, chọn toàn bộ nội dung trong tài liệu Word bao gồm văn bản, hình ảnh và các đối tượng khác. Phím tắt Ctrl+L dùng để căn lề trái, Ctrl+S dùng để lưu tệp. Sau khi chọn toàn bộ bằng Ctrl+A, người dùng có thể áp dụng định dạng hoặc thao tác cho tất cả nội dung cùng lúc."},
{b:14,t:"mcq",lv:2,q:"Để chèn Header và Footer trong Word, người dùng vào thẻ nào trên thanh Ribbon?",o:["Insert","Home","Page Layout","References"],exp:"Header và Footer được chèn từ thẻ Insert trên thanh Ribbon, trong nhóm Header & Footer. Thẻ Home chứa các công cụ định dạng văn bản cơ bản, thẻ Page Layout (hoặc Layout) dùng để thiết lập trang, còn thẻ References dùng cho mục lục, chú thích và trích dẫn."},
{b:14,t:"mcq",lv:3,q:"Trong Word, khi sử dụng tính năng Line Spacing, giá trị 1.5 lines có ý nghĩa gì?",o:["Khoảng cách giữa các dòng bằng 1,5 lần dòng đơn","Khoảng cách trước đoạn là 1,5 dòng","Khoảng cách sau đoạn là 1,5 dòng","Tổng khoảng cách trước và sau đoạn văn bản cộng lại bằng 1,5 dòng"],exp:"Line Spacing 1.5 lines nghĩa là khoảng cách giữa các dòng trong cùng một đoạn văn bằng 1,5 lần khoảng cách dòng đơn (single spacing). Đây là cài đặt phổ biến trong văn bản hành chính và luận văn tại Việt Nam. Cần phân biệt Line Spacing (khoảng cách dòng trong đoạn) với Spacing Before/After (khoảng cách trước/sau đoạn), đây là hai thiết lập hoàn toàn khác nhau."},
{b:14,t:"mcq",lv:1,q:"Phần mềm mã nguồn mở nào là ứng dụng soạn thảo văn bản thay thế cho Microsoft Word?",o:["OpenOffice Writer","Google Chrome","Adobe Reader","Microsoft Excel"],exp:"OpenOffice Writer là phần mềm soạn thảo văn bản mã nguồn mở, miễn phí, có thể thay thế Microsoft Word với các tính năng tương đương. Ngoài ra, LibreOffice Writer cũng là một lựa chọn phổ biến khác. Google Chrome là trình duyệt web, Adobe Reader là phần mềm đọc PDF, còn Microsoft Excel là phần mềm bảng tính, không phải phần mềm soạn thảo văn bản."},
{b:14,t:"mcq",lv:2,q:"Trong Word, chế độ Portrait và Landscape khác nhau ở điểm nào?",o:["Portrait là trang dọc, Landscape là trang ngang","Portrait là trang ngang, Landscape là trang dọc","Portrait dùng cho in màu, Landscape dùng cho in trắng đen","Portrait hiển thị một cột văn bản còn Landscape hiển thị hai cột văn bản"],exp:"Portrait (dọc) là chế độ trang có chiều cao lớn hơn chiều rộng, thường dùng cho văn bản thông thường. Landscape (ngang) là chế độ trang có chiều rộng lớn hơn chiều cao, phù hợp cho bảng biểu rộng hoặc hình ảnh ngang. Hai chế độ này không liên quan đến việc in màu hay in trắng đen, cũng không liên quan đến số cột văn bản."},
{b:14,t:"mcq",lv:2,q:"Tổ hợp phím nào dùng để dán nội dung đã sao chép trong Word?",o:["Ctrl+V","Ctrl+C","Ctrl+X","Ctrl+Shift+V"],exp:"Ctrl+V là phím tắt cho lệnh Paste (dán), dùng để dán nội dung đã được sao chép hoặc cắt từ Clipboard vào vị trí con trỏ hiện tại. Ctrl+C là phím sao chép (Copy), Ctrl+X là phím cắt (Cut). Ctrl+Shift+V thường dùng để dán không giữ định dạng (Paste Special) trong nhiều ứng dụng."},
{b:14,t:"mcq",lv:3,q:"Khi chèn danh sách đa cấp (Multilevel List) trong Word, người dùng cần sử dụng tính năng nào?",o:["Multilevel List trong nhóm Paragraph trên thẻ Home","Bullets rồi thụt lề thủ công bằng phím Tab","Numbering Library trong mục Insert","Tạo bảng nhiều cột rồi đánh số thứ tự trong từng ô của cột đầu tiên"],exp:"Multilevel List trong nhóm Paragraph trên thẻ Home cho phép tạo danh sách phân cấp với nhiều mức (level) thụt lề tự động, ví dụ: 1 → 1.1 → 1.1.1. Việc dùng Bullets rồi thụt lề thủ công bằng Tab không tạo ra danh sách đa cấp đúng chuẩn và khó quản lý khi chỉnh sửa. Tính năng này đặc biệt hữu ích khi soạn các văn bản có cấu trúc phân mục rõ ràng."},
{b:14,t:"mcq",lv:1,q:"Để lưu tài liệu Word dưới dạng PDF, người dùng thực hiện thao tác nào?",o:["File → Save As → chọn định dạng PDF","File → Print → chọn máy in PDF","Edit → Export → PDF","File → Share → Send as PDF rồi chọn thư mục lưu trữ trên máy tính"],exp:"Để lưu tài liệu Word dưới dạng PDF, cách chính thức là vào File, chọn Save As, sau đó chọn định dạng PDF trong danh sách Save as type. Ngoài ra, người dùng cũng có thể dùng File, Export, Create PDF/XPS Document. Cách dùng File, Print với máy in ảo PDF cũng tạo được PDF nhưng không phải là phương pháp tối ưu vì không giữ được bookmark và hyperlink."},
{b:15,t:"mcq",lv:1,q:"Trong Microsoft Excel, một ô (cell) được xác định bởi giao của thành phần nào?",o:["Một cột và một hàng","Hai hàng liên tiếp","Hai cột liên tiếp","Một worksheet và một workbook khi chúng giao nhau"],exp:"Trong Excel, ô (cell) là đơn vị lưu trữ dữ liệu nhỏ nhất, được xác định bởi giao điểm của một cột (đánh tên bằng chữ cái như A, B, C) và một hàng (đánh số như 1, 2, 3). Ví dụ, ô B3 là giao của cột B và hàng 3. Worksheet là trang tính và workbook là tệp Excel chứa nhiều worksheet, không phải thành phần tạo nên ô."},
{b:15,t:"mcq",lv:1,q:"Trong Excel, cột được đánh tên bằng gì?",o:["Chữ cái (A, B, C,...)","Số (1, 2, 3,...)","Ký hiệu đặc biệt (*, #, @,...)","Chữ cái La Mã (I, II, III,...) để phân biệt với số hàng"],exp:"Cột trong Excel được đánh tên bằng chữ cái Latin từ A đến Z, sau đó tiếp tục AA, AB cho đến XFD (tổng cộng 16.384 cột trong Excel 2007 trở lên). Hàng được đánh số từ 1 đến 1.048.576. Cách đặt tên này giúp phân biệt rõ ràng giữa cột và hàng khi viết địa chỉ ô."},
{b:15,t:"mcq",lv:2,q:"Địa chỉ ô $A$1 trong Excel thuộc loại tham chiếu nào?",o:["Tham chiếu tuyệt đối","Tham chiếu tương đối","Tham chiếu hỗn hợp","Tham chiếu có điều kiện được cố định bởi người dùng"],exp:"Địa chỉ $A$1 là tham chiếu tuyệt đối vì có dấu $ đặt trước cả tên cột (A) và số hàng (1), nghĩa là khi sao chép công thức sang ô khác, địa chỉ này không thay đổi. Tham chiếu tương đối (A1) sẽ tự điều chỉnh khi sao chép. Tham chiếu hỗn hợp chỉ cố định một thành phần, ví dụ $A1 (cố định cột) hoặc A$1 (cố định hàng)."},
{b:15,t:"mcq",lv:1,q:"Hàm SUM trong Excel dùng để làm gì?",o:["Tính tổng các giá trị số","Tính giá trị trung bình","Đếm số ô có dữ liệu","Tìm giá trị lớn nhất trong một vùng dữ liệu được chọn"],exp:"Hàm SUM tính tổng các giá trị số trong phạm vi được chỉ định, ví dụ SUM(A1:A10) tính tổng từ ô A1 đến A10. Hàm AVERAGE dùng để tính trung bình cộng, COUNT dùng để đếm ô chứa số, còn MAX dùng để tìm giá trị lớn nhất. SUM là một trong những hàm được sử dụng phổ biến nhất trong Excel."},
{b:15,t:"mcq",lv:2,q:"Hàm COUNTIF(A1:A10,\">5\") trong Excel trả về kết quả gì?",o:["Số ô trong vùng A1:A10 có giá trị lớn hơn 5","Tổng các giá trị lớn hơn 5 trong vùng A1:A10","Giá trị trung bình các ô lớn hơn 5","Số ô trong vùng A1:A10 có giá trị lớn hơn hoặc bằng 5 tính cả ô trống"],exp:"Hàm COUNTIF đếm số ô trong một phạm vi thỏa mãn điều kiện cho trước. Với COUNTIF(A1:A10, >5), hàm sẽ đếm số ô trong vùng A1:A10 có giá trị lớn hơn 5 (không bao gồm bằng 5). Nếu muốn tính tổng các giá trị thỏa điều kiện, cần dùng hàm SUMIF thay vì COUNTIF."},
{b:15,t:"mcq",lv:2,q:"Cú pháp đúng của hàm IF trong Excel là gì?",o:["=IF(điều_kiện, giá_trị_đúng, giá_trị_sai)","=IF(giá_trị_đúng, điều_kiện, giá_trị_sai)","=IF(điều_kiện, giá_trị_sai, giá_trị_đúng)","=IF(giá_trị_đúng, giá_trị_sai, điều_kiện kiểm tra cuối cùng)"],exp:"Hàm IF có cú pháp =IF(điều_kiện, giá_trị_nếu_đúng, giá_trị_nếu_sai), trong đó điều kiện luôn là đối số đầu tiên được kiểm tra. Nếu điều kiện đúng (TRUE), hàm trả về giá trị thứ hai; nếu sai (FALSE), trả về giá trị thứ ba. Việc nhớ sai thứ tự đối số là lỗi phổ biến dẫn đến kết quả ngược với mong muốn."},
{b:15,t:"mcq",lv:2,q:"Hàm LEFT(\"BACHKHOA\",4) trả về kết quả gì?",o:["BACH","KHOA","ACHK","BAKH"],exp:"Hàm LEFT trích xuất một số ký tự nhất định tính từ bên trái của chuỗi văn bản. LEFT(BACHKHOA, 4) lấy 4 ký tự đầu tiên từ trái sang, tức là BACH. Tương tự, hàm RIGHT lấy ký tự từ bên phải, còn hàm MID lấy ký tự từ vị trí bất kỳ trong chuỗi."},
{b:15,t:"mcq",lv:3,q:"Hàm VLOOKUP trong Excel có bao nhiêu đối số và đối số thứ 4 có ý nghĩa gì?",o:["4 đối số; đối số thứ 4 xác định tìm chính xác hoặc tương đối","3 đối số; không có đối số thứ 4 trong hàm VLOOKUP","4 đối số; đối số thứ 4 là số thứ tự cột trả về kết quả","5 đối số; đối số thứ 4 xác định hướng tìm theo hàng hoặc cột"],exp:"Hàm VLOOKUP có 4 đối số: lookup_value (giá trị tra cứu), table_array (bảng dữ liệu), col_index_num (số thứ tự cột trả về), và range_lookup (kiểu tìm kiếm). Đối số thứ 4 quyết định tìm kiếm chính xác (FALSE hoặc 0) hay tìm kiếm tương đối (TRUE hoặc 1). Nếu bỏ qua đối số thứ 4, Excel mặc định là TRUE, dễ gây ra kết quả sai khi dữ liệu chưa được sắp xếp."},
{b:15,t:"mcq",lv:1,q:"Phần mở rộng mặc định của tệp Excel từ phiên bản 2007 trở đi là gì?",o:[".xlsx",".xls",".csv",".xlsm"],exp:"Từ phiên bản 2007, Microsoft Excel chuyển sang định dạng mặc định .xlsx dựa trên chuẩn Office Open XML, thay thế định dạng .xls của các phiên bản cũ hơn. Định dạng .csv là tệp văn bản phân cách bằng dấu phẩy, không phải định dạng riêng của Excel. Định dạng .xlsm là tệp Excel có chứa macro (VBA)."},
{b:15,t:"mcq",lv:2,q:"Lỗi #DIV/0! trong Excel xuất hiện khi nào?",o:["Khi công thức thực hiện phép chia cho 0 hoặc ô rỗng","Khi tham chiếu đến ô không tồn tại","Khi nhập sai tên hàm","Khi dữ liệu trong ô không đúng kiểu số mà công thức yêu cầu"],exp:"Lỗi #DIV/0! xuất hiện khi công thức thực hiện phép chia mà mẫu số bằng 0 hoặc tham chiếu đến ô rỗng. Ví dụ, =A1/B1 sẽ báo lỗi #DIV/0! nếu ô B1 trống hoặc chứa giá trị 0. Để tránh lỗi này, có thể dùng hàm IFERROR hoặc kiểm tra điều kiện trước khi chia bằng hàm IF."},
{b:15,t:"mcq",lv:1,q:"Tính năng Freeze Panes trong Excel dùng để làm gì?",o:["Cố định hàng hoặc cột để luôn hiển thị khi cuộn","Khóa ô không cho chỉnh sửa","Đóng băng toàn bộ bảng tính","Ngăn người dùng thêm hàng hoặc cột mới vào vùng dữ liệu"],exp:"Freeze Panes cố định các hàng hoặc cột tiêu đề để chúng luôn hiển thị trên màn hình khi cuộn qua bảng tính có nhiều dữ liệu. Tính năng này nằm trong thẻ View, không liên quan đến việc khóa ô hay bảo vệ trang tính. Có ba tùy chọn: Freeze Panes (cố định tại vị trí con trỏ), Freeze Top Row (cố định hàng đầu), và Freeze First Column (cố định cột đầu)."},
{b:15,t:"mcq",lv:2,q:"Tính năng Conditional Formatting trong Excel cho phép người dùng làm gì?",o:["Tự động định dạng ô dựa trên điều kiện giá trị","Tạo công thức có điều kiện IF","Lọc dữ liệu theo tiêu chí","Sắp xếp dữ liệu theo thứ tự tăng dần hoặc giảm dần tự động"],exp:"Conditional Formatting (định dạng có điều kiện) tự động thay đổi định dạng hiển thị của ô như màu nền, màu chữ, biểu tượng dựa trên giá trị hoặc điều kiện do người dùng thiết lập. Ví dụ, tô đỏ các ô có điểm dưới 5 hoặc dùng thanh dữ liệu (data bars) để trực quan hóa số liệu. Tính năng này khác với hàm IF vì chỉ thay đổi cách hiển thị chứ không thay đổi giá trị trong ô."},
{b:15,t:"mcq",lv:1,q:"Trong Excel, hàm AVERAGE dùng để tính gì?",o:["Giá trị trung bình cộng","Giá trị lớn nhất","Tổng các giá trị","Số lượng các ô chứa dữ liệu số trong vùng được chọn"],exp:"Hàm AVERAGE tính giá trị trung bình cộng bằng cách lấy tổng tất cả các giá trị số chia cho số lượng giá trị trong phạm vi. Ví dụ, AVERAGE(1,3,5) trả về 3 vì (1+3+5)/3 = 3. Hàm MAX dùng để tìm giá trị lớn nhất, SUM tính tổng, còn COUNT đếm số ô chứa dữ liệu số."},
{b:15,t:"mcq",lv:3,q:"Sự khác biệt giữa hàm COUNT và COUNTA trong Excel là gì?",o:["COUNT đếm ô chứa số, COUNTA đếm ô không trống (cả số và chữ)","COUNT đếm ô không trống, COUNTA đếm ô trống","COUNT và COUNTA có chức năng hoàn toàn giống nhau","COUNT đếm ô chứa chữ còn COUNTA đếm ô chứa số và các giá trị logic"],exp:"Hàm COUNT chỉ đếm các ô chứa giá trị số (number), bỏ qua ô chứa văn bản, ô trống và giá trị logic. Hàm COUNTA đếm tất cả các ô không trống, bao gồm cả số, chữ, giá trị logic và chuỗi rỗng hiển thị. Ví dụ, nếu vùng dữ liệu có 3 ô số và 2 ô chữ, COUNT trả về 3 còn COUNTA trả về 5."},
{b:15,t:"mcq",lv:2,q:"Để sắp xếp dữ liệu theo thứ tự tăng dần trong Excel, người dùng sử dụng tính năng nào?",o:["Sort A to Z hoặc Sort Smallest to Largest","Filter theo tiêu chí tăng dần","Conditional Formatting theo giá trị","Data Validation để thiết lập quy tắc sắp xếp tự động"],exp:"Tính năng Sort trong Excel cho phép sắp xếp dữ liệu theo thứ tự tăng dần (A to Z cho chữ, Smallest to Largest cho số) hoặc giảm dần. Filter dùng để lọc hiển thị dữ liệu theo tiêu chí chứ không sắp xếp. Conditional Formatting chỉ thay đổi định dạng hiển thị, còn Data Validation dùng để kiểm soát dữ liệu nhập vào."},
{b:15,t:"mcq",lv:2,q:"Loại biểu đồ nào phù hợp nhất để thể hiện tỷ lệ phần trăm các thành phần trong tổng thể?",o:["Biểu đồ tròn (Pie Chart)","Biểu đồ cột (Column Chart)","Biểu đồ đường (Line Chart)","Biểu đồ phân tán (Scatter Chart) vì hiển thị rõ từng thành phần"],exp:"Biểu đồ tròn (Pie Chart) là lựa chọn tối ưu để thể hiện tỷ lệ phần trăm các thành phần trong một tổng thể, vì mỗi phần của hình tròn tương ứng với tỷ lệ đóng góp. Biểu đồ cột (Column) phù hợp để so sánh giá trị giữa các nhóm, biểu đồ đường (Line) thể hiện xu hướng theo thời gian, còn biểu đồ phân tán (Scatter) dùng để phân tích mối tương quan giữa hai biến số."},
{b:15,t:"mcq",lv:2,q:"Tham chiếu $A1 trong Excel thuộc loại nào?",o:["Tham chiếu hỗn hợp (cố định cột, hàng tương đối)","Tham chiếu tuyệt đối (cố định cả cột và hàng)","Tham chiếu tương đối (cột và hàng đều thay đổi)","Tham chiếu ngoài bảng tính liên kết đến workbook khác"],exp:"Địa chỉ $A1 là tham chiếu hỗn hợp: cột A được cố định (có dấu $) nên không đổi khi sao chép, nhưng hàng 1 là tương đối nên sẽ thay đổi theo vị trí dán. Tham chiếu tuyệt đối ($A$1) cố định cả cột và hàng, còn tham chiếu tương đối (A1) cho phép cả hai thay đổi. Hiểu rõ ba loại tham chiếu này là kỹ năng cốt lõi khi làm việc với công thức Excel."},
{b:15,t:"mcq",lv:1,q:"Tính năng AutoFill trong Excel cho phép người dùng làm gì?",o:["Tự động điền dữ liệu theo quy luật vào các ô liền kề","Tự động sửa lỗi chính tả","Tự động tính tổng một cột","Tự động định dạng bảng tính theo mẫu có sẵn trong thư viện"],exp:"AutoFill là tính năng tự động điền dữ liệu theo quy luật vào các ô liền kề bằng cách kéo ô điều khiển (fill handle) ở góc dưới bên phải của ô. Ví dụ, nhập 1 và 2 vào hai ô, sau đó kéo xuống sẽ tự động điền 3, 4, 5. AutoFill nhận diện được quy luật của số, ngày tháng, thứ trong tuần và nhiều kiểu dữ liệu khác."},
{b:15,t:"mcq",lv:1,q:"Phần mềm nào là ứng dụng bảng tính miễn phí thay thế cho Microsoft Excel?",o:["Google Sheets","Google Docs","Microsoft Word","Adobe Acrobat"],exp:"Google Sheets là ứng dụng bảng tính trực tuyến miễn phí của Google, có thể thay thế Microsoft Excel với các tính năng tương đương và hỗ trợ cộng tác thời gian thực. Google Docs là ứng dụng soạn thảo văn bản (thay thế Word), không phải bảng tính. Microsoft Word là phần mềm soạn thảo văn bản, còn Adobe Acrobat Reader chỉ dùng để đọc tệp PDF."},
{b:15,t:"mcq",lv:3,q:"Lỗi #REF! trong Excel xuất hiện trong trường hợp nào?",o:["Khi công thức tham chiếu đến ô đã bị xóa","Khi nhập sai tên hàm vào công thức","Khi chia một giá trị cho 0","Khi kiểu dữ liệu trong ô không phù hợp với phép tính mà công thức yêu cầu"],exp:"Lỗi #REF! (Reference Error) xuất hiện khi công thức tham chiếu đến ô hoặc vùng dữ liệu không còn hợp lệ, thường xảy ra khi xóa hàng, cột hoặc ô mà công thức đang tham chiếu đến. Lỗi #NAME? xuất hiện khi nhập sai tên hàm, lỗi #DIV/0! khi chia cho 0, còn lỗi #VALUE! khi kiểu dữ liệu không phù hợp với phép tính."},
{b:16,t:"mcq",lv:1,q:"Phần mở rộng mặc định của tệp Microsoft PowerPoint từ phiên bản 2007 trở đi là gì?",o:[".pptx",".ppt",".ppsx",".potx"],exp:"Từ PowerPoint 2007, định dạng mặc định là .pptx dựa trên chuẩn Office Open XML, thay thế .ppt của các phiên bản cũ. Định dạng .ppsx là tệp trình chiếu tự chạy (không mở chế độ chỉnh sửa), còn .potx là tệp mẫu (template) của PowerPoint."},
{b:16,t:"mcq",lv:1,q:"Đơn vị cơ bản để trình bày nội dung trong PowerPoint là gì?",o:["Slide","Page","Sheet","Document"],exp:"Trong PowerPoint, nội dung được tổ chức theo từng slide (trang trình chiếu). Tương ứng với Page trong Word và Sheet trong Excel, mỗi phần mềm có đơn vị tổ chức nội dung riêng phù hợp với chức năng của nó."},
{b:16,t:"mcq",lv:2,q:"Template trong PowerPoint đề cập tới khái niệm nào?",o:["Các mẫu trình diễn đã được định nghĩa trước về bố cục và màu sắc","Thư viện các hình ảnh và biểu tượng có sẵn trong PowerPoint","Các hiệu ứng chuyển động được định nghĩa trước cho từng slide","Tính năng trình diễn slide tự động theo thời gian đã được cài đặt"],exp:"Template là các mẫu trình diễn có sẵn với bố cục, phông chữ, màu sắc và thiết kế nền đã được thiết lập. Người dùng chọn template để tạo bài trình chiếu nhanh chóng với giao diện chuyên nghiệp mà không cần thiết kế từ đầu. HUST cũng cung cấp template riêng cho sinh viên và giảng viên."},
{b:16,t:"mcq",lv:2,q:"Khi trình bày slide, lưu ý nào sau đây là đúng?",o:["Không nên lặp nhiều từ ngữ trong cùng một slide","Font Times New Roman dễ đọc hơn Arial trên màn chiếu","Nên tránh sử dụng hình ảnh và biểu đồ thay cho chữ viết","Mỗi slide nên trình bày càng nhiều ý tưởng càng tốt để tiết kiệm số slide"],exp:"Nguyên tắc thiết kế slide hiệu quả yêu cầu tránh lặp từ ngữ, giữ nội dung ngắn gọn và sử dụng hình ảnh minh họa. Font sans-serif như Arial, Calibri thường dễ đọc hơn Times New Roman trên màn chiếu. Mỗi slide chỉ nên trình bày một ý tưởng chính để người xem dễ theo dõi."},
{b:16,t:"mcq",lv:1,q:"Phần mềm nào sau đây KHÔNG phải là phần mềm trình chiếu?",o:["Microsoft Presentation","Microsoft PowerPoint","Apple Keynote","OpenOffice Impress"],exp:"Microsoft Presentation không tồn tại trong bộ Microsoft Office. Các phần mềm trình chiếu phổ biến bao gồm Microsoft PowerPoint, Apple Keynote (trên macOS/iOS), OpenOffice Impress và Google Slides. Đây là bẫy thường gặp vì tên nghe có vẻ hợp lý nhưng thực tế không có sản phẩm này."},
{b:16,t:"mcq",lv:2,q:"Trong PowerPoint, Slide Master dùng để làm gì?",o:["Thiết lập định dạng chung cho tất cả các slide trong bài trình chiếu","Tạo hiệu ứng chuyển tiếp giữa các slide","Chèn ghi chú cho người trình bày vào từng slide","Thiết lập thời gian trình chiếu tự động cho mỗi slide riêng biệt"],exp:"Slide Master là trang chủ định dạng, cho phép thiết lập phông chữ, màu sắc, hình nền và bố cục chung áp dụng cho toàn bộ bài trình chiếu. Khi thay đổi trên Slide Master, tất cả các slide con sẽ tự động cập nhật, giúp đảm bảo tính thống nhất và tiết kiệm thời gian chỉnh sửa."},
{b:16,t:"mcq",lv:1,q:"Tổ hợp phím nào dùng để bắt đầu trình chiếu từ slide đầu tiên trong PowerPoint?",o:["F5","F1","Ctrl+F5","Shift+F5 là phím bắt đầu trình chiếu từ slide đầu tiên"],exp:"Phím F5 bắt đầu trình chiếu từ slide đầu tiên. Shift+F5 bắt đầu trình chiếu từ slide hiện tại đang được chọn. Đây là hai phím tắt quan trọng nhất khi sử dụng PowerPoint để thuyết trình."},
{b:16,t:"mcq",lv:2,q:"Tính năng Transition trong PowerPoint dùng để làm gì?",o:["Tạo hiệu ứng chuyển tiếp giữa các slide","Tạo hiệu ứng hoạt hình cho các đối tượng trên slide","Thiết lập thời gian hiển thị cho từng slide","Thay đổi bố cục và vị trí các phần tử trên slide theo mẫu có sẵn"],exp:"Transition (chuyển tiếp) là hiệu ứng áp dụng khi chuyển từ slide này sang slide kế tiếp, ví dụ hiệu ứng Fade, Push, Wipe. Animation là hiệu ứng hoạt hình cho từng đối tượng riêng lẻ trên slide như văn bản, hình ảnh. Hai khái niệm này thường bị nhầm lẫn với nhau."},
{b:16,t:"mcq",lv:2,q:"Speaker Notes trong PowerPoint có chức năng gì?",o:["Ghi chú nội dung hỗ trợ người trình bày, không hiển thị trên màn chiếu","Ghi chú hiển thị trực tiếp trên slide cho khán giả xem","Tạo bản tóm tắt tự động cho bài trình chiếu","Chèn nhận xét của người chỉnh sửa vào slide giống như Track Changes"],exp:"Speaker Notes (ghi chú diễn giả) là phần ghi chú nằm bên dưới mỗi slide, chỉ người trình bày nhìn thấy khi dùng chế độ Presenter View. Khán giả xem màn chiếu sẽ không thấy phần ghi chú này. Đây là công cụ hữu ích để ghi lại các điểm cần nhấn mạnh hoặc dữ liệu bổ sung."},
{b:16,t:"mcq",lv:3,q:"Khi tạo bài trình chiếu giới thiệu về ĐHBKHN từ 10-12 slide, nguyên tắc thiết kế nào KHÔNG nên áp dụng?",o:["Nhồi toàn bộ nội dung vào ít slide nhất có thể để tiết kiệm thời gian","Sử dụng template thống nhất của trường cho tất cả các slide","Chèn hình ảnh minh họa từ website hoặc fanpage của trường","Mỗi slide tập trung vào một nội dung chính và sử dụng font dễ đọc"],exp:"Nguyên tắc thiết kế slide hiệu quả yêu cầu mỗi slide chỉ nên tập trung vào một ý chính, tránh nhồi nhét quá nhiều nội dung. Theo bài thực hành số 2 của HUST, sinh viên cần tạo 10-12 slide với template chuẩn của trường, bổ sung hình ảnh từ website/fanpage chính thức và đảm bảo font chữ dễ đọc trên màn chiếu."}];

var CAT_NAMES = {"basic":"Cơ bản","if-else":"if-else","loop":"Vòng lặp","array":"Mảng","pointer":"Con trỏ","string":"Xâu","struct":"Struct","function":"Hàm","file":"File"};
var CH_NAMES = {1:"Biểu diễn TT",2:"Kiến trúc MT",3:"Mạng & Internet",4:"PM ứng dụng",5:"Thuật toán",6:"Kiểu DL & Biến",7:"Biểu thức & TT",8:"Nhập/Xuất",9:"Cấu trúc ĐK & Lặp",10:"Xâu & Mảng",11:"Struct",12:"Hàm",13:"File",14:"MS Word",15:"MS Excel",16:"MS PowerPoint"};
var CAT_ORDER = ["basic","if-else","loop","array","pointer","string","struct","function","file"];

// Theme
function applyTheme(t){
 document.documentElement.setAttribute('data-theme',t);
 var icon=document.getElementById('themeIcon');
 var lbl=document.getElementById('themeLbl');
 if(icon)icon.textContent=t==='dark'?'\u{1F319}':'\u{2600}\u{FE0F}';
 if(lbl)lbl.textContent=t==='dark'?'Tối':'Sáng';
}
function toggleTheme(){
 var cur=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
 applyTheme(cur);
 try{localStorage.setItem('thdc_theme',cur)}catch(e){}
}
(function(){var t='light';try{t=localStorage.getItem('thdc_theme')||'light'}catch(e){}applyTheme(t)})();

// State
var LS_KEY="thdc_v5";
var state=loadState();
var currentCh=0,currentCat="all",filterType="all",filterWrong=false,filterUncertain=false,shuffleSeed=state.shuffleSeed||0;
var skipGroups=Object.assign({ch4:false,an_toan:false,file:false,struct:false,ham:false},state.skipGroups||{});

function loadState(){try{var s=localStorage.getItem(LS_KEY);if(s)return JSON.parse(s)}catch(e){}return{answers:{},uncertain:{},selected:{},code:{},seen:{},shuffleSeed:0}}
function saveState(){state.skipGroups=skipGroups;try{localStorage.setItem(LS_KEY,JSON.stringify(state))}catch(e){}}
function seedHash(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return (h+shuffleSeed)|0}
function shuffle(a,seed){a=a.slice();var s=seed|0;if(!s)s=1;for(var i=a.length-1;i>0;i--){s=s^(s<<13);s|=0;s=s^(s>>17);s=s^(s<<5);s|=0;var j=(s>>>0)%(i+1);var t=a[i];a[i]=a[j];a[j]=t}return a}
function qid(q,i){return"q"+q.b+"_"+q.t+"_"+i}
var QI=Q.map(function(q,i){var r={};for(var k in q)r[k]=q[k];r._id=qid(q,i);r._idx=i;return r});
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function safeHtml(s){var h=escHtml(s);return h.replace(/&lt;(\/?(sup|sub|br))&gt;/gi,function(_,t){return'<'+t+'>'})}
function highlightC(code){
 var s=escHtml(code);
 s=s.replace(/(\/\/.*)/g,'<span class="cmt">$1</span>');
 s=s.replace(/(#\s*(?:include|define|ifdef|ifndef|endif|if|else|elif|undef|pragma)\b[^\n]*)/g,'<span class="pp">$1</span>');
 s=s.replace(/("(?:[^"\\]|\\.)*")/g,'<span class="str">$1</span>');
 s=s.replace(/('(?:[^'\\]|\\.)*')/g,'<span class="str">$1</span>');
 s=s.replace(/\b(\d+\.?\d*[fFlL]?)\b/g,'<span class="num">$1</span>');
 var kws="int|long|short|char|float|double|void|unsigned|signed|const|static|extern|auto|register|return|if|else|for|while|do|switch|case|default|break|continue|goto|sizeof|typedef|struct|union|enum|volatile|inline";
 s=s.replace(new RegExp("\\b("+kws+")\\b","g"),'<span class="kw">$1</span>');
 s=s.replace(/\b(FILE|NULL|EOF|size_t|stdin|stdout|stderr)\b/g,'<span class="type">$1</span>');
 return s;
}
function formatQ(t){var s=safeHtml(t);return s.replace(/`([^`]+)`/g,'<code>$1</code>')}

function getBaseFiltered(){
 var qs=QI;
 if(currentCh>0)qs=qs.filter(function(q){return q.b===currentCh});
 if(currentCat!=="all")qs=qs.filter(function(q){return q.cat===currentCat});
 return qs;
}

function getFiltered(){
 var qs=getBaseFiltered();
 var activeSkips=Object.keys(skipGroups).filter(function(k){return skipGroups[k]});
 if(activeSkips.length)qs=qs.filter(function(q){return !q.skip||activeSkips.indexOf(q.skip)<0});
 if(filterType!=="all"){
 if(filterType==="code")qs=qs.filter(function(q){return q.t==="code"});
 else qs=qs.filter(function(q){return q.t===filterType});
 }
 if(filterWrong)qs=qs.filter(function(q){return state.answers[q._id]==="wrong"});
 if(filterUncertain)qs=qs.filter(function(q){return state.uncertain[q._id]});
 return qs;
}

function isDone(q){return state.answers[q._id]||(state.seen&&state.seen[q._id])}

// Render Cards
function renderCards(){
 var area=document.getElementById("cardsArea");
 var qs=getFiltered();
 if(!qs.length){area.innerHTML='<p style="text-align:center;color:var(--muted);padding:40px">Không có câu hỏi nào.</p>';return}
 var html='';
 qs.forEach(function(q,qi){
 var id=q._id,answered=state.answers[id],isU=state.uncertain[id];
 var lv=["","M1","M2","M3"][q.lv];
 var bc,bt;
 if(q.t==="mcq"){bc="badge-mcq";bt="MCQ"}else if(q.t==="code"){bc="badge-code";bt="CODE"}else{bc="badge-short";bt="TỰ LUẬN"}
 html+='<div class="card" id="card_'+id+'">';
 html+='<button class="uncertain-btn'+(isU?' marked':'')+'" onclick="toggleMark(\''+id+'\')" title="Chưa chắc">&#9733;</button>';
 var qNum=(currentCh===0&&currentCat==="all")?q._idx+1:qi+1;html+='<div class="card-header"><span class="q-num">'+qNum+'</span><span class="card-badge '+bc+'">'+bt+'</span><span class="card-level">'+lv+' · '+(CH_NAMES[q.b]||('Ch.'+q.b))+(q.cat?' · '+q.cat:'')+'</span></div>';
 html+='<div class="card-q">'+formatQ(q.q)+'</div>';
 
 if(q.t==="mcq"){
 var opts=q.o.map(function(t,oi){return{text:t,isCorrect:oi===0}});
 var sh=shuffle(opts,seedHash(id));
 html+='<div class="options">';
 sh.forEach(function(opt,si){
 var cls="opt";
 if(answered){cls+=" disabled";if(opt.isCorrect)cls+=" correct-show";if(answered==="wrong"&&state.selected[id]===si&&!opt.isCorrect)cls+=" wrong-show"}
 var mk=answered?(opt.isCorrect?'<span class="mark ok">✓</span>':(state.selected[id]===si?'<span class="mark no">✗</span>':'')):'';
 html+='<div class="'+cls+'" '+(answered?'':'onclick="answer(\''+id+'\','+si+','+(opt.isCorrect?'true':'false')+')"')+'>'+safeHtml(opt.text)+mk+'</div>';
 });
 html+='</div>';
 if(answered && q.exp){
 html+='<button class="exp-btn" onclick="toggleExp(\''+id+'_exp\')">Xem giải thích</button>';
 html+='<div class="exp-text" id="'+id+'_exp">'+safeHtml(q.exp)+'</div>';
 }
 } else if(q.io) {
 html+='<table class="io-table"><tr><th>Input</th><th>Output</th></tr>';
 q.io.forEach(function(tc){
 html+='<tr><td>'+escHtml(tc.i||'(không)')+'</td><td>'+escHtml(tc.o)+'</td></tr>';
 });
 html+='</table>';
 var isSeen=state.seen&&state.seen[id];
 html+='<button class="seen-btn'+(isSeen?' seen':'')+'" onclick="toggleSeen(\''+id+'\')">'+(isSeen?'Đã xem ✓':'Đánh dấu đã xem')+'</button>';
 } else {
 if(q.hint){html+='<button class="toggle-btn" onclick="toggleHint(\''+id+'_hint\')">Gợi ý</button><div class="hidden-content" id="'+id+'_hint">'+escHtml(q.hint)+'</div>'}
 if(q.ans){html+='<button class="toggle-btn" onclick="toggleHint(\''+id+'_ans\')">Xem đáp án</button>';html+=q.t==="code"?'<div class="hidden-content" id="'+id+'_ans"><div class="code-block">'+highlightC(q.ans)+'</div></div>':'<div class="hidden-content" id="'+id+'_ans">'+escHtml(q.ans)+'</div>'}
 if(!answered) html+='<div class="self-assess"><button class="sa-btn sa-correct" onclick="selfAssess(\''+id+'\',\'correct\')">Đúng ✓</button><button class="sa-btn sa-wrong" onclick="selfAssess(\''+id+'\',\'wrong\')">Sai ✗</button></div>';
 else html+='<div class="self-assess"><button class="sa-btn '+(answered==='correct'?'sa-correct chosen':'sa-wrong chosen')+'" disabled>'+(answered==='correct'?'Đúng ✓':'Sai ✗')+'</button></div>';
 }
 html+='</div>';
 });
 area.innerHTML=html;
}

function renderTabs(){
 var bar=document.getElementById("tabsBar");var h='';
 if(filterType==="code"){
 var allCode=QI.filter(function(q){return q.t==="code"});
 var ad=allCode.filter(function(q){return isDone(q)}).length;
 var ap=allCode.length?Math.round(ad/allCode.length*100):0;
 h+='<button class="tab'+(currentCat==="all"&&currentCh===0?' active':'')+'" onclick="setCat(\'all\')">Tất cả<span class="mini-bar"><span class="mini-fill" style="width:'+ap+'%"></span></span></button>';
 CAT_ORDER.forEach(function(cat){
 var cq=QI.filter(function(q){return q.t==="code"&&q.cat===cat});
 if(!cq.length)return;
 var d=cq.filter(function(q){return isDone(q)}).length;
 var p=cq.length?Math.round(d/cq.length*100):0;
 h+='<button class="tab'+(currentCat===cat?' active':'')+'" onclick="setCat(\''+cat+'\')">'+CAT_NAMES[cat]+'<span class="mini-bar"><span class="mini-fill" style="width:'+p+'%"></span></span></button>';
 });
 } else {
 var ad=0;QI.forEach(function(q){if(isDone(q))ad++});
 var ap=QI.length?Math.round(ad/QI.length*100):0;
 h+='<button class="tab'+(currentCh===0?' active':'')+'" onclick="setCh(0)">Tất cả<span class="mini-bar"><span class="mini-fill" style="width:'+ap+'%"></span></span></button>';
 var chOrder=[1,2,3,4,5,14,15,16,6,7,8,9,10,11,12,13];
 chOrder.forEach(function(c){
 var cq=QI.filter(function(q){return q.b===c});
 if(!cq.length)return;
 var d=cq.filter(function(q){return isDone(q)}).length;
 var p=cq.length?Math.round(d/cq.length*100):0;
 var tabIdx=chOrder.indexOf(c)+1;
 h+='<button class="tab'+(currentCh===c?' active':'')+'" onclick="setCh('+c+')">'+tabIdx+'. '+(CH_NAMES[c]||('Ch.'+c))+'<span class="mini-bar"><span class="mini-fill" style="width:'+p+'%"></span></span></button>';
 });
 }
 bar.innerHTML=h;
}

function renderFilters(){
 var bar=document.getElementById("filtersBar");
 var qs=(currentCh===0&&currentCat==="all")?QI:getBaseFiltered();
 var mc=0,cc=0,sc=0,wc=0,uc=0;
 qs.forEach(function(q){
 if(q.t==="mcq")mc++;else if(q.t==="code")cc++;else sc++;
 if(state.answers[q._id]==="wrong")wc++;
 if(state.uncertain[q._id])uc++;
 });
 bar.innerHTML='<button class="filter-btn'+(filterType==="all"?" active":"")+'" onclick="setFilter(\'all\')">Tất cả<span class="count">'+qs.length+'</span></button><button class="filter-btn'+(filterType==="mcq"?" active":"")+'" onclick="setFilter(\'mcq\')">MCQ<span class="count">'+mc+'</span></button><button class="filter-btn'+(filterType==="code"?" active":"")+'" onclick="setFilter(\'code\')">Code<span class="count">'+cc+'</span></button><button class="filter-btn'+(filterType==="short"?" active":"")+'" onclick="setFilter(\'short\')">Tự luận<span class="count">'+sc+'</span></button><button class="filter-btn'+(filterWrong?" active":"")+'" onclick="toggleWrong()">⚠ Câu sai<span class="count">'+wc+'</span></button><button class="filter-btn'+(filterUncertain?" active":"")+'" onclick="toggleUncertain()">Chưa chắc<span class="count">'+uc+'</span></button><button class="filter-btn" onclick="reshuffleABCD()" title="Xáo lại vị trí A/B/C/D">Trộn ABCD</button>';
}

function renderStats(){
 var qs=(currentCh===0&&currentCat==="all")?QI:getBaseFiltered();
 var t=qs.length,d=0,c=0,w=0;
 qs.forEach(function(q){
 var a=state.answers[q._id];
 if(a){d++;if(a==="correct")c++;else w++}
 else if(state.seen&&state.seen[q._id]){d++;c++}
 });
 var p=d?Math.round(c/d*100):0;
 document.getElementById("statsArea").innerHTML='<div class="stat-box"><div class="val">'+t+'</div><div class="lbl">Tổng</div></div><div class="stat-box"><div class="val">'+d+'</div><div class="lbl">Đã làm</div></div><div class="stat-box"><div class="val" style="color:var(--correct)">'+c+'</div><div class="lbl">Đúng</div></div><div class="stat-box"><div class="val" style="color:var(--wrong)">'+w+'</div><div class="lbl">Sai</div></div><div class="stat-box"><div class="val">'+p+'%</div><div class="lbl">Tỷ lệ</div></div>';
 var ad=0;QI.forEach(function(q){if(isDone(q))ad++});
 document.getElementById("overallLabel").textContent=ad+' / '+QI.length+' câu đã làm';
 document.getElementById("overallFill").style.width=(QI.length?Math.round(ad/QI.length*100):0)+"%";
}

function setCh(c){currentCh=c;currentCat="all";filterWrong=false;filterUncertain=false;render()}
function setCat(c){currentCat=c;currentCh=0;filterWrong=false;filterUncertain=false;render()}
function setFilter(t){
 var prev=filterType;
 filterType=(filterType===t?'all':t);
 if(filterType==='code'){currentCh=0;currentCat="all"}
 else if(prev==='code'){currentCat="all"}
 render();
}
function toggleWrong(){filterWrong=!filterWrong;if(filterWrong)filterUncertain=false;render()}
function toggleUncertain(){filterUncertain=!filterUncertain;if(filterUncertain)filterWrong=false;render()}
function answer(id,si,ok){state.selected[id]=si;state.answers[id]=ok?"correct":"wrong";saveState();render();setTimeout(function(){var el=document.getElementById("card_"+id);if(el)el.scrollIntoView({behavior:"smooth",block:"nearest"})},50)}
function selfAssess(id,r){state.answers[id]=r;saveState();render()}
function toggleMark(id){if(state.uncertain[id])delete state.uncertain[id];else state.uncertain[id]=true;saveState();renderFilters();var b=document.querySelector('#card_'+id+' .uncertain-btn');if(b)b.classList.toggle("marked")}
function toggleHint(elId){var el=document.getElementById(elId);if(el)el.classList.toggle("visible")}
function toggleExp(elId){var el=document.getElementById(elId);if(el)el.classList.toggle("visible")}
function toggleSeen(id){if(!state.seen)state.seen={};if(state.seen[id]){delete state.seen[id]}else{state.seen[id]=true}saveState();render()}
function reshuffleABCD(){shuffleSeed=(shuffleSeed+Math.floor(Math.random()*9000)+1000)|0;state.shuffleSeed=shuffleSeed;saveState();render()}
var resetTap=0;document.getElementById("resetBtn").addEventListener("click",function(){var s=this;if(resetTap===0){s.textContent="Chắc chắn xóa? Nhấn lần nữa";s.classList.add("confirm");resetTap=1;setTimeout(function(){s.textContent="Xóa toàn bộ tiến trình";s.classList.remove("confirm");resetTap=0},3000)}else{state={answers:{},uncertain:{},selected:{},code:{},seen:{},shuffleSeed:0};saveState();s.textContent="Đã xóa ✓";s.classList.remove("confirm");resetTap=0;shuffleSeed=0;setTimeout(function(){s.textContent="Xóa toàn bộ tiến trình";render()},1000)}});

var SKIP_DEFS=[
 {key:"ch4",   label:"Chương 4 – AI, IoT, Big Data",  n:27},
 {key:"an_toan",label:"3.4 An toàn mạng – Firewall",  n:1},
 {key:"file",  label:"Lập trình: File",                n:18},
 {key:"struct",label:"Lập trình: Struct",              n:15},
];
var skipPanelOpen=false;
function toggleSkipPanel(){
 skipPanelOpen=!skipPanelOpen;
 document.getElementById('skipBody').className='skip-body'+(skipPanelOpen?' open':'');
 document.getElementById('skipTitle').className='skip-title'+(skipPanelOpen?' open':'');
}
function toggleSkipGroup(key){
 skipGroups[key]=!skipGroups[key];
 saveState();
 renderSkipPanel();
 render();
}
function renderSkipPanel(){
 var body=document.getElementById('skipBody');
 var h='';
 SKIP_DEFS.forEach(function(d){
  var on=skipGroups[d.key];
  h+='<label class="skip-chk'+(on?' active':'')+'" onclick="toggleSkipGroup(\''+d.key+'\')">';
  h+='<input type="checkbox" onclick="event.stopPropagation()"'+(on?' checked':'')+' onchange="toggleSkipGroup(\''+d.key+'\')">';
  h+=d.label+'<span class="skip-count">('+d.n+')</span></label>';
 });
 body.innerHTML=h;
}

function render(){renderTabs();renderFilters();renderSkipPanel();renderStats();renderCards()}
render();

</script>
