<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn tập Tin học Đại cương — HUST</title>
<style>
:root{
 --bg:#faf8f1;--text:#1a1814;--card:#fff;--card-border:#e2ddd0;
 --accent:#5a6abf;--accent-light:#eef0fa;--correct:#2d8a56;--correct-bg:#e8f5ee;
 --wrong:#c0392b;--wrong-bg:#fbeaea;--muted:#8a8477;--code-bg:#f4f1e8;
 --tab-bg:#eee8d5;--tab-active:#5a6abf;--tab-text:#6b6458;
 --hover:#f0ece0;--shadow:0 1px 3px rgba(0,0,0,.08);
 --progress-bg:#e2ddd0;--progress-fill:#5a6abf;
 --uncertain:#e6a817;--uncertain-bg:#fdf6e3;
 --filter-bg:#f0ece0;--badge:#5a6abf;
}
html[data-theme="dark"]{
 --bg:#11100d;--text:#ebe6d9;--card:#1c1a16;--card-border:#2e2b25;
 --accent:#8b9cf7;--accent-light:#1e2040;--correct:#4eca7a;--correct-bg:#162a1e;
 --wrong:#e74c3c;--wrong-bg:#2a1515;--muted:#8a8477;--code-bg:#1a1814;
 --tab-bg:#1c1a16;--tab-active:#8b9cf7;--tab-text:#8a8477;
 --hover:#252219;--shadow:0 1px 3px rgba(0,0,0,.3);
 --progress-bg:#2e2b25;--progress-fill:#8b9cf7;
 --uncertain:#f0c040;--uncertain-bg:#2a2510;
 --filter-bg:#1c1a16;--badge:#8b9cf7;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
 background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:80px}
.container{max-width:760px;margin:0 auto;padding:0 16px}
header{text-align:center;padding:24px 0 8px;position:relative}
header h1{font-size:1.4rem;font-weight:700}
header p{color:var(--muted);font-size:.85rem;margin-top:4px}
.theme-toggle{position:absolute;top:24px;right:0;padding:6px 12px;border-radius:8px;border:1px solid var(--card-border);cursor:pointer;background:var(--card);color:var(--text);font-size:.8rem;transition:all .15s;display:flex;align-items:center;gap:4px}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.theme-toggle .icon{font-size:1rem}
.overall-progress{margin:12px auto;max-width:400px;text-align:center}
.overall-progress .bar{height:6px;background:var(--progress-bg);border-radius:3px;overflow:hidden;margin-top:4px}
.overall-progress .fill{height:100%;background:var(--progress-fill);transition:width .3s}
.overall-progress .label{font-size:.8rem;color:var(--muted)}
.tabs-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:16px 0;padding-bottom:4px}
.tabs{display:flex;gap:4px;min-width:max-content}
.tab{padding:6px 12px;border-radius:8px 8px 0 0;cursor:pointer;font-size:.78rem;
 background:var(--tab-bg);color:var(--tab-text);border:none;white-space:nowrap;
 position:relative;transition:all .15s;font-weight:500}
.tab:hover{background:var(--hover)}
.tab.active{background:var(--tab-active);color:#fff;font-weight:600}
.tab .mini-bar{position:absolute;bottom:0;left:4px;right:4px;height:2px;background:var(--progress-bg);border-radius:1px;overflow:hidden}
.tab .mini-fill{height:100%;background:var(--correct);transition:width .3s}
.tab.active .mini-bar{background:rgba(255,255,255,.3)}
.tab.active .mini-fill{background:#fff}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 16px;align-items:center}
.filter-btn{padding:4px 10px;border-radius:16px;font-size:.75rem;cursor:pointer;
 border:1px solid var(--card-border);background:var(--filter-bg);color:var(--text);transition:all .15s}
.filter-btn:hover{border-color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-btn .count{display:inline-block;min-width:16px;text-align:center;background:var(--badge);color:#fff;border-radius:8px;padding:0 4px;font-size:.65rem;margin-left:4px;font-weight:600}
.filter-btn.active .count{background:rgba(255,255,255,.3)}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;
 padding:20px;margin-bottom:12px;box-shadow:var(--shadow);position:relative}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase}
.badge-mcq{background:var(--accent-light);color:var(--accent)}
.badge-code{background:#fdf6e3;color:#b58900}
.badge-short{background:#e8f5ee;color:#2d8a56}
.card-level{font-size:.7rem;color:var(--muted);margin-right:36px}
.card-q{font-size:.95rem;margin-bottom:14px;white-space:pre-wrap}
.card-q code{background:var(--code-bg);padding:1px 5px;border-radius:3px;font-family:'Consolas','Courier New',monospace;font-size:.88em}
.options{display:flex;flex-direction:column;gap:6px}
.opt{padding:10px 14px;border:1.5px solid var(--card-border);border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .15s}
.opt:hover:not(.disabled){background:var(--hover);border-color:var(--accent)}
.opt.correct-show{border-color:var(--correct);background:var(--correct-bg)}
.opt.wrong-show{border-color:var(--wrong);background:var(--wrong-bg)}
.opt.disabled{cursor:default;opacity:.85}
.opt .mark{float:right;font-weight:700}
.opt .mark.ok{color:var(--correct)}
.opt .mark.no{color:var(--wrong)}
.exp-btn{margin-top:8px;padding:4px 12px;border-radius:6px;border:1px solid var(--card-border);cursor:pointer;font-size:.78rem;background:var(--card);color:var(--muted);transition:all .15s;display:inline-block}
.exp-btn:hover{border-color:var(--accent);color:var(--accent)}
.exp-text{display:none;margin-top:8px;padding:10px;background:var(--code-bg);border-radius:8px;font-size:.85rem;color:var(--text);line-height:1.5}
.exp-text.visible{display:block}
.code-block{background:var(--code-bg);border:1px solid var(--card-border);border-radius:8px;padding:14px;font-family:'Consolas','Courier New',monospace;font-size:.85rem;line-height:1.5;overflow-x:auto;white-space:pre;margin-bottom:10px;tab-size:4}
.code-block .kw{color:#8959a8;font-weight:600}.code-block .type{color:#4271ae}.code-block .str{color:#718c00}.code-block .num{color:#f5871f}.code-block .cmt{color:#8e908c;font-style:italic}.code-block .pp{color:#c82829}
.io-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.85rem}
.io-table th{background:var(--tab-bg);color:var(--tab-text);padding:6px 10px;text-align:left;font-weight:600;border:1px solid var(--card-border)}
.io-table td{padding:6px 10px;border:1px solid var(--card-border);font-family:'Consolas','Courier New',monospace;white-space:pre-wrap;background:var(--code-bg)}
.self-assess{display:flex;gap:8px;margin-top:10px}
.sa-btn{padding:6px 16px;border-radius:8px;border:1.5px solid var(--card-border);cursor:pointer;font-size:.85rem;font-weight:500;transition:all .15s;background:var(--card)}
.sa-btn:hover{border-color:var(--accent)}
.sa-btn.sa-correct{border-color:var(--correct);color:var(--correct)}
.sa-btn.sa-correct:hover,.sa-btn.sa-correct.chosen{background:var(--correct-bg)}
.sa-btn.sa-wrong{border-color:var(--wrong);color:var(--wrong)}
.sa-btn.sa-wrong:hover,.sa-btn.sa-wrong.chosen{background:var(--wrong-bg)}
.toggle-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--card-border);cursor:pointer;font-size:.8rem;background:var(--card);color:var(--muted);margin-right:6px;margin-top:6px;transition:all .15s;display:inline-block}
.toggle-btn:hover{border-color:var(--accent);color:var(--accent)}
.hidden-content{display:none;margin-top:8px;padding:10px;background:var(--code-bg);border-radius:8px;font-size:.88rem;white-space:pre-wrap}
.hidden-content.visible{display:block}
.uncertain-btn{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--card-border);cursor:pointer;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;color:var(--muted)}
.uncertain-btn:hover{border-color:var(--uncertain)}
.uncertain-btn.marked{background:var(--uncertain-bg);border-color:var(--uncertain);color:var(--uncertain)}
.seen-btn{margin-top:8px;padding:4px 12px;border-radius:6px;border:1px solid var(--card-border);cursor:pointer;font-size:.78rem;background:var(--card);color:var(--muted);transition:all .15s}
.seen-btn:hover{border-color:var(--correct);color:var(--correct)}
.seen-btn.seen{background:var(--correct-bg);border-color:var(--correct);color:var(--correct)}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;justify-content:center}
.stat-box{text-align:center;padding:8px 14px;background:var(--card);border-radius:8px;border:1px solid var(--card-border);min-width:70px}
.stat-box .val{font-size:1.3rem;font-weight:700;color:var(--accent)}
.stat-box .lbl{font-size:.7rem;color:var(--muted)}
.reset-area{text-align:center;margin:24px 0;padding:16px}
.reset-btn{padding:8px 24px;border-radius:8px;border:1.5px solid var(--wrong);color:var(--wrong);background:var(--card);cursor:pointer;font-size:.85rem;font-weight:500;transition:all .2s}
.reset-btn:hover{background:var(--wrong-bg)}
.reset-btn.confirm{background:var(--wrong);color:#fff}
@media(max-width:480px){.card{padding:14px}header h1{font-size:1.2rem}.tab{padding:5px 8px;font-size:.72rem}}

.skip-panel{background:var(--card);border:1px solid var(--card-border);border-radius:10px;margin:0 0 10px;overflow:hidden}
.skip-title{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--text);user-select:none}
.skip-title:hover{background:var(--filter-bg)}
.skip-title .skip-arrow{margin-left:auto;transition:transform .2s;display:inline-block}
.skip-title.open .skip-arrow{transform:rotate(180deg)}
.skip-body{padding:8px 14px 12px;display:none;gap:8px;flex-wrap:wrap}
.skip-body.open{display:flex}
.skip-chk{display:flex;align-items:center;gap:6px;padding:5px 10px;border:1px solid var(--card-border);border-radius:6px;cursor:pointer;font-size:.82rem;color:var(--text);background:var(--bg);transition:all .15s;white-space:nowrap}
.skip-chk:hover{border-color:var(--accent)}
.skip-chk input{accent-color:var(--accent);cursor:pointer;width:14px;height:14px}
.skip-chk.active{background:rgba(255,100,100,.1);border-color:#e05555;color:#e05555}
.skip-count{font-size:.76rem;opacity:.7;margin-left:2px}
.q-num{display:inline-block;font-size:.72rem;font-weight:700;color:var(--muted);background:var(--filter-bg);border:1px solid var(--card-border);border-radius:4px;padding:1px 6px;margin-right:6px;min-width:28px;text-align:center}
</style>
</head>
<body>
<div class="container">
 <header>
 <h1>Ôn tập Tin học Đại cương</h1>
 <p>IT1110 / IT1140 — HUST</p>
 <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()"><span class="icon" id="themeIcon"></span><span id="themeLbl">Sáng</span></button>
 </header>
 <div class="overall-progress"><div class="label" id="overallLabel">0 / 0</div><div class="bar"><div class="fill" id="overallFill" style="width:0%"></div></div></div>
 <div class="stats" id="statsArea"></div>
 <div class="tabs-wrap"><div class="tabs" id="tabsBar"></div></div>
 <div class="skip-panel" id="skipPanel"><div class="skip-title" id="skipTitle" onclick="toggleSkipPanel()"><span>📋</span><span>Ẩn phần xác suất ít hơn các phần khác - thầy Ngô Thành Trung</span><span class="skip-arrow" id="skipArrow">▼</span></div><div class="skip-body" id="skipBody"></div></div>
 <div class="filters" id="filtersBar"></div>
 <div id="cardsArea"></div>
 <div class="reset-area"><button class="reset-btn" id="resetBtn">Xóa toàn bộ tiến trình</button></div>
</div>
<script>
const Q = [
{b:1,t:"mcq",lv:1,q:"Đơn vị biểu diễn thông tin cơ bản trên máy tính là bit. Vậy 1 byte có giá trị bằng bao nhiêu bit?",o:["8","4","16","32"],exp:"Theo quy ước quốc tế trong kiến trúc máy tính, 1 byte được định nghĩa là một chuỗi gồm 8 bit nhị phân (có giá trị 0 hoặc 1). Đây là đơn vị lưu trữ cơ bản nhất, vừa đủ để biểu diễn một ký tự tiêu chuẩn trong bảng mã ASCII."},
{b:1,t:"mcq",lv:2,q:"Cho 2 giá trị A= +95, B = -43 được biểu diễn dưới dạng số nguyên có dấu 8 bit trong máy tính. Kết quả phép toán A-B mà máy tính hiển thị là bao nhiêu?",o:["-118","+138","-1","+127"],exp:"Phép tính thực tế: A − B = 95 − (−43) = 138. Với hệ thống 8 bit có dấu, dải biểu diễn cho phép chỉ từ [−128; 127]. Do 138 vượt quá giới hạn này, hiện tượng tràn số (overflow) xảy ra. Máy tính sẽ hiển thị giá trị bị tràn bằng cách lấy 138 − 256 = −118."},
{b:1,t:"mcq",lv:2,q:"Phát biểu nào sau đây là đúng khi thực hiện phép nhân 2 số nguyên có dấu trong máy tính?",o:["Trước khi thực hiện phép nhân cần chuyển 2 thừa số thành số dương","Trước khi thực hiện phép nhân cần chuyển 2 thừa số thành đối số","Nếu hiện tượng tràn số xảy ra thì dấu của tích ngược dấu 2 thừa số","Nếu 2 thừa số khác dấu thì không cần hiệu chỉnh lại dấu của tích"],exp:"Trong cấu trúc phần cứng (ALU), để nhân 2 số có dấu, máy tính sẽ lấy trị tuyệt đối để chuyển cả 2 thừa số về dạng số dương. Sau khi thực hiện thuật toán nhân nhị phân thông thường, mạch điều khiển sẽ gán lại dấu cho kết quả dựa trên quy tắc dấu của hai toán hạng ban đầu."},
{b:1,t:"mcq",lv:2,q:"Trong các trường hợp sau đây, trường hợp nào có thể xảy ra hiện tượng tràn số?",o:["Cộng hai số nguyên âm","Cộng hai số nguyên dương","Trừ hai số cùng dấu với nhau","Nhân hai số nguyên khác dấu rồi lấy phần dư trong bộ nhớ"],exp:"Khi cộng hai số nguyên cùng dấu (cùng âm hoặc cùng dương), tổng của chúng có thể vượt quá dải lưu trữ tối đa của thanh ghi gây ra tràn số. Ngược lại, nếu cộng hai số khác dấu, kết quả luôn là một giá trị nằm kẹp giữa hai số ban đầu, do đó chắc chắn không bao giờ bị tràn."},
{b:1,t:"mcq",lv:2,q:"Cho số nguyên 16 bit có dấu có mã hexa là: 5931, AC43, B571, E755. Số lớn nhất là?",o:["5931","B571","AC43","E755"],exp:"Số nguyên có dấu sử dụng mã bù 2. Chuyển chữ số hexa đầu tiên sang nhị phân để xét bit dấu: A (1010), B (1011), E (1110) đều có bit cực trái là 1 nên chúng là số âm. Riêng 5 (0101) có bit cực trái là 0 nên đây là số dương. Chắc chắn số dương 5931 là số lớn nhất."},
{b:1,t:"mcq",lv:3,q:"Cho các số nguyên không dấu có mã hexa là: X = 6A<sub>16</sub>, Y = 153<sub>8</sub>, Z = 105<sub>10</sub>. Thứ tự sắp xếp giảm dần sẽ là?",o:["Y, X, Z","X, Y, Z","Z, X, Y","Y, Z, X"],exp:"Quy đổi tất cả về hệ thập phân (cơ số 10) để so sánh: X = 6×16¹ + 10×16⁰ = 106; Y = 1×8² + 5×8¹ + 3×8⁰ = 107; Z = 105. So sánh giá trị: 107 > 106 > 105, do đó thứ tự giảm dần phải là Y, X, Z."},
{b:1,t:"mcq",lv:1,q:"Sử dụng n bit nhị phân để biểu diễn số nguyên có dấu. Hỏi giá trị nguyên lớn nhất có thể biểu diễn là bao nhiêu?",o:["2<sup>n-1</sup> - 1","2<sup>n</sup> - 1","2<sup>n-1</sup>","2<sup>n</sup>"],exp:"Trong n bit có dấu, bit ngoài cùng bên trái được dùng làm bit dấu (0 là dương, 1 là âm). Do đó chỉ còn n-1 bit để biểu diễn độ lớn. Giá trị dương lớn nhất tương ứng với trường hợp tất cả n-1 bit này đều là 1, quy ra thập phân là 2^n-1 - 1."},
{b:1,t:"mcq",lv:2,q:"Khi thực hiện phép chia hai số nguyên có dấu trong máy tính, sau khi chuyển số bị chia và số chia thành số dương thì thực hiện phép chia. Trường hợp nào phải đảo lại dấu của cả thương và số dư?",o:["Số bị chia âm, số chia dương","Số bị chia dương, số chia dương","Số bị chia dương, số chia âm","Số bị chia âm, số chia âm và kết quả luôn là số dương"],exp:"Quy ước toán học trong máy tính quy định rằng dấu của số dư luôn phải đi theo dấu của số bị chia ban đầu. Đồng thời, vì số bị chia âm và số chia dương (trái dấu) nên thương cũng phải mang dấu âm. Do đó, cả hai thành phần đều phải đảo dấu."},
{b:1,t:"mcq",lv:2,q:"Cho biết kết quả của biểu thức khi biểu diễn ở dạng số nguyên có dấu 8 bit? NOT 106<sub>10</sub>",o:["10010101","00010110","00010101","10010110"],exp:"Số 106 dương ở hệ nhị phân 8 bit là 01101010. Phép toán bitwise NOT sẽ đảo ngược toàn bộ các bit (1 thành 0 và 0 thành 1). Áp dụng vào: NOT 01101010 trở thành 10010101. (Đọc trong hệ có dấu thì đây là bù 1 của số âm)."},
{b:1,t:"mcq",lv:3,q:"Biểu diễn số thực X = 0.46875 dưới dạng số dấu chấm động theo chuẩn IEEE 754 với 32 bit thì phần mã lệch (e) có giá trị là bao nhiêu?",o:["0111 1101","1000 0001","1000 0010","1000 0011"],exp:"Phân tích 0.46875 thành tổng các lũy thừa của 2: 0.25 + 0.125 + 0.0625 + 0.03125 = 2^-2 + 2^-3 + 2^-4 + 2^-5 = 0.01111_2. Chuẩn hóa dời dấu phẩy: 1.111 × 2^-2. Phần mã lệch E = 127 + (-2) = 125. Đổi 125 sang nhị phân 8 bit ta được 01111101."},
{b:1,t:"mcq",lv:2,q:"Cho số nhị phân 110011101.1001101 có biểu diễn trong hệ cơ số 8 là?",o:["635.464","427.644","563.644","444.44"],exp:"Để chuyển nhị phân sang bát phân, ta gom các bit thành từng nhóm 3 tính từ dấu phẩy thập phân sang hai bên. Phần nguyên: 110 | 011 | 101 -> 6 3 5. Phần thập phân thêm các số 0 ở cuối cho đủ nhóm 3: 100 | 110 | 100 -> 4 6 4. Ghép lại được 635.464."},
{b:1,t:"mcq",lv:2,q:"Cho 4 số nguyên 16 bit có dấu có mã hexa là: 2A31, A102, B502, 3C01. Số lớn nhất là?",o:["3C01","2A31","A102","B502"],exp:"Các số bắt đầu bằng A và B ở dạng nhị phân sẽ có bit cực trái là 1 (số âm). Các số bắt đầu bằng 2 và 3 có bit cực trái là 0 (số dương). So sánh 2 số dương: 3C01 (3 × 16^3 + ...) rõ ràng lớn hơn 2A31 (2 × 16^3 + ...)."},
{b:1,t:"mcq",lv:3,q:"Cho A = 49, B = -102 biểu diễn dạng nhị phân có dấu 8 bit. Kết quả phép toán trên bit (NOT A) OR B là:",o:["11011110","00110001","01010101","00110110"],exp:"A = 00110001, vậy (NOT A) = 11001110. B là số âm, tìm mã bù 2 của -102: |102| = 01100110, đảo bit = 10011001, cộng 1 = 10011010. Thực hiện phép OR giữa 11001110 và 10011010: bit nào có ít nhất một số 1 thì cho ra 1, ta thu được 11011110."},
{b:1,t:"mcq",lv:2,q:"Cộng 2 số nguyên không dấu 8 bit A = 123 và B = 159 được kết quả bằng bao nhiêu?",o:["26","282","0","36"],exp:"Tổng thực tế là 123 + 159 = 282. Nhưng kiểu không dấu 8 bit chỉ lưu tối đa đến 255. Bị tràn số, hệ thống sẽ bỏ qua bit dư và chỉ giữ lại 8 bit thấp nhất. Phép toán thu được là phép modulo cho 256: 282 - 256 = 26."},
{b:1,t:"mcq",lv:3,q:"Giá trị của số thực X = C1140000 (hệ 16) biểu diễn theo chuẩn IEEE754/85 độ chính xác đơn (dùng 32 bit) là:",o:["-9.25","9.25","4.75","-4.75"],exp:"Chữ C (1100) -> bit dấu = 1 (số âm). Phần mũ e lấy 8 bit tiếp theo là 10000010 (130_10), nên E = 130 - 127 = 3. Phần định trị M lấy 23 bit còn lại tương ứng với 1.00101_2. Công thức: X = (-1)^1 × 1.00101_2 × 2^3 = -1001.01_2 = - (8 + 1 + 0.25) = -9.25."},
{b:1,t:"mcq",lv:1,q:"Số thực nào trong hệ cơ số 10 là vô hạn trong hệ cơ số 2?",o:["0.1","0.125","0.0625","0.75"],exp:"Để đổi phân số sang nhị phân hữu hạn, mẫu số của nó phải là lũy thừa của 2. 0.1 = (1/10) = (1/2 × 5). Do chứa thừa số nguyên tố 5 không phải lũy thừa của 2, giá trị này sẽ tạo ra dãy nhị phân tuần hoàn vô hạn: 0.000110011...."},
{b:1,t:"mcq",lv:2,q:"Trong các giá trị thể hiện kích thước file như sau, giá trị nào lớn nhất?",o:["2^11 MB","1000 MB","2^20 KB","1 GB"],exp:"Đổi tất cả về chuẩn GB (với quy ước 1 GB = 1024 MB và 1 MB = 1024 KB). Ta có 2^11 MB = 2048 MB = 2 GB; 1000 MB ≈ 0.97 GB; 2^20 KB = 1024 MB = 1 GB; và 1 GB = 1 GB. Rõ ràng 2^11 MB (tức 2GB) là lớn nhất."},
{b:1,t:"mcq",lv:2,q:"Đẳng thức 213 – 121 = 72 đúng trong hệ cơ số nào?",o:["8","6","10","16"],exp:"Phân tích giá trị theo cơ số b: (2b^2 + 1b + 3) - (1b^2 + 2b + 1) = 7b + 2. Rút gọn ta được: b^2 - b + 2 = 7b + 2, suy ra b^2 - 8b = 0. Do b ≥ 2, nên nghiệm duy nhất thỏa mãn là b = 8. Đẳng thức trên diễn ra trong hệ bát phân."},
{b:1,t:"mcq",lv:1,q:"Hệ đếm cơ số b (b nguyên, b ≥ 2) có bao nhiêu chữ số (ký số)?",o:["Có b chữ số","Có b+1 chữ số","Có b-1 chữ số","Có đúng 10 chữ số giống hệ thập phân"],exp:"Một hệ đếm ở cơ số b bất kỳ luôn sử dụng đúng b ký hiệu cơ bản nhất, chạy tuần tự từ số 0 cho đến số b-1. Ví dụ hệ nhị phân (cơ số 2) có 2 chữ số (0,1); hệ thập phân có 10 chữ số (0->9)."},
{b:1,t:"mcq",lv:1,q:"Sử dụng 11 bit để biểu diễn một số nguyên có dấu, dải biểu diễn sẽ là? (Đề 3)",o:["-1024 tới +1023","-2048 tới +2047","-1024 tới +1024","-2048 tới +2048 (do 2 mũ 11 = 2048)"],exp:"Công thức chung tính dải biểu diễn của hệ thống n bit có dấu (dùng mã bù 2) là từ -2^n-1 đến 2^n-1 - 1. Áp dụng với n = 11, dải sẽ là từ -2^10 đến 2^10 - 1, tức là từ -1024 đến 1023."},
{b:1,t:"mcq",lv:2,q:"Cho A B C là các số nguyên không dấu 8 bit. A = 10001010<sub>2</sub>, B = 11111010<sub>2</sub>. C=A+B. Giá trị nhị phân của C là:",o:["10000100","10110100","10000110","11100010"],exp:"Thực hiện phép cộng dọc hệ nhị phân: 10001010 + 11111010 = 110000100 (ra 9 bit). Tuy nhiên, biến C chỉ dùng 8 bit không dấu nên bit thứ 9 (carry) bị cắt bỏ (overflow). Phần còn lại lưu trữ trong C chính là 8 bit tận cùng bên phải: 10000100."},
{b:1,t:"mcq",lv:2,q:"Kết quả biểu thức sau bằng bao nhiêu:\n01010110<sub>2</sub> AND 01001011<sub>2</sub>",o:["01000010","11100010","10100000","01100010"],exp:"Phép logic AND đối chiếu từng cặp bit, kết quả chỉ trả về 1 nếu CẢ HAI bit tương ứng đều là 1, ngược lại trả về 0. So sánh từng cặp từ trái sang phải: 0 AND 0 = 0, 1 AND 1 = 1, 0 AND 0 = 0... Kết quả cuối cùng là 01000010."},
{b:1,t:"mcq",lv:1,q:"Theo chuẩn IEEE 754/85, với cách biểu diễn số thực độ chính xác đơn (dùng 32 bit) thì số bit dùng biểu diễn phần mã lệch (e) sẽ là?",o:["8","9","7","6"],exp:"Chuẩn số dấu chấm động 32-bit phân bổ cố định tài nguyên: 1 bit cho phần dấu (sign), 8 bit cho phần mã lệch mũ (exponent/e), và 23 bit còn lại dành cho phần định trị hay phần lẻ (mantissa/m)."},
{b:1,t:"mcq",lv:1,q:"Cách biểu diễn số âm trong máy tính là?",o:["Sử dụng mã bù 2.","Sử dụng mã bù 1.","Dùng bit dấu riêng.","Đảo toàn bộ các bit rồi giữ nguyên không cộng thêm 1"],exp:"Để giải quyết triệt để vấn đề có hai số 0 (+0 và -0) như ở mã bù 1, máy tính biểu diễn số âm bằng mã bù 2. Người ta lấy giá trị nhị phân dương, đảo toàn bộ bit (thành bù 1), rồi cộng thêm 1 để ra mã bù 2."},
{b:1,t:"mcq",lv:2,q:"Cho 2 giá trị A= 195, B = 143 được biểu diễn dưới dạng số nguyên không dấu 8 bit trong máy tính. Kết quả phép toán A+B mà máy tính hiển thị là bao nhiêu?",o:["82","256","338","0"],exp:"Số nguyên không dấu 8 bit chỉ hỗ trợ phạm vi giá trị là [0; 255]. Tổng thực tế là 195 + 143 = 338, lớn hơn 255 nên gây tràn. Máy tính sẽ hiển thị phần còn lại sau khi trừ đi chu kỳ bộ nhớ: 338 - 256 = 82."},
{b:1,t:"mcq",lv:1,q:"Một số nguyên có dấu biểu diễn dưới dạng số nguyên 8 bit là 01010101. Giá trị của số đó trong hệ thập phân là?",o:["+85","-85","-43","+43"],exp:"Trong cấu trúc 8 bit có dấu, bit cực trái quyết định dấu (0 là dương, 1 là âm). Bit đầu của số này là 0 nên đây là số dương. Các bit còn lại (1010101) trực tiếp thể hiện độ lớn: 2^6 + 2^4 + 2^2 + 2^0 = 64 + 16 + 4 + 1 = 85."},
{b:1,t:"mcq",lv:2,q:"Kết quả biểu thức 10101001 OR 11001010",o:["11101011","11001010","10001000","01100011"],exp:"Phép toán logic OR quét qua từng cặp bit tương ứng. Kết quả sẽ trả về 1 nếu có ít nhất một trong hai bit là 1. Ráp từng cặp từ trái sang: (1 OR 1 = 1), (0 OR 1 = 1), (1 OR 0 = 1)... Ta thu được dãy hoàn chỉnh: 11101011."},
{b:1,t:"mcq",lv:3,q:"Cho số thực 121.75 biểu diễn theo chuẩn IEEE 754/85 độ chính xác đơn. Mã lệch e trong hệ nhị phân là:",o:["10000101","01111001","00000110","01111111"],exp:"Đổi sang nhị phân: 121 = 1111001_2 và 0.75 = 0.11_2. Ghép lại và dời dấu phẩy để chuẩn hóa: 1111001.11 = 1.11100111 × 2^6. Số mũ E bằng độ dịch (6) cộng với độ lệch chuẩn (127), suy ra E = 133. 133_10 đổi ra nhị phân là 10000101_2."},
{b:1,t:"mcq",lv:2,q:"Cho 2 giá trị A= +95, B = +43 được biểu diễn dưới dạng số nguyên có dấu 8 bit trong máy tính. Kết quả phép toán A+B mà máy tính hiển thị là bao nhiêu?",o:["-118","+138","-137","+10"],exp:"Biểu diễn bit: A = 01011111, B = 00101011. Tổng nhị phân: 01011111 + 00101011 = 10001010. Tổng của hai số dương lại sinh ra kết quả có bit dấu là 1 (âm), chứng tỏ hệ thống đã tràn số. Máy đọc kết quả 10001010 (âm bù 2) thành -118."},
{b:1,t:"mcq",lv:2,q:"Khi cộng hai số nguyên có dấu trong máy tính, trường hợp nào chắc chắn không tràn?",o:["Cộng hai số khác dấu.","Cộng hai số nguyên dương.","Cộng hai số nguyên âm.","Nhân hai số nguyên cùng dấu rồi cộng thêm một hằng số dương"],exp:"Tràn số xảy ra khi tổng tiến quá xa về cực âm hoặc cực dương. Nếu hai toán hạng mang dấu trái ngược nhau, kết quả cuối cùng sẽ có độ lớn bị kéo lùi vào giữa, luôn nhỏ hơn số lớn hơn trong cặp, vì vậy không bao giờ chạm được ngưỡng tràn."},
{b:1,t:"mcq",lv:2,q:"Xác định giá trị thập phân của số thực X có dạng biểu diễn theo chuẩn IEEE 754 với 32 bit:\n0011 1111 1000 0000 0000 0000 0000 0000 (Đề 1)",o:["1","0","2","-1"],exp:"Bit dấu S = 0 (dương). 8 bit mũ e = 01111111 tức là 127_10. Phần định trị 23 bit hoàn toàn là số 0 nên M = 1.0. Giá trị = (-1)^0 × 1.0 × 2^(127-127) = 1.0 × 2^0 = 1."},
{b:1,t:"mcq",lv:1,q:"Để biểu diễn cùng một giá trị, trong các hệ đếm sau, hệ đếm cơ số nào sử dụng ít chữ số nhất?",o:["Cơ số 16","Cơ số 2","Cơ số 8","Cơ số 10"],exp:"Chiều dài của chuỗi ký tự tỷ lệ nghịch với độ lớn của cơ số. Cơ số càng lớn thì sức chứa thông tin trên mỗi ký tự (chữ số) càng cao, dẫn đến chuỗi kết quả càng ngắn. Do đó, cơ số 16 sẽ dùng ít chữ số nhất để diễn đạt cùng một số."},
{b:1,t:"mcq",lv:1,q:"Phát biểu nào sau đây là sai về bộ mã ASCII?",o:["Bộ mã ASCII không phân biệt chữ hoa, chữ thường","Là bộ mã dùng để biểu diễn các ký tự trên máy tính","Dùng 8 bit để mã hóa và biểu diễn mỗi ký tự trong bảng","Bộ mã ASCII chuẩn bao gồm tổng cộng 128 ký tự"],exp:"Mã ASCII được thiết kế nghiêm ngặt phân biệt chữ hoa và thường vì mỗi ký tự được ánh xạ tới một mã thập phân độc lập. Ví dụ, chữ 'A' hoa có mã số là 65, trong khi 'a' thường nằm tít ở vị trí 97. Phát biểu trên là sai sự thật."},
{b:1,t:"mcq",lv:2,q:"Số nguyên -86 được biểu diễn dưới dạng số nhị phân 8 bit là?",o:["1010 1010","0101 0101","0011 0011","1010 1001"],exp:"Áp dụng phương pháp lấy mã bù 2: Bước 1 tìm nhị phân của số dương 86 là 01010110. Bước 2 đảo bit thành mã bù 1: 10101001. Bước 3 cộng thêm 1 để ra mã bù 2 cuối cùng: 10101001 + 1 = 10101010."},
{b:1,t:"mcq",lv:1,q:"Sử dụng 11 bit để biểu diễn một số nguyên có dấu, dải biểu diễn sẽ là? (Đề 1)",o:["-1024 tới +1023","-2048 tới +2047","-1024 tới +1024","-2048 tới +2048 (do 2 mũ 11 = 2048)"],exp:"Áp dụng hệ thức dải biểu diễn số có dấu: [-2^n-1 ; 2^n-1-1]. Thay n=11 vào, khoảng thu được là từ -2^10 đến 2^10-1, tương ứng chính xác với khoảng số nguyên từ -1024 đến +1023."},
{b:1,t:"mcq",lv:1,q:"1 KB bằng bao nhiêu byte?",o:["1024","1000","512","2048"],exp:"Trong khoa học máy tính chuẩn (không dùng hệ quy đổi 1000 của các nhà sản xuất phần cứng lưu trữ), tiền tố Kilo (K) trong bộ nhớ tương ứng với lũy thừa 10 của 2. Do vậy, 1 KB = 2^10 Byte = 1024 Byte."},
{b:1,t:"mcq",lv:1,q:"1 MB bằng bao nhiêu KB?",o:["1024","1000","512","2048"],exp:"Tương tự như quy luật chuyển đổi của Kilo, tiền tố Mega (M) lớn hơn Kilo đúng một khoảng nhảy là 2^10. Vì thế, 1 MB có dung lượng bằng đúng 1024 KB."},
{b:1,t:"mcq",lv:2,q:"Số nhị phân 11011010 biểu diễn số nguyên không dấu có giá trị thập phân là bao nhiêu?",o:["218","214","216","220"],exp:"Do là số không dấu, ta tính tổng tất cả các bit có giá trị 1 nhân với trọng số vị trí (từ phải sang trái bắt đầu từ 0): 1 × 2^7 + 1 × 2^6 + 0 × 2^5 + 1 × 2^4 + 1 × 2^3 + 0 × 2^2 + 1 × 2^1 + 0 × 2^0 = 128 + 64 + 16 + 8 + 2 = 218."},
{b:1,t:"mcq",lv:2,q:"Chuyển đổi số thập phân 156 sang hệ nhị phân (8 bit không dấu)?",o:["10011100","10011010","10011110","10011000"],exp:"Liên tục chia số 156 cho 2 và ghi lại số dư: 156 2 = 78 dư 0, 78 2 = 39 dư 0, 39 2 = 19 dư 1, 19 2 = 9 dư 1, 9 2 = 4 dư 1, 4 2 = 2 dư 0, 2 2 = 1 dư 0, 1 2 = 0 dư 1. Xếp ngược các số dư lên ta được 10011100."},
{b:2,t:"mcq",lv:1,q:"Các thao tác xử lý máy tính gồm: (1) Nhận lệnh; (2) Nhận dữ liệu nếu cần; (3) Giải mã lệnh; (4) Thực hiện lệnh. Trình tự thực hiện hợp lý là?",o:["1,3,2,4","1,2,3,4","4,2,1,3","3,2,4,1"],exp:"Chu trình thực thi lệnh cơ bản của vi xử lý bao gồm: Đọc lệnh từ RAM vào thanh ghi (Nhận lệnh), Bộ điều khiển CU phân tích lệnh đó làm gì (Giải mã), Nạp toán hạng cần thiết từ bộ nhớ (Nhận dữ liệu), và cuối cùng ALU thực thi tính toán (Thực hiện)."},
{b:2,t:"mcq",lv:1,q:"Chức năng quan trọng nhất của máy tính là?",o:["Xử lý dữ liệu","Lưu trữ dữ liệu","Nhập và xuất dữ liệu","Điều khiển"],exp:"Dù máy tính có vô vàn công dụng lưu trữ hay kết nối, lõi cơ bản kiến tạo nên khái niệm \"máy điện toán\" chính là năng lực tính toán, phân tích, so sánh và trích xuất dữ liệu thô thành thông tin có ý nghĩa (Xử lý dữ liệu)."},
{b:2,t:"mcq",lv:1,q:"Các thành phần của CPU gồm?",o:["Control Unit, ALU, Registers","Control Unit, Bộ nhớ trong, Registers","Control Unit, Bộ nhớ ngoài, Registers","Input-Output System, Bus, Bộ nhớ chính"],exp:"Kiến trúc nội bộ của vi xử lý CPU tập trung vào 3 khối sống còn: Khối điều khiển (Control Unit - CU) định hướng luồng dữ liệu, Khối tính toán (ALU) thực thi toán học/logic, và Tập thanh ghi (Registers) lưu trữ dữ liệu tức thời với tốc độ siêu tốc."},{b:2,t:"mcq",lv:1,q:"Chức năng chính của tập các thanh ghi là?",o:["Chứa các thông tin phục vụ cho hoạt động của CPU","Điều khiển nhận lệnh","Thực hiện các phép tính toán logic và số học","Không có câu trả lời nào ở trên là đúng"],exp:"Thanh ghi (Registers) là vùng nhớ siêu nhỏ nằm ngay bên trong nhân CPU. Tốc độ của chúng tương đương với lõi vi xử lý, chuyên dùng để cất giữ nhanh các lệnh đang thi hành, toán hạng đang xử lý, và các trạng thái hệ thống cục bộ."},
{b:2,t:"mcq",lv:1,q:"Phát biểu nào sau đây là sai về CPU?",o:["CPU đảm nhận tất cả các chức năng của hệ thống máy tính","Các thành phần chính của CPU bao gồm CU, ALU và các tập thanh ghi","CPU hoạt động theo chương trình nằm trong bộ nhớ chính","Tốc độ của CPU phụ thuộc vào tần số xung nhịp của đồng hồ"],exp:"CPU là bộ não điều phối và tính toán, nhưng nó không đơn độc \"bao thầu\" mọi thứ. Để thành một hệ thống hoàn chỉnh, nó cần RAM để nhớ dữ liệu, ổ cứng để lưu trữ vĩnh viễn, và các mạch I/O để tương tác với thế giới thực."},
{b:2,t:"mcq",lv:2,q:"Phát biểu nào sau đây là đúng về CPU?",o:["Khối tính toán số học và logic ALU trong CPU thực hiện với các dữ liệu nằm trên tập thanh ghi.","CPU hoạt động theo các chương trình nằm trên ổ cứng mà không cần nạp vào bộ nhớ chính.","Khối điều khiển CU trong CPU trực tiếp thực hiện các phép tính số học và logic thay cho ALU.","Các tập thanh ghi CPU là một số ngăn nhớ có địa chỉ xác định nằm trong bộ nhớ chính RAM và được CPU truy xuất thông qua bus địa chỉ giống như truy xuất ô nhớ thông thường"],exp:"ALU không trực tiếp chọc ra ngoài RAM để tính toán nhằm tránh nút thắt cổ chai về tốc độ. Thay vào đó, dữ liệu phải được bốc từ RAM nạp sẵn vào các thanh ghi nội bộ, sau đó ALU mới đọc từ thanh ghi để cộng trừ nhân chia."},
{b:2,t:"mcq",lv:1,q:"Chức năng chính của RAM?",o:["Lưu trữ dữ liệu và chương trình đang thực hiện","Lưu trữ dữ liệu lâu dài ngay cả khi tắt nguồn điện","Lưu trữ chương trình khởi động và BIOS của máy tính","Lưu trữ toàn bộ hệ điều hành một cách vĩnh viễn"],exp:"RAM là bộ nhớ làm việc tĩnh. Bất kỳ phần mềm hay dữ liệu nào người dùng muốn sử dụng đều phải được load từ ổ cứng lên RAM, vì tốc độ của RAM đủ nhanh để cung cấp dữ liệu tức thời cho CPU nhai và nuốt. Toàn bộ dữ liệu này sẽ trắng tay khi sập nguồn."},
{b:2,t:"mcq",lv:1,q:"Bộ nhớ đệm nhanh cache dùng để?",o:["Nhằm giảm độ chênh lệch tốc độ giữa CPU và bộ nhớ chính (RAM)","Tăng cường dung lượng bộ nhớ của CPU nhằm thay thế vai trò các thanh ghi","Dùng để lưu trữ dữ liệu lâu dài ngay cả khi máy tính bị mất nguồn điện","Tất cả các phương án được đưa ra ở trên đều không chính xác và đều sai"],exp:"Do tốc độ phát triển của CPU quá nhanh so với RAM, Cache được sinh ra làm trạm trung chuyển trung gian. Nó lưu sẵn những dữ liệu CPU có khả năng sắp dùng đến, giúp CPU không bị rơi vào trạng thái chờ đợi RAM phản hồi quá lâu."},
{b:2,t:"mcq",lv:1,q:"Lựa chọn nào sau đây chỉ chứa các thành phần là bộ nhớ trong?",o:["RAM, ROM-BIOS, Cache.","RAM, ROM-BIOS, CD.","RAM, ROM-BIOS, CD-ROM.","RAM, USB, CD-ROM."],exp:"Khái niệm \"bộ nhớ trong\" (Internal memory) ám chỉ các bộ phận lưu trữ gắn trực tiếp trên Mainboard, CPU có thể giao tiếp trực tiếp qua Bus bộ nhớ. Nhóm này thuần túy bao gồm RAM, chip chứa firmware ROM-BIOS và các tầng Cache L1, L2, L3."},
{b:2,t:"mcq",lv:1,q:"Lựa chọn nào dưới đây chỉ ra thứ tự tăng tốc độ xử lý dữ liệu của các loại bộ nhớ?",o:["Đĩa cứng, RAM, Cache, Tập thanh ghi","Ram, Đĩa cứng, Tập thanh ghi, Cache","Tập thanh ghi, Cache, Ram, Đĩa cứng","Ram, Rom, Đĩa cứng, Tập thanh ghi"],exp:"Theo tháp phân cấp bộ nhớ, càng ở gần bộ xử lý thì dung lượng càng nhỏ nhưng tốc độ càng chóng mặt. Chậm nhất là ổ đĩa cơ học (HDD), khá hơn là RAM tĩnh, sau đó là Cache (SRAM tĩnh cực nhanh), và đỉnh chóp là thanh ghi nhúng bên trong nhân CPU."},
{b:2,t:"mcq",lv:2,q:"Cần bao nhiêu khối nhớ 8 KB để có dung lượng 1 MB?",o:["128","64","256","1024"],exp:"Chuyển đổi đơn vị đồng nhất: 1 MB = 1024 KB. Để tìm số khối, ta làm phép chia đơn giản: (1024 KB/8 KB) = 128 khối. Do đó bạn cần ghép 128 khối 8KB lại để đầy 1 MegaByte."},
{b:2,t:"mcq",lv:1,q:"Các thành phần của CPU gồm? (Đề 2)",o:["Control Unit, ALU, Registers","Control Unit, Bộ nhớ trong, Registers","Input-Output System, Bus, Bộ nhớ chính","Control Unit, Bộ nhớ ngoài, Registers"],exp:"Tương tự câu 42, ba phần cốt lõi của đơn vị xử lý trung tâm (CPU) bắt buộc là CU để điều hướng, ALU để xử lý logic/số học, và tập Register để làm bàn đạp dữ liệu ngắn hạn."},
{b:2,t:"mcq",lv:1,q:"Các thao tác xử lý máy tính gồm: (1) Nhận lệnh; (2) Nhận dữ liệu nếu cần; (3) Giải mã lệnh; (4) Thực hiện lệnh. Trình tự thực hiện hợp lý là? (Đề 2)",o:["1,3,2,4","4,2,1,3","3,2,4,1","1,2,3,4"],exp:"Đây là trình tự Fetch-Decode-Execute chuẩn xác: Đầu tiên vi xử lý phải \"Fetch\" (Nhận lệnh) mã máy từ RAM, đem đi \"Decode\" (Giải mã) xem đây là thao tác gì, sau đó bốc số liệu \"Fetch data\" (Nhận dữ liệu) và kết thúc bằng \"Execute\" (Thực hiện)."},
{b:2,t:"mcq",lv:1,q:"Thành phần nào trong CPU đảm nhận việc thực hiện các phép xử lý dữ liệu?",o:["ALU","CU","Thanh ghi","BUS bên trong"],exp:"ALU là viết tắt của Arithmetic Logic Unit. Đây chính là \"cỗ máy tính toán\" đích thực bên trong vi xử lý, lãnh trách nhiệm xử lý rốt ráo mọi phép cộng trừ nhân chia số học và mọi phép so sánh AND, OR, XOR logic."},
{b:2,t:"mcq",lv:1,q:"Chức năng chính của RAM? (Đề 2)",o:["Lưu trữ dữ liệu và chương trình đang thực hiện","Lưu trữ chương trình khởi động và BIOS của máy tính","Lưu trữ dữ liệu lâu dài ngay cả khi tắt nguồn điện","Lưu trữ toàn bộ hệ điều hành một cách vĩnh viễn"],exp:"Mọi tiến trình (chương trình đang chạy) và tài liệu bạn đang tương tác đều phải được đưa vào RAM. RAM cung cấp tốc độ truy xuất cực lẹ cho vi xử lý thao tác, nhưng mang đặc điểm bay hơi (khả biến) nên dữ liệu biến mất sạch sành sanh khi tắt máy."},
{b:2,t:"mcq",lv:2,q:"Trong các lý do sau, lý do nào giải thích việc dung lượng của bộ nhớ ngoài có thể lớn hơn bộ nhớ trong rất nhiều?",o:["Vì bộ nhớ ngoài không bị giới hạn bởi không gian địa chỉ của CPU","Vì hệ thống vào ra cho phép ghép nối với bộ nhớ có dung lượng lớn","Vì bộ nhớ trong chịu sự điều khiển trực tiếp của CPU","Vì công nghệ chế tạo bộ nhớ ngoài rẻ hơn bộ nhớ trong rất nhiều"],exp:"Bộ nhớ trong (RAM) được nối trực tiếp bằng Bus địa chỉ, độ lớn dung lượng bị chặn cứng bởi số bit Bus (VD 32-bit chỉ quản lý tối đa 4GB). Bộ nhớ ngoài (ổ cứng) lại giao tiếp thông qua giao thức I/O, nên máy có thể cắm ổ cứng dung lượng lớn bao nhiêu tùy thích."},
{b:2,t:"mcq",lv:2,q:"Trong chu trình lệnh của hệ thống máy, các đối số của lệnh được thực hiện bởi ALU được lưu ở thành phần nào?",o:["Các thanh ghi","Bộ nhớ đệm cache","Bộ nhớ chính RAM","Các thiết bị lưu trữ ngoài như ổ đĩa cứng"],exp:"Để phục vụ tốc độ làm việc khủng khiếp của ALU, các biến số (đối số) tham gia vào phép tính không thể được gọi lắt nhắt từ RAM vì độ trễ rất cao, chúng buộc phải nạp sẵn vào các Thanh ghi (Registers) túc trực ngay cạnh ALU."},
{b:2,t:"mcq",lv:1,q:"ROM là viết tắt của cụm từ nào?",o:["Read Only Memory","Random Only Memory","Read Output Memory","Run Only Memory"],exp:"ROM (Read Only Memory) có nghĩa là Bộ nhớ chỉ đọc. Nó thường chứa firmware chuẩn của hệ thống (như BIOS/UEFI), chỉ phục vụ việc đọc dữ liệu khởi động máy và hiếm khi bị xóa bỏ hay ghi đè trong môi trường sử dụng bình thường."},
{b:2,t:"mcq",lv:1,q:"RAM là bộ nhớ có đặc điểm gì?",o:["Dữ liệu bị mất khi tắt nguồn (volatile)","Dữ liệu được lưu trữ vĩnh viễn khi tắt nguồn","Tốc độ truy xuất chậm hơn so với ổ đĩa cứng","Dữ liệu được ghi một lần duy nhất trong quá trình sản xuất và không thể thay đổi sau đó"],exp:"Nguyên lý vật lý của chip nhớ RAM yêu cầu dòng điện làm tươi liên tục (tính khả biến - volatile). Ngay khi nguồn điện từ PSU bị ngắt, các tụ điện tí hon bên trong xả hết điện và toàn bộ cấu trúc dữ liệu bị triệt tiêu hoàn toàn."},
{b:2,t:"mcq",lv:1,q:"Bus trong máy tính có chức năng gì?",o:["Truyền tín hiệu giữa các thành phần trong máy tính","Xử lý và tính toán dữ liệu đầu vào của chương trình","Lưu trữ các chương trình đang được thực thi trong máy","Điều khiển và quản lý hoạt động các thiết bị ngoại vi"],exp:"Bus không phải để tính toán, nó là các bó dây mạch đồng in trên bo mạch chủ. Chúng có nhiệm vụ làm đường cao tốc để truyền dữ liệu, truyền địa chỉ định hướng và mang theo tín hiệu điều khiển kết nối tất cả các vi mạch với nhau."},
{b:3,t:"mcq",lv:1,q:"Cấu hình (Topology) nào sau đây không phải là cấu hình mạng?",o:["Line","Ring","Star","Bus"],exp:"Trong môn mạng máy tính, các thiết kế sơ đồ mạng vật lý cơ bản gồm: Star (nối mạng hình sao qua Hub/Switch), Bus (nối chung một trục xương sống), Ring (nối vòng tròn) và Mesh (lưới đan xen). Thuật ngữ \"Line\" không phải là một mô hình mạng chuẩn."},
{b:3,t:"mcq",lv:1,q:"Dịch vụ nào sau đây không phải là dịch vụ dựa trên mạng Internet?",o:["Programming","Programming","Online chat","Telnet"],exp:"Email (gửi thư), Online chat (nhắn tin trực tuyến) hay Telnet (điều khiển từ xa) đều là những dịch vụ trao đổi gói tin trên nền Internet. Tuy nhiên, Programming (lập trình) đơn thuần là công việc gõ mã nguồn phần mềm tại máy tính cá nhân, không bắt buộc phải có Internet."},
{b:3,t:"mcq",lv:1,q:"Trong các mạng sau đây, mạng nào là mạng diện rộng?",o:["WAN","LAN","Internet","Intranet"],exp:"WAN (Wide Area Network) ra đời để bao phủ một phạm vi địa lý cực rộng như giữa các tỉnh, các quốc gia hoặc các châu lục. Cáp quang dưới biển và đường truyền vệ tinh là hạ tầng chủ lực để xây dựng mạng diện rộng này."},
{b:3,t:"mcq",lv:1,q:"Các thành phần cơ bản của một mạng máy tính bao gồm?",o:["Các máy tính, card mạng, đường truyền, phần mềm kết nối mạng","Các máy tính, thiết bị vào ra, đường truyền, thiết bị mạng","Các máy tính, card mạng, máy chủ, các thiết bị kết nối mạng","Các máy tính, card mạng, đường truyền vật lý, cùng với các thiết bị kết nối mạng như hub, switch và router truyền thống"],exp:"Để thiết lập nên một mạng hoàn chỉnh, bắt buộc phải gom đủ 4 yếu tố: Nút mạng (các máy tính), Thiết bị giao tiếp mạng (card mạng NIC), Môi trường truyền dẫn (cáp/wifi), và Các giao thức phần mềm (TCP/IP) để thông hiểu lẫn nhau."},
{b:3,t:"mcq",lv:1,q:"Trong môi trường mạng, FTP là:",o:["Giao thức truyền file","Dịch vụ tìm kiếm thông tin","Dịch vụ thư điện tử","Giao thức tán gẫu"],exp:"Viết tắt của \"File Transfer Protocol\", FTP là giao thức tiêu chuẩn cổ điển nhưng cực kỳ mạnh mẽ để upload (tải lên) và download (tải xuống) các file dữ liệu có dung lượng lớn giữa máy khách và máy chủ web qua nền tảng mạng TCP/IP."},
{b:3,t:"mcq",lv:1,q:"Mạng Internet thuộc loại mạng",o:["GAN","LAN","WAN","Peer to Peer"],exp:"Mạng Internet kết nối hàng tỷ thiết bị trên phạm vi toàn địa cầu. Vì quy mô của nó lớn hơn rất nhiều so với mạng WAN thông thường, nó được các chuyên gia phân vào hạng mục GAN (Global Area Network) – mạng toàn cầu."},
{b:3,t:"mcq",lv:1,q:"Trong các mạng sau đây, mạng nào là mạng cục bộ?",o:["LAN","WAN","Internet","Intranet"],exp:"LAN (Local Area Network) là hệ thống kết nối các thiết bị nằm rất gần nhau về mặt không gian vật lý, ví dụ như nội bộ một căn phòng làm việc, một hộ gia đình hay một dãy tòa nhà công ty."},
{b:3,t:"mcq",lv:1,q:"Trong các loại mạng sau đây mạng nào có kích thước nhỏ nhất?",o:["LAN","MAN","GAN","WAN"],exp:"Sắp xếp theo mức độ phủ sóng vật lý từ hẹp đến rộng: LAN (mạng trong tòa nhà nhỏ nhất) -> MAN (mạng phủ sóng một thành phố/đô thị) -> WAN (mạng nối các vùng quốc gia) -> GAN (mạng bao phủ hành tinh)."},
{b:3,t:"mcq",lv:1,q:"Trang web nào cho phép tạo một địa chỉ email miễn phí?",o:["Đáp án www.gmail.com và www.yahoo.com.vn","Trang web www.gmail.com cho phép tạo email","Trang web www.yahoo.com.vn cho tạo email","Trang web www.facebook.com cho phép đăng ký tài khoản email cá nhân miễn phí"],exp:"Cả Google (chủ quản của gmail) và Yahoo đều là hai trong số các nhà cung cấp dịch vụ thư điện tử lâu đời nhất, cho phép cá nhân đăng ký và sử dụng tài khoản email với dung lượng cơ bản hoàn toàn miễn phí."},
{b:3,t:"mcq",lv:1,q:"Đâu là địa chỉ email hợp lệ?",o:["tinhoc@soict.hut.edu.vn","gmail.com/register/user","yahoo.com.vn/mail/inbox","www.gmail.com/accounts/signup/new"],exp:"Quy tắc quốc tế chuẩn mực cho định dạng email là phải chứa biểu tượng @ phân tách rõ ràng giữa \"tên_người_dùng\" và \"tên_miền_máy_chủ\". Các đáp án gmail.com hay yahoo.com chỉ là tên miền website, không phải địa chỉ hòm thư người dùng."},
{b:3,t:"mcq",lv:1,q:"Trong các loại mạng sau đây mạng nào có kích thước nhỏ nhất? (Đề 2)",o:["LAN","WAN","MAN","GAN"],exp:"Tương tự câu 67, dựa vào đặc tính vật lý bao phủ, LAN bị giới hạn chiều dài cáp nội bộ (thường dưới vài trăm mét đến vài km), trong khi MAN, WAN có thể kéo dài hàng ngàn cây số. Do đó LAN là nhỏ nhất."},
{b:3,t:"mcq",lv:1,q:"Trong các mạng sau đây, mạng nào là mạng cục bộ? (Đề 1)",o:["LAN","GAN","WAN","Internet"],exp:"Tên gọi chính thức của LAN là Local Area Network, mang nghĩa đúng là \"Mạng không gian cục bộ\". Nó được dùng phổ biến để cắm dây LAN cho các máy bộ trong phòng lab trường học hay văn phòng nhỏ."},
{b:3,t:"mcq",lv:1,q:"Các ký tự nào sau đây không được dùng để đặt tên tệp, thư mục trong hệ điều hành Windows?",o:["/, \\, <, >, :, |","@, #, $, %, &","~, !, @, #, $, &","Các ký tự @, 1, %, ~ và dấu gạch dưới"],exp:"Windows cấm việc đưa các ký hiệu đặc biệt `/ \\ : * ? \" < > |` vào tên file. Nguyên nhân là vì hệ điều hành dùng chúng làm mã cú pháp riêng để nhận diện đường dẫn ổ đĩa, tham số lệnh, và các luồng xuất/nhập dòng lệnh."},
{b:3,t:"mcq",lv:2,q:"Khi đưa hệ thống vào vận hành trong thực tế, chiến lược nào có độ rủi ro thấp nhất?",o:["Song song","Thay thế","Thí điểm","Giai đoạn"],exp:"Chiến lược \"song song\" (parallel implementation) buộc công ty phải chạy cả phần mềm mới và phần mềm cũ cùng lúc một thời gian. Nếu phần mềm mới sập, công việc không hề bị gián đoạn vì bản cũ vẫn đang chốt sổ song song, do đó an toàn tối đa."},
{b:3,t:"mcq",lv:1,q:"Phát biểu nào dưới đây về Cơ sở dữ liệu là đúng?",o:["Là tập hợp các dữ liệu có liên quan tới nhau được lưu giữ trên máy tính để phục vụ cho việc sử dụng, quản lý dữ liệu","Là tài nguyên dữ liệu được tổ chức có hệ thống trên máy tính nhưng phục vụ cho một người dùng duy nhất trong hệ thống","Là tập hợp các thành phần dữ liệu cơ bản được lưu trữ rời rạc trên máy tính mà không có mối liên hệ logic nào với nhau","Là các dữ liệu được mã hóa và lưu trữ dưới một dạng cấu trúc đặc biệt trên máy tính, trong đó mỗi bản ghi phải được lưu thành một tệp riêng biệt thay vì được tổ chức trong các bảng có quan hệ với nhau"],exp:"Cơ sở dữ liệu (Database) không phải là mớ file lộn xộn. Nó là những bảng dữ liệu được tổ chức cực kỳ khoa học, có quan hệ ràng buộc chặt chẽ với nhau, giúp cho thao tác tìm kiếm, bổ sung và cập nhật thông tin cực kỳ nhanh và chuẩn."},
{b:3,t:"mcq",lv:1,q:"Trong các tên dưới đây, đâu là tên của một hệ điều hành?",o:["UNIX","Microsoft Office","WORD","Windows Explorer"],exp:"UNIX là ông tổ của rất nhiều hệ điều hành máy chủ và MacOS ngày nay. Trong khi đó MS Office hay Word chỉ là ứng dụng văn phòng, còn Windows Explorer là một thành phần quản lý tệp tin gắn trong thân hệ điều hành Windows."},
{b:3,t:"mcq",lv:1,q:"TCP/IP là viết tắt của cụm từ nào?",o:["Transmission Control Protocol / Internet Protocol","Transfer Control Protocol / Internet Protocol","Transmission Control Program / Internet Protocol","Transfer Communication Protocol / Internet Protocol for Networked Systems"],exp:"Đây là nền móng giao tiếp cốt lõi của Internet. Giao thức IP chịu trách nhiệm đính nhãn địa chỉ để gói tin đi đúng đích, còn TCP gánh trách nhiệm kiểm tra lỗi, đảm bảo gói tin đến nơi nguyên vẹn và theo đúng trật tự."},
{b:3,t:"mcq",lv:1,q:"HTTP là giao thức dùng để làm gì?",o:["Truyền tải siêu văn bản (web)","Truyền tải tệp tin giữa các máy","Gửi và nhận thư điện tử (email)","Quản lý và giám sát toàn bộ hoạt động của hệ thống mạng nội bộ"],exp:"HTTP (HyperText Transfer Protocol) là quy tắc định dạng giao tiếp bắt buộc giữa trình duyệt web và máy chủ. Mọi trang web bạn xem đều là các tệp siêu văn bản được bốc từ máy chủ kéo về máy cá nhân nhờ luật HTTP này."},
{b:3,t:"mcq",lv:1,q:"Firewall (tường lửa) có chức năng chính là gì?",o:["Kiểm soát và lọc lưu lượng mạng vào/ra","Tăng tốc độ truyền tải và kết nối dữ liệu mạng","Lưu trữ và sao lưu dữ liệu truyền qua mạng","Mã hóa toàn bộ dữ liệu truyền qua kết nối"],exp:"Hoạt động như trạm gác cổng bảo an mạng, tường lửa soi xét từng gói dữ liệu ra vào thiết bị dựa trên bộ luật (Rules) được đặt ra. Kẻ xấu, mã độc hay luồng truy cập trái phép từ Internet lập tức sẽ bị nó block lại bảo vệ mạng nội bộ.",skip:"an_toan"},
{b:3,t:"mcq",lv:1,q:"Địa chỉ IP (IPv4) gồm bao nhiêu byte?",o:["4 byte (32 bit)","6 byte (48 bit)","8 byte (64 bit)","2 byte (16 bit)"],exp:"Chuẩn địa chỉ IP thế hệ 4 (IPv4) sử dụng đoạn mã 32 bit nhị phân để gán nhãn cho các máy. Do 1 byte = 8 bit, nên cấu trúc 32 bit này được chia thành chuẩn 4 byte, thường hiển thị dưới dạng 4 cụm số thập phân cách nhau dấu chấm (như 192.168.1.1)."},
{b:4,t:"mcq",lv:1,q:"AI là viết tắt của cụm từ nào?",o:["Artificial Intelligence","Automated Information","Advanced Integration","Applied Informatics"],exp:"AI (Trí tuệ nhân tạo) đại diện cho ngành khoa học lập trình cho máy móc khả năng giả lập tư duy con người: tự học, hiểu ngôn ngữ, suy luận ra quyết định và tự điều chỉnh thay vì chỉ chạy logic if-else mù quáng.",skip:"ch4"},
{b:4,t:"mcq",lv:1,q:"IoT là viết tắt của cụm từ nào?",o:["Internet of Things","Information of Technology","Internet of Technology","Integration of Things"],exp:"IoT (Internet vạn vật) mô tả xu hướng cấy ghép cảm biến và mạch Wifi/Bluetooth vào mọi vật dụng bình thường (như tủ lạnh, bóng đèn, điều hòa) để chúng giao tiếp, tải dữ liệu lên mạng và tự động hóa phục vụ con người.",skip:"ch4"},
{b:4,t:"mcq",lv:1,q:"Big Data đề cập đến điều gì?",o:["Tập dữ liệu rất lớn, phức tạp mà các công cụ truyền thống không xử lý được","Cơ sở dữ liệu quan hệ lớn được quản lý bằng các hệ quản trị truyền thống","Dữ liệu được phân tán và lưu trữ trên nhiều ổ đĩa cứng vật lý khác nhau","Dữ liệu chỉ tồn tại ở dạng văn bản thuần túy mà không có cấu trúc phức tạp"],exp:"Dữ liệu số đang bùng nổ theo cấp số nhân mỗi ngày. Khi dữ liệu quá nhiều (Volume), sinh ra liên tục (Velocity) và có hàng trăm kiểu hình thức như text, ảnh, video (Variety), các phần mềm cơ sở dữ liệu lỗi thời trở nên vô dụng, phải dùng công cụ Big Data.",skip:"ch4"},
{b:4,t:"mcq",lv:1,q:"Blockchain là công nghệ gì?",o:["Sổ cái phân tán, không thể thay đổi (distributed ledger)","Hệ quản trị cơ sở dữ liệu quan hệ dùng cho doanh nghiệp","Giao thức truyền thông mạng thế hệ mới dùng cho Internet","Phần mềm bảo mật và chống virus chuyên dụng cho hệ thống máy tính, giúp ngăn chặn truy cập trái phép vào dữ liệu"],exp:"Blockchain xé lẻ cơ sở dữ liệu lưu trữ rải rác trên hàng ngàn máy tính toàn cầu. Mỗi bản ghi (block) đều dính chặt vào block trước đó bằng mã băm (hash). Mọi sự chỉnh sửa lén lút sẽ làm hỏng dây chuyền, tạo nên hệ thống chống gian lận tuyệt đối.",skip:"ch4"},
{b:4,t:"mcq",lv:1,q:"GPU được sử dụng phổ biến trong lĩnh vực nào ngoài đồ họa?",o:["Huấn luyện mô hình AI / Machine Learning","Quản lý và truy vấn cơ sở dữ liệu quan hệ","Xử lý văn bản và soạn thảo tài liệu số","Giám sát bảo mật và phòng chống tấn công mạng"],exp:"Card đồ họa (GPU) chứa hàng ngàn lõi tính toán nhỏ, vốn thiết kế để xử lý điểm ảnh hàng loạt. Cấu trúc này tình cờ cực kỳ tương thích với các bài toán nhân ma trận khổng lồ để đào tạo mạng lưới neuron AI, do đó GPU làm AI tốt hơn CPU.",skip:"ch4"},
{b:4,t:"mcq",lv:1,q:"NPU (Neural Processing Unit) được thiết kế chuyên dụng cho tác vụ nào?",o:["Xử lý các phép tính mạng neuron / AI","Xử lý và render đồ họa 3D thời gian thực","Quản lý phân bổ bộ nhớ cho hệ thống","Truyền tải và xử lý dữ liệu qua mạng máy"],exp:"Khác với vi xử lý đa năng, NPU được đổ khuôn phần cứng chỉ để tính toán hàm sigmoid, ReLu và nhân ma trận của mạng thần kinh nhân tạo. Nó mang lại tốc độ chạy AI nhanh hơn hàng chục lần mà lại tốn rất ít pin cho điện thoại thông minh.",skip:"ch4"},
{b:4,t:"mcq",lv:1,q:"Cloud Computing (Điện toán đám mây) cho phép người dùng làm gì?",o:["Sử dụng tài nguyên máy tính qua Internet mà không cần sở hữu hạ tầng","Tăng tốc hiệu năng xử lý của bộ vi xử lý CPU trên máy tính cá nhân","Tạo và quản lý mạng LAN nội bộ giữa các máy tính trong doanh nghiệp","Lưu trữ toàn bộ dữ liệu ở chế độ ngoại tuyến trên ổ cứng cục bộ mà không cần kết nối Internet, đảm bảo bảo mật tuyệt đối cho hệ thống"],exp:"Thay vì phải tốn tiền tỉ mua máy chủ, máy lạnh làm mát, thuê nhân sự IT, công ty có thể \"thuê\" máy chủ mạnh mẽ đặt ở Mỹ hoặc Singapore của Google hay Amazon, kết nối và sử dụng từ xa qua mạng, dùng bao nhiêu trả tiền bấy nhiêu.",skip:"ch4"},
{b:4,t:"mcq",lv:2,q:"Đặc điểm nào KHÔNG thuộc 5V của Big Data?",o:["Validation (Xác nhận)","Volume (Khối lượng)","Velocity (Tốc độ)","Variety (Đa dạng)"],exp:"Đặc tính nền móng của Big Data được định nghĩa qua 5 chữ V: Volume (Khối lượng cực lớn), Velocity (Tốc độ sinh ra lẹ), Variety (Đa dạng hóa chủng loại), Veracity (Tính xác thực dữ liệu) và Value (Giá trị khai thác). Không có chữ Validation trong nhóm này.",skip:"ch4"},
{b:4,t:"mcq",lv:1,q:"Machine Learning (Học máy) là gì?",o:["Một nhánh của AI cho phép máy tính học từ dữ liệu mà không cần lập trình tường minh","Phần mềm chuyên dụng được thiết kế để dạy người dùng kỹ năng lập trình","Hệ thống robot tự hành có khả năng di chuyển và tương tác môi trường","Hệ điều hành thông minh tích hợp sẵn các thuật toán xử lý nâng cao"],exp:"Lập trình cổ điển là viết quy tắc IF...THEN cho máy chạy. Học máy là ném một kho dữ liệu đáp án cho máy tính tự cày, nó sẽ tự lôi ra các phương trình thống kê và quy luật ngầm để áp dụng dự đoán cho các số liệu mới trong tương lai.",skip:"ch4"},
{b:4,t:"mcq",lv:2,q:"Smart City (Thành phố thông minh) ứng dụng chủ yếu công nghệ nào?",o:["IoT kết hợp Big Data và AI","Điện toán đám mây và mạng 5G","Blockchain và hệ thống SCADA","Mạng LAN nội bộ kết hợp với hệ quản trị cơ sở dữ liệu tập trung"],exp:"Bức tranh Smart City đòi hỏi IoT cung cấp tai mắt (cảm biến đếm xe, đo bụi), truyền vô vàn thông tin về để tạo thành Big Data (dữ liệu khổng lồ). Cuối cùng, khối não bộ trung tâm AI phân tích mớ dữ liệu đó để điều phối đèn đỏ, vòi nước tự động.",skip:"ch4"},
{b:4,t:"mcq",lv:1,q:"Công nghệ nào sau đây được ứng dụng nhiều trong tiền mã hóa (cryptocurrency)?",o:["Blockchain","Cloud Computing","IoT","Big Data"],exp:"Tiền mã hóa ra đời nhờ tận dụng đặc tính sổ cái phi tập trung của Blockchain. Do nó ghi lại số dư giao dịch công khai, khóa cứng bởi hàng nghìn node mạng ngang hàng nên không một tổ chức hay hacker nào có thể tự in thêm tiền hay sửa số dư.",skip:"ch4"},
{b:4,t:"mcq",lv:2,q:"Deep Learning (Học sâu) khác với Machine Learning truyền thống ở điểm nào?",o:["Sử dụng mạng neuron nhân tạo nhiều lớp (deep neural networks)","Không cần sử dụng bất kỳ dữ liệu huấn luyện nào để hoạt động","Hoạt động dựa trên các quy tắc logic cố định do con người lập","Áp dụng thuật toán cây quyết định đơn lớp để phân loại dữ liệu và không có khả năng tự động trích xuất đặc trưng từ dữ liệu thô"],exp:"Machine Learning thông thường vẫn cần chuyên gia kỹ thuật mớm dữ liệu sạch và các \"đặc điểm cốt lõi\". Deep Learning dùng thuật toán mạng thần kinh xếp thành chục lớp tầng sâu, có khả năng tự mò mẫm nhận diện điểm chung từ mớ dữ liệu cực kỳ hỗn độn như hình ảnh, giọng nói.",skip:"ch4"},
{b:5,t:"mcq",lv:1,q:"Quy trình giải quyết bài toán bằng máy tính?\n(1) Xây dựng thuật giải; (2) Lựa chọn phương pháp giải; (3) Cài đặt chương trình; (4) Hiệu chỉnh chương trình; (5) Thực hiện chương trình; (6) Xác định bài toán;",o:["(6)→(2)→(1)→(3)→(4)→(5)","(1)→(2)→(3)→(4)→(5)→(6)","(6)→(2)→(1)→(3)→(5)→(4)","(6)→(1)→(2)→(3)→(4)→(5)"],exp:"Để code hiệu quả, lập trình viên phải bắt mạch bài toán (6), tìm hướng đi (2), vẽ lưu đồ thuật toán (1). Xong lý thuyết mới gõ phím viết code (3), chạy tìm bug để sửa lỗi (4) và cuối cùng triển khai chạy thực tiễn thu kết quả (5)."},
{b:5,t:"mcq",lv:1,q:"Đâu là phát biểu đúng về thuật toán?",o:["Thuật toán là dãy hữu hạn các thao tác và trình tự thực hiện các thao tác đó","Thuật toán là phương pháp tìm ra lời giải tốt nhất cho vấn đề đặt ra","Thuật toán là phương pháp tìm ra lời giải cho vấn đề đặt ra","Thuật toán là một tập các hướng dẫn dành cho máy tính để giải quyết một bài toán đặt ra"],exp:"Thuật toán bản chất là một tờ hướng dẫn nấu ăn vô cùng chi tiết dành cho não máy tính. Mỗi lệnh (thao tác) phải cực kỳ rành mạch (tính xác định), làm theo đúng thứ tự logic, và đến một lúc nào đó phải dừng lại trả kết quả (tính hữu hạn)."},
{b:5,t:"mcq",lv:1,q:"Phương pháp liệt kê tất cả các khả năng của lời giải, tiến hành thử để tìm ra lời giải đúng là phương pháp nào dưới đây?",o:["Phương pháp vét cạn","Phương pháp chia","Phương pháp thử","Phương pháp lặp"],exp:"Vét cạn (Brute-force) là tư duy cơ bắp trong giải thuật. Máy sẽ dùng vòng lặp đào xới từng kịch bản xảy ra, nhét vào điều kiện kiểm tra xem có thỏa mãn không. Mặc dù rất chậm chạp, ưu điểm của nó là chắc chắn không bao giờ đánh rơi nghiệm."},
{b:5,t:"mcq",lv:2,q:"Cho biết giá trị của MAX khi kết thúc đoạn mã giả:\nA ← 3, B ← 1, C ← 5, MAX ← A\nif (MAX < B) then MAX ← B end if\nif (MAX < C) then MAX ← C end if",o:["5","1","3","Tất cả các ý trên đều sai"],exp:"Biến MAX ban đầu được neo ở 3. So với B=1, 3 không nhỏ hơn 1 nên bỏ qua dòng lệnh gán B. Tiếp tục so MAX với C=5, do 3 nhỏ hơn 5 là Đúng, MAX bị ghi đè giá trị mới bằng 5. Đây chính là thuật toán tìm số lớn nhất tuần tự."},
{b:5,t:"mcq",lv:3,q:"Hàm T(n) được định nghĩa đệ quy như sau:\nT(0)=1; T(1)=1\nT(n)= 2T(n-1) + 3T(n-2) với n≥2\nHãy cho biết giá trị hàm T(4)?",o:["41","7","20","45"],exp:"Lội ngược từ điểm cơ sở lên: T(2) = 2T(1) + 3T(0) = 21 + 31 = 5. Tiếp tục nâng bậc, T(3) = 2T(2) + 3T(1) = 25 + 31 = 13. Cuối cùng, T(4) = 2T(3) + 3T(2) = 213 + 35 = 26 + 15 = 41."},
{b:5,t:"mcq",lv:1,q:"Đâu là phát biểu đúng về thuật toán đệ quy?",o:["Kết quả của thuật toán đệ quy phụ thuộc vào kết quả của bài toán cùng loại có mức độ thấp hơn","Phần cơ sở trong thuật toán đệ quy là những trường hợp cần thực hiện lại thuật toán","Là thuật toán đánh dấu khả năng chứa lời giải đã thực hiện để khi khử khả năng mới có thể thực hiện nhanh chóng hơn","Kết quả của thuật toán đệ quy không phụ thuộc vào kết quả của các bài toán con"],exp:"Đệ quy (Recursion) hoạt động dựa trên chiến thuật chia để trị. Muốn tính kết quả một bài toán ở cấp N, nó gọi lại cái bóng của chính nó nhưng ném cho bài toán nhỏ ở cấp N-1, kéo dài cho đến lúc chạm đáy (base case) rồi lội ngược dòng trả kết quả lên."},
{b:5,t:"mcq",lv:2,q:"Cho biết giá trị của A, B khi kết thúc đoạn mã giả:\nA ← 0, B ← 1, C\nif (A < B) then\n C = B\n B = A\n A = C\nend if",o:["A = 1 và B = 0","A = 0 và B = 1","A = 1 và B = 1","A = 0 và B = 0"],exp:"Ban đầu A=0, B=1 làm cho mệnh đề (0 < 1) là đúng. Máy chạy 3 lệnh trong khối: Nhét B vào C (C=1), Gán đè A sang B (B=0), Lấy C trả lại cho A (A=1). Đoạn lệnh kinh điển dùng biến tạm C này đã hoán vị thành công hai giá trị của A và B."},
{b:5,t:"mcq",lv:1,q:"Đâu không phải đặc trưng của thuật toán?",o:["Tính riêng biệt","Tính hiệu quả","Tính xác định","Tính hữu hạn"],exp:"Bất kỳ thuật toán chuẩn mực nào cũng phải sở hữu 3 cột trụ cơ bản: Tính xác định (rõ ràng, không mập mờ), Tính hữu hạn (có điểm dừng) và Tính đúng đắn (giải được bài). \"Tính riêng biệt\" không nằm trong lý thuyết đặc trưng cấu thành thuật toán."},
{b:5,t:"mcq",lv:2,q:"Cho biết giá trị của n khi kết thúc đoạn mã giả:\nx ← 1, n ← 1\nwhile (x ≤ 1000) do\n x ← 2*x\n n ← n+1\nend while",o:["11","15","13","9"],exp:"Vòng lặp liên tục nhân đôi x theo cấp số 2^k. Danh sách x tương ứng là: 2, 4, 8, 16, 32, 64, 128, 256, 512. Khi x = 512 (chưa vượt 1000), n được cộng lên 10. Ở vòng kế, x = 1024, n cộng lên 11. Sau đó nó vòng lên check điều kiện (1024 ≤ 1000) thì False, thoát vòng lặp, chốt hạ n=11."},
{b:5,t:"mcq",lv:1,q:"Phát biểu nào về thuật giải Heuristic là đúng?",o:["Thường đưa ra lời giải gần đúng tốt nhất cho các bài toán phức tạp khó tìm lời giải đúng","Là sự mở rộng và phát triển tính xác định của thuật toán truyền thống sang dạng tổng quát hơn","Là thuật toán luôn đảm bảo tìm ra được lời giải chính xác và tối ưu cho các bài toán phức tạp","Là thuật giải giúp tìm ra lời giải tốt nhất một cách dễ dàng hơn và nhanh chóng hơn các phương pháp khác"],exp:"Thuật giải Heuristic (giải thuật theo kinh nghiệm) là kỹ thuật tối ưu hóa thay thế cho vét cạn. Mặc dù không đảm bảo tìm được nghiệm hoàn hảo hay tối ưu tuyệt đối, phương pháp này sử dụng trực giác và kinh nghiệm để đưa ra một kết quả đủ tốt và chấp nhận được trong một thời gian tính toán ngắn, rất hữu ích với các bài toán có không gian tìm kiếm khổng lồ."},
{b:5,t:"mcq",lv:1,q:"Quy trình giải quyết bài toán bằng máy tính? (Đề 3)",o:["Xác định bài toán → Lựa chọn phương pháp giải → Xây dựng thuật giải → Cài đặt chương trình → Hiệu chỉnh chương trình → Thực hiện chương trình","Xây dựng thuật giải → Lựa chọn phương pháp giải → Cài đặt chương trình → Hiệu chỉnh chương trình → Thực hiện chương trình → Xác định bài toán","Xây dựng thuật giải → Lựa chọn phương pháp giải → Cài đặt chương trình → Hiệu chỉnh chương trình → Xác định bài toán → Thực hiện chương trình","Xác định bài toán → Lựa chọn phương pháp giải → Xây dựng thuật giải → Hiệu chỉnh chương trình → Thực hiện chương trình → Cài đặt chương trình"],exp:"Đây là 6 bước chuẩn mực trong vòng đời phát triển phần mềm: Bạn phải hiểu rõ input/output (Xác định), tìm hướng xử lý toán học (Lựa chọn phương pháp), vẽ sơ đồ khối (Xây dựng thuật giải), viết code (Cài đặt), test và debug (Hiệu chỉnh), cuối cùng mới đưa vào sử dụng thực tế (Thực hiện)."},
{b:5,t:"mcq",lv:1,q:"Trong ngôn ngữ lưu đồ, hình thoi là biểu diễn của nút nào?",o:["Nút điều kiện","Nút vào/ra dữ liệu","Nút thao tác","Nút giới hạn"],exp:"Trong quy ước quốc tế về sơ đồ khối (Flowchart), hình thoi (Diamond) chuyên được sử dụng để biểu diễn các thao tác kiểm tra rẽ nhánh logic (Đúng/Sai). Chẳng hạn như các câu lệnh rẽ nhánh `if-else` hoặc các điều kiện lặp `while`, `for` đều phải nằm gọn trong hình thoi."},
{b:5,t:"mcq",lv:1,q:"Trong ngôn ngữ lưu đồ, hình chữ nhật là biểu diễn của nút nào?",o:["Nút thao tác","Nút giới hạn","Nút vào/ra dữ liệu","Nút điều khiển"],exp:"Hình chữ nhật (Rectangle) biểu diễn một quy trình xử lý, một hành động, lệnh gán hay các phép tính toán học thông thường. Đây là nơi CPU thực sự làm việc để biến đổi dữ liệu (ví dụ: `A = B + C`) thay vì làm nhiệm vụ điều hướng luồng."},
{b:5,t:"mcq",lv:1,q:"Đâu không phải là ngôn ngữ dùng để biểu diễn thuật toán?",o:["Ngôn ngữ cơ thể","Sơ đồ khối","Ngôn ngữ lập trình","Ngôn ngữ tựa ngôn ngữ lập trình"],exp:"Thuật toán bắt buộc phải được truyền đạt bằng các hệ thống có tính logic chặt chẽ như Sơ đồ khối (Flowchart), Mã giả (Pseudo-code) hoặc Ngôn ngữ lập trình thực thụ. Ngôn ngữ cơ thể là phương tiện giao tiếp phi ngôn ngữ của con người, hoàn toàn không có khả năng mô tả thuật toán cho máy tính."},
{b:5,t:"mcq",lv:2,q:"Cho biết giá trị của MAX khi kết thúc đoạn mã giả (Đề 1):\nA ← 3, B ← 1, C ← 5, MAX ← A\nif (MAX < B) then MAX ← B end if\nif (MAX < C) then MAX ← C end if",o:["MAX = 5","MAX = 1","MAX = 0","MAX = 3"],exp:"Khởi tạo `MAX` bằng `A = 3`. So sánh thứ nhất: `3 < 1` là Sai, bỏ qua phép gán. So sánh thứ hai: `3 < 5` là Đúng, thực thi lệnh gán đè `MAX ← C`. Do đó, kết thúc chương trình `MAX` sẽ mang giá trị của C là 5. Thuật toán này chính là kỹ thuật tìm số lớn nhất cơ bản."},
{b:5,t:"mcq",lv:1,q:"Trong sơ đồ khối, hình bình hành biểu diễn nút nào?",o:["Nút vào/ra dữ liệu","Nút điều kiện","Nút thao tác","Nút bắt đầu/kết thúc"],exp:"Hình bình hành (Parallelogram) được quy ước dùng để đại diện cho các thao tác giao tiếp dữ liệu với môi trường bên ngoài (Input / Output). Các lệnh nhập dữ liệu từ bàn phím (như `scanf`, `cin`) hay in kết quả ra màn hình (như `printf`, `cout`) đều sử dụng hình này."},
{b:5,t:"mcq",lv:1,q:"Trong sơ đồ khối, hình ovan (ellipse) biểu diễn nút nào?",o:["Nút bắt đầu/kết thúc","Nút điều kiện rẽ nhánh","Nút nhập/xuất dữ liệu","Nút thao tác xử lý"],exp:"Hình Oval (hình bầu dục) được sử dụng làm các nút chốt chặn (Terminator) ở hai đầu của sơ đồ khối. Nó chỉ chứa hai cụm từ duy nhất là \"Bắt đầu\" (Start) và \"Kết thúc\" (End/Stop) để báo hiệu cho người đọc biết ranh giới của thuật toán."},
{b:5,t:"mcq",lv:2,q:"Thuật toán tìm kiếm nhị phân (Binary Search) yêu cầu điều kiện gì đối với dữ liệu đầu vào?",o:["Dữ liệu phải được sắp xếp","Dữ liệu phải là số nguyên","Dữ liệu phải lưu trong mảng động","Dữ liệu phải không có phần tử trùng lặp và có số phần tử là lũy thừa của 2"],exp:"Tìm kiếm nhị phân hoạt động theo nguyên lý \"chia để trị\", liên tục lấy phần tử ở giữa để so sánh và chặt đôi không gian tìm kiếm. Để quyết định được nên tìm tiếp ở nửa trái hay nửa phải, mảng dữ liệu bắt buộc phải được sắp xếp theo thứ tự (tăng dần hoặc giảm dần) từ trước."},
{b:6,t:"mcq",lv:1,q:"Trong ngôn ngữ lập trình C, câu lệnh nào dưới đây là khai báo đúng cho một hằng ký tự?",o:["#define HangSo 'A'","#define HangSo A","const char HangSo A;","const char HangSo = A; /* khai báo hằng */"],exp:"Cú pháp `#define` dùng để định nghĩa hằng macro (tiền xử lý) và tuyệt đối không kết thúc bằng dấu chấm phẩy. Để khai báo hằng ký tự `A`, ta phải đặt `A` trong cặp dấu nháy đơn `' '`. Việc dùng biến hằng số `const` phải tuân thủ cú pháp có dấu bằng (`=`) và kết thúc bằng chấm phẩy (`;`), nên các đáp án khác đều sai."},
{b:6,t:"mcq",lv:1,q:"Giả thiết bộ chương trình Turbo C 3.0 được cài đặt trên ổ đĩa D của một máy tính. Hãy chỉ ra tên đầy đủ của chương trình dịch Tc.exe",o:["D:\\TC\\BIN\\Tc.exe","D:\\TC\\BIN\\Tc","TC\\BIN\\Tc.exe","D:\\Program Files\\TC\\BIN\\Tc.exe"],exp:"Trong hệ điều hành DOS và Windows, tên đầy đủ (Absolute Path) của một tệp tin phải bao gồm ký tự ổ đĩa, cây thư mục phân cách bằng dấu gạch chéo ngược (`\\`), và cuối cùng là tên file đi kèm phần mở rộng. Do đó `D:.exe` là đường dẫn đúng chuẩn."},
{b:6,t:"mcq",lv:1,q:"Trong cấu trúc cơ bản của chương trình C, thành phần nào bắt buộc phải có?",o:["Phần định nghĩa hàm main()","Phần khai báo các tệp tiêu đề","Định nghĩa kiểu dữ liệu mới","Phần khai báo các hàm nguyên mẫu"],exp:"Trình biên dịch C được thiết kế để luôn bắt đầu luồng thực thi (entry point) từ hàm `main()`. Một chương trình có thể không có khai báo thư viện (`#include`), không có biến toàn cục, nhưng tuyệt đối không thể biên dịch thành công nếu thiếu đi hàm `main()`."},
{b:6,t:"mcq",lv:1,q:"Trong ngôn ngữ lập trình C, tên biến nào sau đây không được chấp nhận?",o:["Ket Qua","KetQua","ket_qua","ketqua"],exp:"Quy tắc đặt tên biến (Identifier) trong ngôn ngữ C nghiêm cấm việc sử dụng dấu cách (khoảng trắng) bên trong tên. Tên biến chỉ được phép bao gồm các chữ cái, chữ số và dấu gạch dưới (`_`), đồng thời không được phép bắt đầu bằng số."},
{b:6,t:"mcq",lv:1,q:"Ngôn ngữ lập trình C được xếp vào loại ngôn ngữ lập trình nào?",o:["Ngôn ngữ lập trình bậc cao","Ngôn ngữ máy (mã nhị phân)","Hợp ngữ (ngôn ngữ Assembly)","Ngôn ngữ lập trình bậc thấp gần với mã máy và hợp ngữ Assembly"],exp:"C được phân loại là ngôn ngữ bậc cao (High-level language) vì nó sử dụng các từ khóa tiếng Anh gần gũi với con người (như `if`, `while`, `for`) và che giấu các chi tiết phức tạp của phần cứng. Tuy nhiên, nó vẫn giữ được nhiều tính năng can thiệp bộ nhớ sâu, nên đôi khi còn được gọi là ngôn ngữ \"bậc trung\"."},
{b:6,t:"mcq",lv:1,q:"Đâu là biểu diễn hằng số ở hệ cơ số 8 trong C?",o:["02006","2006","0x2006","0X2006"],exp:"Ngôn ngữ C sử dụng các tiền tố để phân biệt hệ đếm: không có tiền tố là hệ thập phân, tiền tố `0x` hoặc `0X` dùng cho hệ thập lục phân (Hexa). Đặc biệt, bất cứ hằng số nguyên nào bắt đầu bằng chữ số `0` (ví dụ `02006`) sẽ tự động được trình biên dịch hiểu là hệ bát phân (Octal)."},
{b:6,t:"mcq",lv:2,q:"Câu lệnh khai báo đúng là:",o:["const char Xau[8] = \"CLBHTHT\";","#define Xau = \"CLBHTHT\";","#define Xau \"CLBHTHT\";","const char Xau[8] = CLBHTHT;"],exp:"Đây là cách khai báo một mảng ký tự hằng số an toàn. Chuỗi `\"CLBHTHT\"` có 7 chữ cái, cộng thêm 1 byte cho ký tự kết thúc chuỗi `\\0` là vừa vặn 8 byte bộ nhớ. Lệnh `#define` không dùng dấu `= ` hoặc chấm phẩy `;` nên các đáp án `#define` đều sai cú pháp."},
{b:6,t:"mcq",lv:1,q:"Chọn khai báo hợp lý trong ngôn ngữ C",o:["float a = 7.0f;","a = 7.0 : float;","float: a = 7;","a : float = 7;"],exp:"Cú pháp khai báo biến chuẩn trong C là: `[Kiểu dữ liệu] [Tên biến] = [Giá trị];`. Lựa chọn `float a = 7.0f;` tuân thủ nghiêm ngặt điều này (chữ `f` báo hiệu rõ cho trình biên dịch đây là số thực `float` chứ không phải `double`). Các đáp án có dấu hai chấm (`:`) là cú pháp của Pascal hoặc Python, không dùng trong C."},
{b:6,t:"mcq",lv:1,q:"Trong ngôn ngữ lập trình C, khai báo nào sau đây là đúng cú pháp?",o:["unsigned int n=0;","float int n;","unsigned float n;","#define n 0;"],exp:"Khai báo `unsigned int n=0;` là hợp lệ để tạo một biến nguyên không dấu khởi tạo bằng 0. Trong khi đó `float int` là việc gọi hai kiểu dữ liệu xung đột cùng lúc, `unsigned float` không tồn tại trong chuẩn C (số thực luôn có dấu), và `#define` không được đi kèm dấu chấm phẩy."},
{b:6,t:"mcq",lv:1,q:"Phát biểu nào dưới đây về ngôn ngữ lập trình C là đúng?",o:["Trình biên dịch sẽ dịch ngôn ngữ C thành mã máy","Ngôn ngữ C hiện nay chỉ tồn tại với một phiên bản duy nhất","C là hợp ngữ","Máy tính có thể hiểu trực tiếp ngôn ngữ C"],exp:"C là ngôn ngữ biên dịch tĩnh. Máy tính (CPU) không thể trực tiếp đọc hiểu các câu lệnh tiếng Anh trong file `.c`. Nó bắt buộc phải qua phần mềm Trình biên dịch (Compiler) để dịch toàn bộ mã nguồn đó thành mã máy nhị phân (mã 0 và 1) trước khi có thể thực thi."},
{b:6,t:"mcq",lv:2,q:"Dòng khai báo nào sai?\n1: #define PI 3.1415;\n2: const float g 9.81;\n3: int i=0;\n4: int j='a';",o:["Dòng 1,2","Dòng 1,2,3","Dòng 2,3,4","Dòng 1,2,4"],exp:"Dòng 1 sai vì chỉ thị tiền xử lý `#define` không bao giờ được phép kết thúc bằng dấu chấm phẩy (chấm phẩy sẽ bị bốc luôn vào làm một phần của giá trị text). Dòng 2 sai cấu trúc khai báo hằng vì thiếu mất toán tử gán (`=`) giữa tên biến `g` và giá trị `9.81`."},
{b:6,t:"mcq",lv:1,q:"Trong ngôn ngữ lập trình C, câu lệnh nào dưới đây là khai báo đúng cho một hằng ký tự? (Đề 1)",o:["#define CLBHTHTB 'K'","#define CLBHTHTB K","const char CLBHTHTB K;","const char CLBHTHTB =K;"],exp:"Tương tự câu 110, sử dụng `#define` đi kèm khoảng trắng để gán ký hiệu với giá trị. Giá trị hằng ký tự `K` được đặt chuẩn xác trong cặp dấu nháy đơn, và không có dấu chấm phẩy thừa thãi ở cuối dòng."},
{b:6,t:"mcq",lv:1,q:"Trong C, từ khóa nào dùng để khai báo hằng số?",o:["const","constant","define","final"],exp:"Từ khóa `const` (viết tắt của constant) được đặt trước kiểu dữ liệu để đóng băng giá trị của biến. Bất kỳ nỗ lực nào nhằm gán lại giá trị cho biến `const` sau khi khởi tạo sẽ ngay lập tức bị trình biên dịch quăng lỗi (Compile Error)."},
{b:6,t:"mcq",lv:1,q:"Trong C, dòng #include <stdio.h> có tác dụng gì?",o:["Khai báo thư viện nhập xuất chuẩn","Khai báo biến toàn cục cho chương trình","Định nghĩa hàm main của chương trình","Biên dịch và liên kết tất cả các tệp mã nguồn của chương trình thành tệp thực thi"],exp:"`stdio.h` là viết tắt của \"Standard Input Output header\". Nếu không \"bao gồm\" (include) thư viện này, trình biên dịch sẽ không biết các lệnh giao tiếp kinh điển như `printf` (in màn hình) và `scanf` (đọc bàn phím) là gì và báo lỗi hàm chưa được định nghĩa."},
{b:6,t:"mcq",lv:1,q:"Trong C, hàm main() trả về kiểu dữ liệu gì theo chuẩn?",o:["int","void","float","char"],exp:"Theo quy ước chuẩn C quốc tế (C89/C99/C11), hàm `main` phải trả về một số nguyên (`int`) cho Hệ điều hành. Lệnh `return 0;` ở cuối báo hiệu chương trình chạy trơn tru, trong khi trả về số khác 0 báo hiệu chương trình bị crash hoặc gặp lỗi ngoại lệ."},
{b:7,t:"mcq",lv:2,q:"Trong ngôn ngữ C, cho biết kết quả sau khi tính toán biểu thức: 1.5*(11/3)",o:["4.5","5.5","5.4999","Không thu được gì"],exp:"C đánh giá biểu thức trong ngoặc trước. Vì `11` và `3` đều là số nguyên, phép `11/3` thực hiện chia nguyên (loại bỏ phần thập phân), cho kết quả là `3`. Tiếp theo, phép nhân `1.5 * 3` có chứa số thực nên sẽ trả về kết quả số thực là `4.5`."},
{b:7,t:"mcq",lv:2,q:"Giá trị của b sau khi thực hiện đoạn mã sau?\nint a=-1, b=1;\nb+=a?2:1;",o:["3","2","4","1"],exp:"Toán tử ba ngôi `a ? 2 : 1` sẽ kiểm tra tính \"True\" của `a`. Trong C, bất kỳ số nào khác 0 đều được coi là True. Vì `a = -1` (khác 0), nên điều kiện Đúng, toán tử trả về giá trị `2`. Kết quả, lệnh gán `b += 2` làm cho `b = 1 + 2 = 3`."},
{b:7,t:"mcq",lv:3,q:"Sau khi thực hiện các câu lệnh sau một cách tuần tự:\nint a=5, c=2;\nfloat b=11;\nint d=3;\nd = (int)b/c%5;\nGiá trị của biến d sẽ bằng?",o:["0","3","5","1"],exp:"Ép kiểu `(int)b` biến `11.0` thành số nguyên `11`. Do độ ưu tiên của `/` và `%` bằng nhau, tính từ trái qua: `11 / c = 11 / 2 = 5` (chia nguyên). Sau đó, thực hiện phép lấy dư `5 % 5 = 0`. Cuối cùng biến `d` lưu giá trị 0."},
{b:7,t:"mcq",lv:3,q:"Cho biết giá trị của f=((a=b)||(b>4)) với khai báo sau:\nunsigned int a=7, b=2, c=5, d=6;",o:["1","0","Biểu thức sai","Không trả về kết quả"],exp:"Phép toán Logic OR (`||`) sẽ xử lý từ trái sang. Lệnh gán `(a=b)` ép `a` nhận giá trị 2. Phép gán này đồng thời trả về chính giá trị 2 (là một số khác 0, tương đương True). Do nửa bên trái đã True, C dùng tính năng ngắt mạch (short-circuit) bỏ qua luôn vế phải. Biểu thức đúng, nên `f = 1`."},
{b:7,t:"mcq",lv:1,q:"Lựa chọn nào dưới đây chỉ ra thứ tự tăng của miền giá trị các kiểu dữ liệu?",o:["int, long, float, double","int, float, double, long","int, float, long, double","int, long, double, float"],exp:"Miền giá trị số tăng dần do cách biểu diễn bộ nhớ: `int` (thường 4 byte, ± 2 tỷ) ≤ `long` (4 hoặc 8 byte) < `float` (4 byte nhưng lưu dưới dạng dấu phẩy động mũ, lên tới 3.4 × 10^38) < `double` (8 byte dấu phẩy động, lên tới 1.7 × 10^308)."},
{b:7,t:"mcq",lv:2,q:"Hãy cho biết sau đoạn lệnh sau biến a nhận giá trị bằng bao nhiêu?\nint a, b=10, c=20;\na=b>c?200:300;",o:["300","200","10","20"],exp:"Toán tử ba ngôi đánh giá điều kiện `b > c` (tức là `10 > 20`). Vì 10 không lớn hơn 20, điều kiện này sai (False), do đó biểu thức bỏ qua giá trị 200 và chọn giá trị 300 ở phía sau dấu hai chấm. Lệnh gán cuối cùng đẩy `300` vào `a`."},
{b:7,t:"mcq",lv:3,q:"Hãy cho biết giá trị của d khi thực hiện mã nguồn sau?\nint d=0;\nfor(int i=0;i<100;++i){\n if(!(i&1))++d;\n}",o:["50","10","30","40"],exp:"Vòng lặp chạy 100 lần từ i=0 đến i=99. Toán tử bitwise `i & 1` dùng để lấy bit cuối cùng của `i`. Nếu `i` lẻ, bit cuối là 1; nếu `i` chẵn, bit cuối là 0. Lệnh `!(i&1)` có nghĩa là đảo ngược lại, tức chỉ thi hành `++d` khi `i` chẵn. Trong 100 số đầu tiên có đúng 50 số chẵn, nên `d` tăng lên thành 50."},
{b:7,t:"mcq",lv:3,q:"Trong ngôn ngữ lập trình C, khi đoạn chương trình sau được thực hiện các biến A, B, C có giá trị là bao nhiêu?\nint A = 10, B = 20, C;\nC = (A>B)? A++: ++B;\nprintf(\"%d %d %d\",A,B,C);",o:["A = 10; B = 21; C = 21","A = 11; B = 20; C = 20","A = 11; B = 21; C = 21","A = 10; B = 20; C = 20 (do phép gán trước)"],exp:"Điều kiện `A > B` (10 > 20) là Sai, vì vậy biểu thức sẽ chạy nhánh thứ hai là `++B`. Toán tử tăng trước `++B` sẽ nâng B lên 21 ngay lập tức, rồi trả về số 21 đó để gán cho C. Nhánh `A++` không hề được chạm tới nên A giữ nguyên giá trị 10."},
{b:7,t:"mcq",lv:2,q:"Cho một đoạn chương trình viết bằng ngôn ngữ lập trình C như sau:\nconst int i=0;\nprintf(\"%d\\n\",i++);\nHãy chỉ ra lỗi của đoạn chương trình trên (nếu có)?",o:["Toán tử ++ áp dụng lên một hằng số","Khai báo i sai cú pháp","Toán tử ++ thiếu một toán hạng","Đoạn chương trình trên không có lỗi cú pháp"],exp:"Trình biên dịch C tự động tính toán `3 + 2` thành `5`. Khi đó, cấu trúc switch-case sẽ có hai nhánh cùng chứa giá trị hằng số là 5 (một cái là `case 3+2` và một cái là `case 5`). Việc trùng lặp nhãn case vi phạm nghiêm trọng quy tắc 문 pháp C, dẫn đến lỗi biên dịch."},
{b:7,t:"mcq",lv:3,q:"Kết quả của biểu thức sau là?\n2 + 3*5 - 9 && 1 + 2 - 5%3 || 10<=2*6",o:["1","0","Chương trình báo lỗi","-1"],exp:"Tính các cụm số học và quan hệ trước: Trái = `2 + 15 - 9 = 8`. Giữa = `1 + 2 - 2 = 1`. Phải = `10 <= 12` (Đúng = 1). Ráp lại: `8 && 1 || 1`. Vì 8 và 1 đều là True (khác 0), phép AND `8 && 1` trả về 1. Cuối cùng, `1 || 1` trả về 1 (True)."},
{b:7,t:"mcq",lv:3,q:"Cho biết giá trị các biến a,b,c sau khi thực hiện đoạn chương trình sau:\nint a,b,c;\na=25/3;\nb=++a + 6;\nc =(b>15)?(b+7):(a*a);",o:["9, 15, 81","8, 15, 81","8, 15, 22","9, 15, 64"],exp:"`a = 25/3 = 8` (chia nguyên). `b = ++a + 6`: A tăng trước lên 9, sau đó `b = 9 + 6 = 15`. Cuối cùng, tính `c`: `(15 > 15)` là Sai, do đó chọn nhánh sau của toán tử ba ngôi: `c = a a = 9 9 = 81`."},
{b:7,t:"mcq",lv:3,q:"Cho biết các giá trị a,b,c sau khi thực hiện đoạn chương trình C sau:\nint a,b,c;\na=10;\nb = ++a;\nc= ++a - b++ +1;",o:["a = 12, b = 12, c = 2","a = 10, b = 10, c = 2","a = 11, b = 11, c = 1","Không có giá trị của a, b, c"],exp:"Lệnh 2: A tăng lên 11, rồi gán `b = 11`. Lệnh 3: A lại tăng trước lên 12; sau đó biểu thức lấy giá trị A (12) trừ đi giá trị B hiện tại (11) rồi cộng 1, tức là `c = 12 - 11 + 1 = 2`. Chỉ sau khi gán xong cho c, toán tử hậu tố `b++` mới phát huy tác dụng, đẩy B từ 11 lên 12."},
{b:7,t:"mcq",lv:2,q:"Trong các biểu thức so sánh dưới đây biểu thức nào đúng, biết bảng mã được sử dụng là bảng mã ASCII?",o:["'0'>1","'a'<'1'","'a'<'B'","'9'>'A'"],exp:"C so sánh ký tự bằng cách dùng mã ASCII thập phân của chúng. Ký tự `'0'` có mã là 48. Biểu thức `'0' > 1` thực chất là máy tính kiểm tra `48 > 1`, đây hiển nhiên là một mệnh đề Đúng (True)."},
{b:7,t:"mcq",lv:3,q:"Cho biểu thức sau:\nint i=10, j=20;\nint *p1, *p2;\np1=&i; p2=&j;\nCho biết giá trị của *(p2 - 1).\n(Biết rằng các biến có địa chỉ lần lượt: i tại FFEE, j tại FFEC, p1 tại FFDA, p2 tại FFDC, dùng 2 bytes để lưu 1 biến int)",o:["FFEE - 10","FFEC - 10","FFDA - FFDA","FFDC - FFDC"],exp:"`p2` lưu địa chỉ của `j` là FFEC. Do là con trỏ kiểu `int` (mỗi `int` chiếm 2 byte trong ngữ cảnh bài này), phép trừ con trỏ `p2 - 1` sẽ nhảy ngược lên 1 bước bộ nhớ, tương đương FFEC + 2 = FFEE (do Stack thường mọc ngược, biến khai báo trước có địa chỉ lớn hơn). Tại địa chỉ FFEE chính là nơi lưu biến `i` mang giá trị 10. (Đáp án hàm ý Địa chỉ FFEE - Giá trị 10)."},
{b:7,t:"mcq",lv:1,q:"Trong C, toán tử % (modulo) dùng để làm gì?",o:["Lấy phần dư của phép chia","Lấy phần nguyên của phép chia hai số","Tính giá trị phần trăm của một số","Thực hiện phép chia hai số thực"],exp:"Khác với phép chia `/` dùng để tìm thương số, toán tử modulo `%` là thuật toán kinh điển dùng để chích xuất phần số dư sau khi lấy hai số nguyên chia cho nhau. Rất hữu dụng để kiểm tra tính chẵn lẻ hay tìm chữ số tận cùng."},
{b:7,t:"mcq",lv:1,q:"Trong C, kiểu dữ liệu char chiếm bao nhiêu byte?",o:["1","2","4","8"],exp:"Theo đúng đặc tả tiêu chuẩn của ngôn ngữ C, kiểu `char` (Character) là đơn vị bộ nhớ nhỏ nhất có thể đánh địa chỉ, và nó luôn luôn được cấp phát cố định chính xác 1 byte (tương đương 8 bit) trên mọi nền tảng kiến trúc phần cứng."},
{b:7,t:"mcq",lv:2,q:"Kết quả của biểu thức 7/2 trong C khi cả hai toán hạng là int?",o:["3","3.5","4","3.0"],exp:"Khi C thấy cả tử số và mẫu số đều là biến kiểu nguyên (`int`), nó tự động kích hoạt phép \"chia nguyên\". Nó sẽ vứt bỏ hoàn toàn mọi phần thập phân (không thèm làm tròn) và chỉ lấy phần nguyên. Do đó 7 2 = 3.5 bị chặt phần đuôi, trả về đúng số 3."},
{b:7,t:"mcq",lv:2,q:"Toán tử nào có độ ưu tiên cao nhất trong C?",o:["() (ngoặc tròn)","* (phép nhân)","++ (tăng một)","= (phép gán giá trị cho biến)"],exp:"Dựa trên bảng ưu tiên toán tử (Operator Precedence) của C, cặp dấu ngoặc tròn `()` nắm giữ đặc quyền cao nhất. Bất kỳ biểu thức phức tạp nào bị kẹp trong cặp ngoặc này đều được C ép buộc tính toán trước tiên, bất chấp các luật lệ ưu tiên của nhân chia cộng trừ bên ngoài."},
{b:8,t:"mcq",lv:1,q:"Định dạng nào trong ngôn ngữ C cho phép hiển thị một giá trị số nguyên dưới dạng hệ cơ số 10?",o:["%d","%c","%s","%o"],exp:"`%d` (viết tắt của Decimal) là chuỗi đặc tả định dạng (format specifier) phổ biến nhất để báo cho hàm `printf` biết phải chuyển đổi mã nhị phân trong bộ nhớ thành dạng chữ số nguyên thập phân (cơ số 10) có dấu để hiển thị cho con người đọc."},
{b:8,t:"mcq",lv:2,q:"Cho biết kết quả trên màn hình của lệnh sau (với □ là ký tự space-dấu cách):\nprintf(\"%5.2f\",345.4321);",o:["345.43","45.43","Lỗi không in được","345.4"],exp:"`.2f` yêu cầu giữ lại đúng 2 số sau dấu phẩy (làm tròn thành 345.43). Số `5` yêu cầu độ rộng tối thiểu để in là 5 ký tự. Tuy nhiên, chuỗi \"345.43\" có tổng cộng 6 ký tự (bao gồm cả dấu chấm). C luôn ưu tiên in đầy đủ dữ liệu để không bị mất mát thông tin, nên nó sẽ phá vỡ giới hạn độ rộng và in đủ \"345.43\"."},
{b:8,t:"mcq",lv:2,q:"Lệnh đúng để in ra màn hình hai số thực x, y theo định dạng:\nDòng 1: In giá trị x, căn lề trái, chiếm 10 vị trí trong đó có 2 vị trí cho phần thập phân\nDòng 2: In giá trị y, căn lề phải, chiếm 6 vị trí trong đó có 3 vị trí cho phần thập phân",o:["printf(\"%-10.2f\\n%6.3f\",x,y);","printf(\"%-10.3f\\n%6.4f\",x);","printf(\"%10.2f\",x);printf(\"%-6.3f\",y);","printf(\"%10.2f\",x);printf(\"\\n%-6.3f\",y);"],exp:"Dấu `-` đi kèm định dạng độ rộng dùng để \"căn lề trái\" cho biến x (`%-10.2f`). Ký hiệu `` nhúng vào giữa để ép dòng 2 xuống hàng. Không có dấu `-` ở định dạng y (`%6.3f`), nên theo mặc định C sẽ tự động chèn khoảng trắng để căn lề phải cho đủ 6 vị trí."},
{b:8,t:"mcq",lv:1,q:"Mệnh đề nào sau đây là đúng về đọc xâu ký tự?",o:["Khi đọc xâu ký tự, hàm gets() cho phép nhập các ký tự dấu cách, dấu tab, còn hàm scanf() sẽ hiểu dấu cách, dấu tab đầu tiên báo hiệu kết thúc nhập xâu ký tự","Khi đọc xâu ký tự, hàm scanf() cho phép nhập các ký tự dấu cách, dấu tab, còn hàm gets() sẽ hiểu dấu cách, dấu tab đầu tiên báo hiệu kết thúc nhập xâu ký tự","Khi đọc xâu ký tự, cả hàm scanf() và gets() đều cho phép nhập các ký tự dấu cách, dấu tab mà không có sự khác biệt nào giữa hai hàm này","Khi đọc xâu ký tự, cả hàm gets() và hàm scanf() đều sẽ hiểu dấu cách, dấu tab đầu tiên là ký tự báo hiệu kết thúc nhập xâu, do đó lập trình viên cần dùng hàm fgets() nếu muốn nhập xâu có chứa khoảng trắng"],exp:"`scanf(\"%s\")` là một hàm đọc theo từ (word), gặp khoảng trắng (space/tab/xuống dòng) là nó tự ngắt chuỗi ngay. Ngược lại, `gets()` là hàm đọc theo nguyên một hàng (line), nó ôm trọn mọi khoảng trống và chỉ chịu ngừng đọc khi người dùng bấm phím Enter."},
{b:8,t:"mcq",lv:2,q:"Cho biết kết quả trên màn hình của lệnh sau (Với □ là ký tự space):\nprintf(\"%-5.2f \", 3.454);",o:["3.45□","□3.45","□□3.45","3.45□□"],exp:"`.2f` cắt phần dư thành chuỗi \"3.45\" (chiếm 4 ký tự). Định dạng `%-5` buộc in căn trái trong khung rộng 5 ô. Vì mới dùng 4 ô, hệ thống tự bù 1 dấu cách (□) vào bên phải cho đủ định mức 5. Ngoài ra, trong lệnh `printf` còn có một khoảng trắng trống sau %f, nhưng đề bài thường chỉ hỏi nội dung được sinh ra từ %f, đáp án chính xác nhất là \"3.45□\"."},
{b:8,t:"mcq",lv:2,q:"Cho biết kết quả hiển thị trên màn hình?\nint a;\nfor (a=65; a<69; a++)\n printf(\"%c \",a);",o:["A B C D","65 66 67 68","chương trình lỗi không chạy được","a b c d"],exp:"Vòng lặp rải giá trị `a` từ 65 đến 68. Việc dùng định dạng `%c` (Character) yêu cầu C in ký tự tương ứng với mã ASCII đó thay vì in mặt chữ số. Do mã 65 là 'A', 66 là 'B', 67 là 'C', 68 là 'D', kết quả in ra một chuỗi chữ cái hoa ngăn cách bởi dấu cách."},
